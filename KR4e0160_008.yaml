body:
  text: 柏齋集卷八明何瑭撰溫縣知縣王侯德政記懷慶所屬六縣溫最小其地瘠其民貧故前後為令者多以煦濡慈惠治之因循玩愒俗益惰偷逮正德十三年山東王侯以鄉進士選知縣事下車以來一切以嚴猛從事凡氏之罹於法者慢期會者違教令者與吏之通請謁受賄賂者悉繩之以法又使人覺察四境民有酗酒者賭慱者強凌弱衆暴寡者及光棍喇虎放火行劫為民患而莫敢誰何者悉捕而治以重典由是法令清肅苞苴不行良民寃抑者有所赴訴姦民凛凛然懼刑罰之及其身覩侯如雷電鬼神不可測度雖在私室亦不敢放肆出一語况敢呌呼橫行以為齊民病哉紀綱既振乃修城隍治橋道植榆柳數萬株以儲材木築河堤數百步以防洪水積粟榖數千石以備荒年創養濟院數十間以養煢獨民有耕種而無牛具者婚娶而無聘財者皆量為資給流民而自外復業者皆量免差稅時或捐俸設粥以濟餓莩尤留意學校暇則試諸生學業勤惰第其甲乙而勸懲之以上司提學者久不至縣乃預選民間子弟之俊秀者百餘名量免其户之差役俾之肄業以待收擇河內舉人范安僑寓於溫亦為之樹立坊牌使後進有所懲勸政聲流聞當道交薦逮正德十四年鄉試取侯為簾內官品藻精當得士為多由是當道益知其能乃薦其才堪治繁改知開封府祥符縣士民戀慕而不可留也乃述侯德政徵言於豫將勒之貞珉以示久逺豫惟昔子産之在春秋夫子稱其為惠人而其授太叔以政也乃曰惟太上能以德化民其次莫如猛火烈民望而畏之故鮮死焉水弱民狎而玩之故多死焉吾嘗疑乎是今以王侯之政觀之子産之言蓋自有所見而未可執一論也詩曰豈弟君子民之父母夫豈以強教之弟以恱安之民斯尊親之如父母矣何以猛為抑豈弟君子蓋子産所謂太上能化民以德者也太上不可得而見矣以愛為心而以猛為政如子産之所以授太叔者今蓋亦不易得也王侯其賢乎哉侯名民表字道立山東登州府招逺縣人浙省北新關户部分司題名記財者天下之大計也國脈民命皆係乎此故君子盡心焉太古之時上之用度甚節故取於民之法甚簡中古用度漸繁故取於民之法漸密觀禹貢周官之所載大略可知矣然方其盛時山澤之利與民共之商賈之征復時時有所縱舍民猶未甚病也降及後世山澤之利悉歸於官農之稅既不止什一而其從事商賈者則已稅其貨又算其舟車緡錢可謂取之盡錙銖矣民之病可勝言哉議者多謂商賈諸稅可罷宋儒范仲淹獨謂上之用度既不可減與其取於農不若取於商猶不失厚本抑末之意固非謂此法之為盡善也蓋有所不得已焉耳國朝之於商賈既已稅其貨又稅其舟船蓋亦依倣近代而為之者也浙省之物貨甲天下故四方之商賈咸輻輳焉其貨稅船稅之出入往年止以有司治之當道慮有侵尅之弊乃於𢎞治六年始請命户部貟外郎或主事來監臨之周歲代去然財猶膩也近則汚人故士之以潔廉自好者多以是役為嫌稍失慎防則往往至貽物議嘉靖二年某月徽州潘君希平以主事被命至或以為慮君蹙然曰財者天下之大計也使人避嫌不理將委之誰哉亦處之有道而已矣乃令稅課司局商稅及北新關船稅之所入皆寄於杭州府庫已惟典其籍而鈎稽焉是歲薄賦而稅入視往年不啻三倍聞者僉謂君持廉革弊故能致此同聲賢之君聞之愀然不悅曰此非豫之意也稅入之贏縮在商船之多寡近歲北方道梗商賈皆萃於浙而是歲江南大飢米商之來者尤衆故稅入最贏若不察其然遂以是歲為率而必取盈焉則貽害於後多矣乃具疏其故陳於當道聞者以君識高而慮逺非常情所及愈益賢之甲申之春君以瓜期將屆念惟古人一登眺遊覽之適猶或題名以收感於後况監臨於此經歷歲時而其人之賢否得失不無可法戒者而姓名不傳後之人何所徵乎乃稽案牘詢故老得監臨於此者凡若千人皆勒於石虛其左以俟來者而闕其不知間屬瑭為文以述其意瑭非能文者也而財用之輕重本末則頗聞君子之論矣謹書以歸之嗚呼仁人志士其亦有感於此也夫其亦有警於此也夫王屋山天壇玉皇廟記王屋山者天下名山也在今河南濟源縣境內山形如王者宫殿故名王屋王屋之巔是為天壇圖經地志以為第一洞天形勝景致靈蹤古迹圖志悉矣世傳軒轅皇帝曾修煉于此其紫金巖御愛松迄今猶存故後世棲真之士往往歸焉乃大明𢎞治六年道流張太素等由山西來結茅壇頂間歎曰山以天壇名玉皇上帝天神之主也三清有宇而玉皇無殿何以竭虔妥靈大不稱名山本意遂謀構殿肖像以肅崇奉乃夷嶮岨剪荆棘辟地數丈築土為殿基崇二丈四尺廣六丈縱七丈有竒又慮殿在壇久必傾圮重建不易乃覆以鐵瓦鑄為銅像為永逺不動計經始于𢎞治十二年正月朔旦落成于正德三年九月望日鐵瓦殿計三楹銅鑄玉帝像一真人玉女像四兩廊為琉璃殿七楹中肖天將像復鑄銅燈花瓶鐘鏡爐鼎皆極工巧其工用俱出門徒及四方施主并不用常住升米文錢方修建時其光變祥應甚衆既成因吾內兄周溥周澄昆仲來請記嗚呼天帝之尊在禮惟天子得祭雖諸侯王不敢僭太素等庶人也而崇奉玉皇上帝可乎吾何以記而周君昆仲之請不可辭無已則有一焉天地人之父母也人天地之子也而天子者獨為父母宗子古禮父母之祭宗子主之支子不與故傳云支子不祭明其宗也然則天地之祭惟天子主之諸侯不敢僭固矣然父母之祭雖不得與至孝敬之心則不以尊卑有間也太素等崇奉玉帝其亦可哉吾聞道家之學恬淡翛然獨往天地萬物俱不以經心太素等道流也乃汲汲于崇奉玉帝勞筋骨疲精神不恤其有見乎哉其亦報本反始之道有不得已者哉太素等設心之誠門徒趨事之勞施主相成之善皆不可沒乃為之記而系以詩曰皇皇上帝監觀四方巍巍天壇奠彼中央壇頂有宇以事上帝伊誰作之道流太素殿宇巖巖像設穆穆進趨拜跽孰不祗肅惟誠惟敬可以格天天福下民億千萬年重修三官廟記武陟之木欒店東南巷口舊有三官廟一所蓋元時之所建也國朝永樂初年廟貌傾圮遺址尚存正德改元上元之夜市人毛雄張瑄郭洎共議修復時地主李豸在焉慨然欲捨此地衆以為不可乃輸半價易之其地東西十一丈南北九丈既定修廟之事乃推道士郜某居民曲洪王聰董之材木瓦石工匠之費則居人各以其所有助焉乃起立正殿四楹中塑三官像東大王殿四楹西子孫殿四楹前門四楹道院房數楹鐘樓二楹約費銀三千兩廟成餘二十年矣鰲山衛教授王先生世居木欒蓋預聞修廟之事者也嘉靖十年春有事府城間語豫以修廟曲折因請為記先生豫厚友也故不可辭乃語之曰修廟曲折居人所知雖不記亦可也至於三官之神誣於世俗怪誕之説則雖世人奉三官之祀者或未知也請一論之以袪其惑可乎三官之名古不經見始見於漢張魯傳中魯以三官教行於蜀之雞鳴山凡人有所祈禳則書其事狀為三一焚於山上謂逹於天官一瘞於山下謂逹於地官一沉於水中謂逹於水官其祀之日則以正月之望為上元節而祀天官七月之望為中元節而祀地官十月之望為下元節而祀水官竊原其義蓋天陽也正月陽始用事故祀天官地隂也七月隂始用事故祀地官水旺於冬望故十月孟冬而祀水官蓋亦古者冬至陽生而祀天夏至陰生而祀地與夫大川海瀆之祀也張魯乃道陵之後道陵出於道家而道家以老子為宗老子嘗為周柱下史習於古禮三官之名或古禮有所傳而後世失其真耳不知何世妄人乃撰為三官經典謂陳氏子娶龍女生三子俱有神通一為天官一為地官一為水官可謂怪誕之甚矣夫人之所以祀天官者謂其分我以神且覆我也所以祀地官者謂其分我以形且載我也所以祀水官者謂其分我以血脈且出雲而生百物以養我也報本反始皆禮之正也若世俗之説怪誕不經則三官之祀遂為淫祀矣豈禮也哉然禮天子祀天地雖諸侯不敢僭焉小民而祀天地可乎曰是或一道也小民而饗帝王於家固無此禮然天子行在庶民或獻瓜果焉君子不罪其瀆而取其誠蓋禮之變也小民而祀天地蓋亦類此况先王制禮尊天而親地故社之祀小民亦得行焉社固地神也然則鄉民之祀三官則亦庶乎其可也大王未詳為何神子孫蓋亦古郊禖之祀也以其非廟祀之主故略之重修玄帝廟記天下之事成於有志大而經綸家國小而制作事物或創其所本無或飭其所已壞蓋未有無志而能成者也郡城東南故有玄帝廟一區考碑記則唐人謝景修之所創建也初名聖水觀後更今名纍經兵火國朝天順成化間都指揮薛分命耆老聶旺陸愷等重加修整廟貌復完𢎞治十年豫讀書廟中時惟前玄帝殿後三清殿僅存餘廊廡皆傾圮不治廟住持道士汪玄弼慨然欲修整而充拓之豫雖嘉其有志然計工費甚大恐其未能成也是年始建外門四楹次年於前殿右建聖母殿四楹正德元年於後殿前左建三官殿四楹右建四聖殿四楹七年於前殿左建帝君殿四楹十一年復於後殿之前左建轉廊五楹以奉先天聖母及南斗星君右建轉廊五楹以奉西王聖母及北斗星君次三官殿南建廊四楹以奉五祖四聖殿南建廊四楹以奉七真嘉靖六年復於前殿之前左右各建廊廡十楹以奉天將東道院後建殿四楹以奉聖父聖母其餘真觀祠及鐘樓鼓樓以次完美棟宇輪奐照耀逺近盛矣豫竊計其材木甎瓦丹青繪塑及工匠徒使之費非數千金不能給怪其致此必有他道及詢於人則曰無他道也弼自誓志修拓廟貌以來布衣蔬食不御酒肉凡經醮所得錢幣悉以供修廟費不營其私以故上自親王下至民庶翕然信之或助錢榖或助材木或助甎石川委雲集不約而至廟貌之所以有成由是道也豫竊歎弼一布衣士耳用志不變尚能有成如此大人君子有志於天下國家之事行之以至誠持之以悠久則豈有不可成者奈之何不多見也弼以豫嘗讀書廟中來徵豫言以記歲月豫嘉其有志而喜其有成也謹書是歸之俾刻之石使後之人有考焉云爾若記典則固未暇究也懷慶府重修城隍廟記城隍之祀古無有也蓋後世以義起之也古昔聖王之制禮也凡有功德于民者則祀之初無間于巨細故天地之覆載日月星辰之照臨與夫山川社稷之興雲雨生百物者既已秩諸祀典至於水防郵表畷之屬亦不敢遺蓋仁之至義之盡也城隍所以衛民其功不為不大顧未有享祀後世列于祀典蓋倣水防郵表畷之義而起者也始于何代吾未及考近世城隍之祀則不以主而以像且加以爵號被以章服我太祖高皇帝踐阼之初一新禮制謂高深不可以儀刑流峙無所與章服且百神皆受命于天世主之爵號亦有不可加者乃令止稱某府某州縣城隍之神是可以為萬世之法矣而各處城隍之祀猶多以像蓋沿前代之故而未及改也豫嘗觀乎其廟則冠履肅然侍衛森整大抵如守土之臣以故百姓皆謂府州縣官所以理民之是非賞罰于明城隍之神所以理民之善惡禍福于幽故民之祈福禳禍與寃抑之不得伸曖昧之不得白者官不能理則以訴于神不待召而自來不加刑而自畏蓋官有所不能制者噫聖人以神道設教城隍之祀以像是或一道也懷慶府城隍廟在府治東南歲久傾圮前太守曲沃趙公鐸欲新之不果去任今太守郯城周公舉謂事神以導民正典也况前人有遺緒乎乃盡發趙公所積羡財市材木瓴甋之屬復措置以益之命正術宋奎董其役百姓見役興亦各以所有來助始事于正德十二年夏四月庚子訖工于十二年秋八月甲辰凡新建大門四楹二門四楹正殿兩廊屋瓦脫落者補之丹臒漫漶者鮮之廟制益嚴人之進謁于神者益敬以畏鄉老張讓李雄許亨張貴郭鋭道士賀玄清王靜宣輩謂斯役不可以無述也乃來徵豫言以記故為道神秩祀之義而系之以修廟之月日以示乎後之人云白齋張先生修建碑記山西白齋張先生𢎞治六年癸丒冬來遊天壇樂其山水遂結廬隱居至十一年戊午遂發心募緣於壇頂修建玉皇殿三間南向又於殿前建天將殿左三間右四間東西向至正德改元丙寅始訖功四年己巳奉鄭懿王令旨召修本府玉清宫虛皇閣功完復回天壇隱居十年乙亥省城周府胙城王孫輔國將軍因有疾禱於天壇有感遣使齎書幣命先生崇修天壇頂之三清殿鐵瓦銅脊五間元君殿王母殿各三間俱南向左右列南北斗殿各五間東西向中修軒轅授道三級瑶臺一座臺下又建玄帝殿三官殿救苦殿各三間四聖殿一間左右雲堂共六間東西向各殿凡鑄塑聖像凡一百三十有四尊壇丁道院又建仙官殿三間廊廡二十間道院門徒所居方丈四十餘間至明年訖功嘉靖四年乙酉本府孟縣善士耿塤等請先生下山於郡城北沁河上修建石橋未完而先生去世矣門徒薛清濴馮清善等恐其師修建之功久而泯沒也乃來請曰先師往年修建玉皇殿執事幸賜之言今勒之石矣後修建虛皇閣及三清等殿尚未有記望賜以言庶先師之功行久而彌彰也吾友任遐齡宋文祥助為之請文祥具事之始末以告豫既不得辭乃為之言曰吾聞道家之教以性命為宗以精神為本雖治天下國家猶以為土苴緒餘則修建之事可知矣白齋先生乃殫慮竭力於此何耶門徒又汲汲然圖不朽於此夫豈亦有意乎抑吾又聞太上有言有之以為利無之以為用有也者治天下國家及修建之類也道之末也無也者性命精神之謂也道之本也非本不立非末不彰觀天之道必以日月星辰之文觀地之道必以山川草木之形觀人之道必以治平興建之用此之謂也白齋勤勞於修建門徒汲汲於碑記其有見於此乎乃撰次其事而係以斯言嗚呼有道之士其亦有感於斯言也乎是為記漢孝子郭丁二公之碑記行有過而不害於教衆人之所驚而君子之所取也夫道貴乎中愚不肖者既不能及而賢智者又或失之太過是以得乎中者為難然君子則曰與其不及也寧過蓋損過就中易強不及以至乎中難故云然也漢孝子郭巨丁蘭之行其所謂賢而太過者歟孝子之行載在紀傳天下後世之論者或以為恐幼子分其母之甘旨固孝矣然豈無他處置之法何至埋之刻木為母像而事之盡禮固孝矣然鄰人侮其母像雖為可怒然豈遽以殺之使黃金不獲則將遂埋其子矣母慈其孫必將啼泣悲傷雖甘旨滿前固不能下咽也養親之口體而不能順其志孝子之道固如是乎使木像無垂泣之異有司不原情貸死則遂與鄰人抵命矣縱母尚生存為人所侮茍不至以死復讐然猶當權輕重而處之奈何以一朝之忿而置親之無後乎且後世之事親者必殺其子與身然後為孝是可以為常法乎不可以為常法豈可以為教乎二子之行誠過矣君子則曰論人者當先觀其心茍可取行之過雖不合道無大害也何則蓋舉百鈞者不難於舉一羽明能察秋毫之末則輿薪之見固有餘矣在禮人子之事親也衣服飲食之屬凡所以養其口體樂其心志者無所不至初不以妻子之故而怠故好貨財私妻子不顧父母之養者世所謂之不孝大孝顯親其次不辱故縱耳目之欲以為父母戮世亦謂之不孝二子所行雖未合乎道之中然由其心推之則禮之所謂孝皆所優為而世之所謂不孝蓋斷乎其無有矣論道者貴乎中不貴乎過取人者則當先於心而後乎其迹二子之心豈庸衆人所可及哉殺其子與身且不恤則凡可致愛敬於親者故無所不用其情矣世之事親者使能體二子之心而行之以禮則孝之道在是矣夫何害於教哉論均徭私論或問近日有司審編均徭以田土為主其法如何曰此非祖宗之法也蓋流俗相傳之誤也祖宗之法具在諸司職掌户部職掌田土項下云凡各州縣田土必須開豁各户若干及條假四至係官田者照依官田則例起科係民田者照依民田則例徵斂務要編入黃册以慿徵收稅糧如有出賣其買者聽令增收其賣者即當過割不許灑𣲖詭寄犯者律有常憲户口項下云凡各處戶口每十年各布政司府州縣攢造黃册編排里甲分豁上中下三等人户遇有差役以慿點差賦役項下云凡各處有司十年一造黃册分豁上中下三等人户仍分軍民匠役等籍除排年里甲依次充當外其大小雜泛差役各照所分上中下三等人户點差由是觀之則田土納稅糧户口當差徭其不相混也明矣今乃照田土當差是豈祖宗之法哉或曰人户有上中下三等蓋以其貧富不同也貧富難明田土多者必富少者必貧則照田土編差蓋法外意也似無不可曰户有上中下三等蓋通較其田宅資畜而定之非專指田土也若專指田土則施於農民可矣工商之家及放債居積者皆不及矣古人立法厚本抑末今人立法厚末抑本豈知治道者哉况差役以人丁為主以上中下三等較其貧富以為𣲖差之重輕此法意也今舍人丁而論田土蓋失其本矣夫豈可哉或者曰田土不當起差祖宗之法固然矣近聞外縣有以寄莊人户不當差役申請於上者巡撫批稱種田而不當差有違於租庸調法令其照田認差然則計田當差雖非國法或古法乎曰此巡撫未考而誤批也唐法有田則有租即國朝田土納稅糧之意也有身則有庸即國朝户丁當差役之意也有户則有調即國朝農桑絲絹之意也種田而不納糧謂之有違於租庸調法則可也種田而不當差謂之有違於租庸調法則不可也若田土既納稅糧又當差役是有田者不惟有租而又有庸而有身者遂無所役矣不亦誤之甚乎曰以田土當差唐法知不然也或者先王之法乎曰先王之法其詳不可考矣然孟子曰有粟米之征有力役之征有布縷之征粟米取於田土即租法也力役取於人力即庸法也布縷取於園宅即調法也由是而觀則計田土以當差役既非古法又非國法而有司乃有此行不亦謬乎曰有司有此行何也曰此周文襄作俑之過也宣德年間周文襄巡撫南畿患民間起運稅糧之不足也乃令稅糧正數之外多加耗米以足之除辦納稅糧外有餘剩者謂之餘米復恐民以加耗之多怨已也乃令凡民間户丁之差役料物之科派皆取諸餘米此蓋朝四暮三之術也本傳謂小民雖多出耗米然耗米之外再無差科之擾深以為便東南多遵用其法後又自稅糧變為田畝故東南有田差糧差之説南士仕西北者漸推用其法故西北近年亦有田土當差之説此蓋不考祖宗之法而惑於流俗之傳者也或者曰文襄之法雖非國法既民以為便則用之似無不可何必拘於舊法乎曰民以為便亦據文人之傳而言耳實不然也夫差役出於户丁士農工商之家除例該優免外其餘户丁蓋未有不當差者也今止令取於耗米則是士工商賈之差農獨代當之矣是豈均平之道哉况驛遞馬牛車船之役俱出於田土稅糧則農民已偏纍矣奈何復以雜差再纍之乎今論者皆知東南之民困於稅糧西北之民困於差役而不知東南所以困於稅糧者以差役亦出於稅糧之故西北所以困於差役者以既有丁差又有糧差之故由是而觀則周文襄輕變祖宗之法而開此纍民之端其罪安可逃也或者曰審如此則寄莊人户不當差役者皆幸免矣曰此有司不知守法之過也使有司知守祖宗之法審定三等户則之時不論士農工商凡田土資本市宅牲畜多者俱定作上等派與重差則寄莊人户雖買别州縣之田而難逃本縣之差矣何幸免之有今惟不守祖宗之法審編均徭舍户丁而計田土故寄莊人户有躲差之弊欲革其弊盍求其本乎或曰祖宗差役之法今亦有行之者乎曰北畿州縣審編均徭初止審三等九則户門並不注定差銀多寡數目審定户則然後通算三等人户除役占優免外該當差者共有若干丁却算本州縣銀差力差該用銀共計若干兩方令三等九則户丁差等出銀期足供銀差力差之用而已此蓋遵祖宗之法而又通其變者也蓋祖宗之法止令照三等户則點差但差少丁多用之不盡點差之時不及差者幸免見當差者偏纍今乃令丁皆出銀差之重者朋合應當則人丁無有不差者矣此蓋均徭之善法也河南舊例審編均徭雖未以田為主亦未以丁為主其人丁差銀增減從審官之意多寡無一定之法少有不至兩者多有三五兩者有十餘兩者甚有至四五十兩者丁多之户銀多亦不為過單丁之户銀多則一差用之不盡必須分為數差是一丁而數差也豈照户點差之法哉但上下習於聞見不之覺耳近聞巡撫吳公所定均徭則例每地一頃出銀四錢每人一丁上上户出銀一兩二錢以次各照户則出銀不等若該縣銀多差少則遞減銀少差多則遞增視舊法頗有定規但偏纍農民未盡善耳必改北直隸之法上不失祖宗之法下無偏纍之弊乃為盡善此蓋識者所深望也或者曰今之富家或田連阡陌或資纍巨萬較之小民豈止什伯若止照三等户則計丁當差其丁多者出銀固多其丁少者出銀甚少豈不為幸免乎曰古人為國藏富於民蓋民之富者官府之緩急資焉小民之貧困資焉時歲之凶荒兵戈之忽起資焉蓋所恃以立國者也平時使之應上户重差法如是足矣必不得已則準北畿事例上户丁少者量出門銀亦可也豈必盡取所有使之僅與小民之貧者相若然後為快乎於戲時使薄斂先聖格言繭絲保障後賢深慮奈何今在位者之不思也或者曰不在其位不謀其政子林下人也嘵嘵多言無乃為當道者所惡乎曰舍已從人大舜之所以聖也聞過則喜子路之所以賢也吾以聖賢望人痛小民之受害故私論之蓋遵庶人傳言之訓而為之也蓋冀其或聞而改之也若恥過作非聞諫而怒則小人也當道諸公其欲為聖賢乎欲為小人乎必有所擇矣作均徭私論均糧私論或問丈地均糧之法如何曰此朝廷仁民之政也第中間曲折各有利害行之不得其道則反以害民此不可不知也或問其故曰田有上下則糧有重輕此自然之理也禹貢之田分為九等稅糧之輕重往往因之蓋為此耳天下之田吾未能知河內之田則頗知之矣上田歲收畝不下兩石多或至三四石下田歲收畝不及一石少或至三四斗大抵上田一畝之收抵下田五畝國初定糧失於分别一槩定作每畝糧八升五合後官府以下田人户辦納不前也乃議令起運重糧多派於上田里分存留輕糧多派於下田里分蓋亦裒多益寡稱物平施之意也雖未盡得其宜而民病亦少蘇矣近年上司患里書那移作弊也乃令不分起運存留俱總定一價則上田下田無所分别雖曰可以絶里書之弊而下田民戶固已不勝其害矣然坐派之法歲有變易民之害猶有時而解也若丈地均糧初時不審上田下田一槩均派糧額一定不可復變則下田之受害蓋有不可勝言者矣夫田地有上下則稅糧有重輕與犯罪有大小則受刑有重輕其理一也犯大罪者雖絞斬而不為苛犯小罪者雖笞杖而不為縱蓋各得其宜故也或者患吏書之舞文也乃一槩定為徒流之刑以為可以絶弊抑不思宜絞斬而得徒流者固為幸矣宜笞杖而得徒流者不亦冤哉今不論田土上下而一概均之以糧何以異此往嘗與巡撫徐公論之徐公深以為然故令丈量田地分為三等均糧之額初則通以中田為凖下田則少損之上田則少增之以下田所損之數為上田所增之數蓋亦所謂稱物平施之意也傳聞近議不許田分三等蓋亦未之思也若他縣之田無甚上下猶可言也河內之田果不分上下一槩均糧此則名雖均糧而實則不均之甚者也此利害之大者也而所聞又有可論者間巡撫公文謂除河路外蓋謂河路非可耕之田故除之也而承行官吏不明其意乃令河止除丹沁二河新開河道引水澆田者不除其河身所占之田俱令民田在兩岸者包納或問其故則曰引水澆田人户得利故不當除竊謂引水澆田之利衆人之所同也非獨兩岸有田之民也而令其包納稅糧嵗無休時此何理也路止除驛遞大路其餘通行古路俱不得除其稅糧亦令民田在路兩傍者包納竊謂民田在路兩傍者人畜往來踐蹂固已受害多矣古路衆人之所往來與驛遞大路無以異也乃復令其包納稅糧此何理也至於田內墳墓雖上司未有明文竊意丈地均糧亦不過丈實耕之田而均以實有之糧耳墳墓非可耕之田其不當徴糧蓋有不待言者矣今乃令墳墓不除有主者照地數均糧無主者聽民納銀於官平治為田照數均糧竊謂先王有掩骸埋胔之令國朝有漏澤園之設而平治他人墳墓為田園者律有明禁此蓋朝廷恩及死者之仁政也而一切不顧止曰吾將以均糧也不知均糧之初意果若是乎此三者亦利害之大端也小民被害而不敢言吾黨又以不在位而難顯言故私論之庶轉聞於當道之仁人君子或有以處此也夫變法本以利民而反為民害仁人君子在當道者不知則猶有所諉知之而不為一處亦安忍哉然此非吾事也非吾責也吾言止於此矣或疑田之上下難定曰此不難某鄉之田上某鄉之田下縣民蓋無不知者今宜令丈地委官於所丈之田各區之下明開水田旱田及在於某地方然後集合縣里老當堂會審某處係水田或上或中或下某處係旱地或上或中或下各親筆填寫於下面審既定水田上等者則通定作上地中地則令與上地五分中地五分下等則令與上地三分中地七分旱地上等則定與中地七分下地三分中等則定與中地五分下地五分下等則定與中地三分下地七分田之分數既定則斟酌損益均之以糧自然人心可服而事成矣田之上下若不官自審定而委之里書則弊既多端人亦不服事豈可行哉夫變法本以利民處之不詳則反貽民害仁人君子在當道者亦安可避一時之勞而不為斯民永久之計哉與楊邃菴論兵五篇論賞用兵之法非賞無以勸功是以國家立法凡戰勝殺敵者俱計首級行賞升官但此法可施於小敵而不可施於大敵兩軍相接兵刃相交縱有殺傷豈暇斬取首級縱賊衆大敗我軍若務斬取首級其姦惡賊首必從容逃去斬首雖多亂終不息况揮刀雖在於一人成勝實由於衆力今有首級者方論其功無首級者通不見録亦非所以使之併力齊心也且中隱危機使賊知餌兵之法則破軍殺將其機皆由於此是尤不可不慮今宜别立賞格戰勝之後總計首級多寡而次第其賞將領作一等先登陷陳作一等衆人作一等其有顯立竒功人所共見者另賞不拘賞格則接戰之機勸功之道兩不悖矣論罰當時朝議於敗軍誤事將官止令記過待事寧之日來説余謂賞罰當速庶將士畏法用命欲擬即先革職令其帶罪殺賊有功方許復職語多不能盡記論術朝議凡強賊除首惡不赦外餘賊滚馬投降者俱各免罪此固古法但時勢不同反能害事蓋我之兵威既振賊之生路已絶恐其致死拒戰縱能剿殺我軍亦傷故出誅首惡赦脅從之令一則開彼內潰之路一則全吾好生之仁也今我兵方委靡不振賊勢方猖狂自恣乃先宣此令於外使姦惡窮民無所畏懼流賊所至從者如歸其意蓋謂今日從賊得以搶掠自養賊若勢進則可圖望不軌賊若勢退亦可以投降不死是此令不惟不能潰賊之黨而反益其黨矣令出不可收回今宜再出一令凡四方英雄豪傑之士許詐投賊中或傳報消息或臨陳為我內應俾其從賊陳中殺起則賊衆自然驚敗本人須異其衣帽我軍辨認不殺若得便擒斬首賊重加升賞如此則賊首不免疑懼不敢多收姦惡窮民而其黨日孤矣論倡朝議庸人為賊不足慮姦雄從賊乃可慮行令天下有司官貟將部內豪傑籠絡歸我庶不為賊用但念惟豪傑方識豪傑方今有司豪傑者少彼豈能識誰為豪傑而籠絡之哉况此令又不可宣布蓋恐沮忠義之心長姦雄之氣也今宜别立一法曉示天下謂朝廷百五十年撫養百姓恩德甚厚今流賊乃因承平日久民不知兵之故糾合姦邪殺害良民擾亂天下甚為可惡爾等豪傑之士固獨力難抗坐受其害豈不誤哉令天下不拘官民師生軍民人等有抱英雄之材者自行糾合鄉里演習武藝賊至勢小則自行擒捕勢大則助官軍夾擊有功與官軍一體升賞如此則人人能戰在在有兵流賊之勢自弱而籠絡豪傑之術即在其中矣論權朝廷命官領兵剿捕流賊此常法也但事無統紀賊在直𨽻則山東之官不問賊在山東則河南之官不問盜賊縱有敗衄之時亦得以東西逃躲終難捕滅今須設一總制官員令其隨賊向往即督本處官員調撥軍士從便剿捕則盜賊之路自窮而平定之期有日矣柏齋集卷八
