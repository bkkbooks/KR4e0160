body:
  text: 柏齋集卷六明何瑭撰序天衢獨步卷序易大畜之上九曰何天之衢亨象曰何天之衢道大行也士大夫得志而行道於時者功業輝煌心意伴奐豁達無礙與行于天衢者無異故大易取象焉然道不徒行必畜而後行大畜之象曰天在山中大畜君子以多識前言往行以畜其德意士固未有不能畜德而能行道者也伊尹之耕於有莘也誦詩讀書以樂堯舜之道一介不茍取豫其所畜大矣三聘而起相湯伐桀功格皇天名垂後世豈非能畜德而行道之驗耶鞏昌漳邑張生鳯翔從其父審理先生宦學懷慶學既成矣以明年期當鄉試乃治裝西歸諸友各賦詩詞贈别且題其卷首曰天衢獨步蓋以得志行道望之也生亦嘗從豫遊豫見其縝密而淵深有可以進於逺大者於其歸也恐其志於行道而畜德以為之本者或未𢎞也故以是告之噫生念哉多識前言往行以畜其德道之行也不難矣髙車駟馬圖序通判劉公致仕西歸縉紳之士相與餞别乃繪高車駟馬圖以贈而屬瑭序其意或曰髙車駟馬仕途之所有事也公致仕矣贈之以此無乃動其盛衰之感乎豫曰不然富貴者儻來之物也有時而來有時而去蓋不可認為已有也尚矣盍不觀於天道乎春夏之時大化氤氲草木之勾者萌甲者坼葉者敷花者實或紅如丹砂或黑如點漆或黃如精金或白如美玉或彩色間錯如錦如繡蓋不勝其繁華之可愛也未幾而金風薦爽嚴霜布冷草木之蓊然者雕矣沃然者稿矣原野之間一變而蕭條寂寞矣蓋盈虛消息自然之理雖天地不能違而况人乎士君子之幼也藏修遊息凡聖人之經賢人之傳與夫百家諸子無不取而閲之俯而讀仰而思其志固將以有為也及壯而登仕途也或在廟堂或在郡縣乘髙車䇿駟馬僕御揚揚前呵後擁富貴之樂固世人之所榮艷而奔走也然隂陽密移形容暗換黝然黑者白矣渥然丹者稿矣矯然健者亦衰而怠矣於是乎解紱歸休懸車息駕蓋行藏進退人道之常自古無不然也公明達此宜無不知者何盛衰之感之有况人情久靜則思動久動則思靜公馳驅仕途凡幾年矣親戚故舊不相見者亦既久矣今兹之歸也渡大河入函關陟秦隴親戚故人或迎於途或候於門開酒命觴握手論舊公豈不歡然而樂乎佳時勝日登鳯山瞷洋水或舒嘯以來逺風或吟哦以消永日心曠神怡蓋有不知宇宙之為大而萬物之為夥者回視宦途之髙車駟馬真黃粱之一夢耳又安能戀戀於已墮之甑而鬱然不釋也耶衆譁然曰此達觀之言也請書之以為公贈於是乎書儒學管見序或問儒者之學曰五經四書之所載皆儒者之道也於此而學之則儒者之學也或問其要曰莫要於大學程子曰大學孔氏之遺書而初學入德之門也學者必由是而學焉則庶乎其不差矣請問其指曰人之有生莫不有身焉亦莫不有家焉仕而在位則又有國與天下之責焉修身齊家治國平天下莫不有道此則道之實體也具此道於心神性情之間明德也行此道於家國天下之際新民也明德為體而實見於新民之用新民為用而實本於明德之體蓋內外合一者也而莫不各有至善之所當止焉然斯道也非知之於先則不能行之於後故聖經有知止能得之訓焉物有本末事有終始知所先後則近道矣此大學之要指也請問其詳曰人之生也莫不有心以為此身之主忿懥恐懼好樂憂患皆心之用也情也其未發則性也方其未發也必廓然大公無所偏倚心之本體方得其正一有偏倚則不正矣此善惡之根也或曰朱子謂心之未發如鑑空衡平無正不正之可言必其既發則正不正始有可見故章句謂用之所行或不能不失其正今乃謂未發之時心已不正何也曰心之正不正雖見於既發之後實根於未發之前如鑑之不明衡之不平雖未照物懸物而其體固已不正矣至於用之所行或不能不失其正則修身章內親愛五者之偏正指此而言所謂已發而為情者也若謂正心傳內不得其正即指已發則修身傳內五者之偏又何指耶朱子章句蓋一時之誤也其以正心次誠意之後何也曰意不誠者明知善之當好而不能行明知惡之當惡而不能去蓋自欺之小人也又何暇論其心之正不正哉其或誠於好善而惡惡矣而氣稟識見之偏心有未正則接人處事之際往往隨其所偏而發不復加察則雖誠於好善而惡惡不免有時而失理此則君子有所不免誠意之後繼以正心蓋欲其涵養省察使其心未發之時無少偏倚感物而動之際又加察焉使情之所發用之所行無一不中乎理此則儒者之極功而聖人之能事也然五者之情各行於接人處事之際接家人國人天下人蓋無不然也而所接莫先於家人故於修身齊家傳內發之非謂接他人不然也情之正者善也不正者惡也行於家則有孝弟慈焉有仁讓焉善也不孝不弟不慈貪戾惡也行於國則有事君事長使衆之道焉有興仁興讓之教焉皆善也反乎此者惡也行於天下則有與民同好惡者焉不專利者焉善也好惡徇一已之偏者焉專利而病民病國者焉惡也格物致知云者格修齊治平之道而真知孰善孰惡者也誠意云者行修齊治平之道誠行其善而去其惡者也至於天下之治亂天命之得失則善惡之效而萬世之勸戒也此儒學體用之大全也或曰中庸語孟五經何如曰中庸與大學相表裏者也然詳於善而略於惡有所勸而無所戒故視大學為緩語孟則或因一人一事而發五經各自一體亦多因一人一事而發非統論也學者誠能於大學而有得焉則三書五經所載者孰為修身孰為齊家孰為治國平天下孰為通論可以一貫而無遺矣儒者之學豈復有他藴哉或曰論學可矣如為政何曰學與政非二道也學以政為大餘小節也天下之政總於六部以大學之傳考之平天下之用人吏部兵部之政也理財則户部工部之政也治國興仁讓之善則禮部之政也而禁貪戾之惡則刑部之政也然國與天下一也傳者特因其逺近大小而互舉之耳實則無二道也吏部兵部之用人能同天下之好惡而不徇一已之偏户部工部之理財能節用愛人而不為聚斂之計禮部刑部能興善而禁惡則謂之賢公卿有司可也本之以大學之道而行之以國家之法為政之道思過半矣嗚呼此儒者之正學也或者乃舍而不由其徒從事於記誦詞章者既不足道而所謂道學者又多用心於性與天道之間及存心養性之説名雖可觀實則無補其可歎者多矣功倍於小學而無用髙過於大學而無實宜朱子之太息也或曰科舉如何曰科舉之學不患妨功惟患奪志先儒已有定論儒者之學明德新民新民之功必欲治國平天下茍不出仕何由治平茍不科舉何由出仕然則習舉業以應科目亦儒者之正也易乾之九三曰君子終日乾乾夕惕若厲無咎夫子傳之曰君子進德修業忠信所以進德也修辭立其誠所以居業也其九四曰或躍在淵無咎夫子傳之曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也深知此意則習舉業以應科目為儒學之正也明矣嗚呼天理人欲同行異情學者其尚繹思之也哉大學之道明德為體新民為用體即用之體用即體之用如耳目與視聼然非二物也朱子發明已至而欠明切真西山作大學衍義所言雖切於勸戒而於大學之道實則不知諸儒之論亦多謂先治已後治人不免離體用為二豫懼學者不知所用心也故著儒學管見以救之但所言簡略未備學者詳之可也樂律管見序豫幼讀西山律吕新書初蓋茫然不知所謂玩索之久始得其門户而疑其有所未通後讀書翰林見宋陳氏樂書反復參玩乃若有得然後知西山之説有未至者顧時無同志無所切磋藏之中心蓋二十餘年矣近見士夫著述有論及樂律者惜其於古人作樂用律之意均未有發明乃録出管見如右蓋將求正於四方之君子庶古樂可復見耳觀者幸恕其僣妄云隂陽管見序隂陽之論豫幼聞其名而未知其實反覆乎周程張邵之書出入乎佛老醫卜之説者將二十年至三十八歲玩伏羲卦象而驗之以造化之道乃若有得惜諸儒之論皆失其真也欲著述以明之以其非日用所急且恐啓爭端也藏之中心蓋十五年於今矣間與一二知已談之而李東郭先生屬豫筆成書因略書數條告之王浚川許函谷復有所疑且豫著述之本指亦未明也乃補書三條于內嗚呼性命之難言也尚矣一已之見安敢必他人之皆我從哉引伸觸類正誤糾失蓋有待乎世之君子焉隂陽管見後語序造化之妙先聖已有論者見於易象及禮祭義春秋左傳諸篇可考也但所言簡略耳蓋以其理微妙難明恐學者知未及此驟而語之反滋其惑故等間不論所謂子不語神子罕言命夫子之言性與天道不可得而聞是也但近世儒者不察先聖之指未明造化之妙輒以已見立論其説傳於天下後世學者習於耳目之聞見遂以為理實止此而不知其繆也豫惜其失故著管見以發之而爭辨紛然而起蓋為先入之言所梏耳豫不得已乃著管見後語以發之學者熟玩而細察焉可也醫學管見序余平日好養生之術以醫道切於養生且可寓濟物之仁也故留意焉沉潛日久頗有所見多前賢之所未發時或語人契者甚少蓋以其素不留意故驟語之而不入也竊念余老矣不忍使所見無傳終於無用且恐或有差誤無以來賢者之教也乃録出如石嗚呼醫非小道而可以寄死生之命士君子平居略不留意一旦有疾乃委死生於庸醫之手豈不誤哉力學應事之暇時一留意蓋未必不賢于博奕也家譜序何氏之先世為直𨽻揚州府泰州如臯縣江寧鄉十五都何家保人譜亡世次無考自瑭髙祖忠一公國初以從戎始遷懷慶故今為懷慶人髙祖葬府城東劉塞村之西髙祖之叔父曰興無子附葬髙祖墓左髙祖之子孫皆從葬焉瑭念自髙祖至瑭已五世矣族繁世逺恐後分散無所紀也乃作族譜以紀之俾凡我同髙祖之子孫家有一册縱後時變族散亦可以考見枝派尋究本原以不失親親之意云爾附譜例五世之後止紀同髙祖之子孫餘不通紀服盡也此小宗法也然譜皆有始祖至五世之子孫冠於譜端大宗法蓋存乎其中矣子孫散居異方者服未盡而譜亦不紀勢不行也散焉而知其異合焉而知其同仁至而義盡矣家訓序古人齊家之法略見於禮之內則朱文公纂集家禮已具載司馬溫公居家雜儀蓋亦祖述內則之遺意而為之者也俱可遵行近世如浦江鄭氏家規肥鄉郭氏家孰事親上黨仇氏家範亦有可取但家規家範所載賞善罰惡之法過於明白使人難堪此則不必行耳閨門之中恩常掩義或有過惡戒之不改則治之纍戒不改則絶之然不必彰其形迹蓋猶望其悔而改也此五書者子孫皆當知而遵行之此外子孫有聰明者則漸教以小學四書五經諸史可也幸得有官則行道建功上也守亷奉法次也貪酷姦諂則非吾所望於子孫矣恐吾一旦不諱不及教訓子孫故於間中書此垂訓凡我子孫尚念之哉引仁壽延恩詩引吾鄉韓老先生盛德重望素為人所敬服𢎞治乙丑壽登八十適今天子嗣位之初尊上兩宫徽號覃恩天下凡民年八十以上者賜以冠帶以榮其身先生既受命親黨畢賀仲子佶方肄業太學留京師縉紳交遊者各賦詩以贈為先生壽秉仁裝為册葉題之曰仁壽延恩屬序於瑭瑭竊謂德莫大於仁福莫先於壽皆人所歆羡而難得者也世固有壽者矣而未必仁亦有仁者矣而未必壽兼得之者不尤難乎抑又有難者焉慨自憲教乞言之禮廢而尊賢養老之意衰况夫擾攘之時強弱相陵貴壯賤老番番黃髮能免播棄幸矣何尊禮之敢望乎間有錫爵賜帛之典然曠世僅一再見遭際者不其難乎今先生仁且壽復生太平之時際曠世之典豈非慶之大者乎蓋難之又難者也抑窮簷蔀屋之下淳龎之老雖幸遇曠世恩典然沾被者亦不多得噫此人所以又貴乎有賢子孫也先生三子長智秉貞季斌秉德皆有士行秉仁節髙而器宏學贍而才敏他日顯揚夫豈止此此固縉紳所縷縷也瑭特有感於遭際之難姑書以為引云棠隂去咏引棠隂去咏詩册懷郡士夫為分巡郤公而作者也公分巡於兹三年矣禁姦革弊凛如秋霜禮士待賢藹如春日蓋無不畏且愛焉今年以陟明擢陜西撫民參議士大夫以禮幣賀者俱郤不受惟以詩文賀者則不辭於是衛揮使吳侯乃約士大夫之能詩者各賦詩一章以頌公德裝為册葉題之曰棠隂去咏復請豫序其首簡豫竊惟甘棠之詩周人為召公而作者也召公巡行南國以布文王之政或舍甘棠之下去後民思其德遂愛甘棠而不忍傷復作詩咏之所謂蔽芾甘棠勿剪勿伐召伯所苃者是也詩册曰棠隂去咏蓋以召公比郤公也其指逺矣豫於此竊有感焉自召公而後去思之詩遺愛之頌代有作者固當不止一人然惟甘棠之詩盛傳餘皆不傳豈無其故哉詩云鶴鳴于九臯聲聞于天言誠之不可掩也後來諸公之德政或者視召公猶有所未至乎此傳而彼不傳蓋誠不誠之所分也夫子曰詩可以興可以觀公不受禮幣而受詩文夫豈無意哉觀前人之得失為在已之法戒感奮發勵期與之齊公之意其在此乎罔俾召公專美前代豫於公有望矣於是乎書以為詩册引蕭母北堂慶壽引姻家蕭母太夫人壽登八十內外族姻捧觴稱慶者先後相繼卷軸充庭珠璣溢目子鋭等裝為册葉瑭忝在姻屬之末敬題其首曰北堂慶壽復推厥由以為古來人生以百年為期故百年為上壽八十為中壽六十為下壽殤夭短折之餘得至下壽者尚以為幸况中壽上壽乎如太夫人之壽誠可慶也夫德與壽相為表裏者也有德者固可得壽然必有德而壽者斯為可貴否則深山之木石大壑之龍蛇雖多歷歲年亦何益於世敗常亂俗殘人傷物生一日則貽一日之害生一歲則貽一歲之害故曰老而不死是為賊若是者亦何貴於壽仰惟太夫人慈仁明逹輔相先君子恢拓家業為懷慶巨室訓教諸子孫賢明仁厚為一時聞人此皆人所共知非姻戚之私言也太夫人之德槩可見矣家範之嚴內外取法壽一年則示法於一年壽百年則示法於百年此固人情之所深願也詩云淑人君子正是國人正是國人胡不萬年豈惟男子然哉請借以為太夫人夀行山别意引郡伯司馬先生南都士林之冠冕也蚤登甲科即拜南臺御史時母夫人方在堂先生公退則與諸弟奉甘旨問起居於堂上雖政聲動海內而身實未嘗離庭闈此蓋君子之全樂而人生不常有者也嘉靖辛卯秋以銓部薦來守懷慶始與母夫人及諸弟别明年謀迎母夫人來宦邸以養母夫人以顧戀庭闈不果來於是仲弟洛瞻乃奉母命來省兄弟相見蓋雍雍如也留兩月將去依依然不忍别門下士庠生瞿懋等聞之乃賦詩以贈裝潢成卷題之曰行山别意間來請敘其首豫竊惟臨别贈言自古有之然情之所感不同則言之所發隨異念昔先生拜官之初日與母氏兄弟相聚於一堂之上今乃相望於千里之外弟兄幸一相聚又不久而離其情之戚戚蓋有所不能免者矣然丈夫之生也桑弧蓬矢以射四方固無終身不出户庭之理况豪傑之士以顯親為孝以亢宗為榮今先生雖暫屈小郡然他日致位台鼎實由此進則所以大顯親之孝崇亢宗之榮者此蓋其權輿也母氏兄弟雖有離違之憂亦可以少釋矣諸友贈言之意其殆出於此乎抑古人贈言非直敘情也蓋亦有感發之益焉嵩嵩蒸民拳拳以德業相期望故申伯仲山甫之賢至於今有信夫南都天下英才之所萃也洛瞻藏修逰息於其間所造深矣觀於海者難為水不知於諸友之贈言其亦有所感發乎司馬之先有太史氏壯逰四方登龍門探禹穴觀風鄒嶧觀射於矍相之圃無所不至歷覽既廣氣益豪邁後遂以文章名天下懷慶蕞爾郡也言未必於吾洛瞻有益然行山大河則亦天下之壯觀也洛瞻歷覽於此其亦有所感發也乎他日復有以文章名天下如太史者安知不在此乎謹書此為贈言引蓋將以徴其後云三晉第一家引上黨仇氏以孝義禮讓聞於三晉大司成虎谷王先生應韶篤論君子也嘗以比浦江鄭氏手書三晉第一家字贈之虎谷不妄許可由是逺近縉紳士夫咸信仇氏之賢無異詞者仇氏宗子瀋藩儀賔時茂嘗命子熙從豫遊來懷慶懷慶之士以其義門之彥也咸願與交而熙溫潤典雅不以行能驕人以故無不愛且敬者於是各賦詩以贈而請序於豫豫惟古之君子樂道人之善故上自明君賢臣下至匹夫匹婦嘉猷忠謨懿德粹行往往播之歌詩以頌美之載於三百篇者可考也聖人刪以為經垂訓萬世至今讀之猶可使人感發興起至有不知手舞而足蹈者傳謂詩之為教可以美教化厚人倫移風俗豈不信其然耶今仇氏以孝義禮讓為縉紳所推許諸友乃從而咏歌揄揚之是固古君子之用心也夫頌其始所以規其終也褒其善所以勸其不能也觀者以是求之則詩之作也不為面諛矣柏齋集卷六
