body:
  text: 柏齊集卷三明何瑭撰序贈許都事序南京前府都事靈寶許君廷章故冡宰東崖公第六子也正德甲戌以公䕃入國學讀書學成歸侍親時冡宰公已捐館惟太夫人在堂廷章乃築壽萱堂以奉甘㫖復築栁溪書院因以自號承歡之暇則溫繹舊業以故所得益深所養益粹嘉靖乙酉試吏部第四人授今職丙戌蒞任同鄉士夫官南京者相率往賀廷章冠帶出迎客觀其容退如也聽其言訥如也及即席坐徐與之論古今事成敗得失則秩如也乃知其抱蓄不凡咸加敬愛謂冡宰公賢子謂瑭宜有言以贈瑭竊惟行潦之水不生蛟龍蟻封之丘不産虎豹滄海泰山則固有之其理則然也冡宰公以大才直節為朝名臣夷夏莫不聞則家庭之訓誨可知矣子之多賢無怪也𢎞治壬戌瑭叨中科第時公以少司徒致仕家居次子廷綸官瑣闥三子廷美官烏臺瑭始得納交焉正德初元公以廷臣交薦徵拜大司馬尋轉大冢宰廷綸廷美俱以大臣子不任言路改翰林豫乃得朝夕見焉廷綸則聰敏洞達如日月可仰廷美則端謹溫潤如圭璧可愛雖德器不同其為天下之瑞一也聞其伯兄廷言中癸卯鄉舉蚤卒季弟中丙戌進士五弟俱賢而未見也乃今識廷章焉雖職位間散無以自見而其才可知也周有八士漢有八龍許氏昆弟可匹休矣盛哉盛哉孟子有言所謂故國者非謂有喬木之謂也有世臣之謂也元愷在唐虞伊陟巫咸魯公丁公在三代卓卓不可尚矣豫嘗謂三代以下鮮世臣非謂其爵位之相繼者無人也謂奕世載德不忝前人者不多得耳今冢宰公振於前而廷章昆弟繼於後世臣其在是乎廷章念哉吾不復贅辭矣贈分巡僉憲郗公擢陜西撫民參議之任序僉憲郗公分巡河北駐節懷慶蓋二年於今矣以吏部薦擢陜西撫民參議郡二守張公雅䝉禮待乃來徵言贈别以為知己之報豫竊惟古人贈言體各不同仲山甫奉命城齊詩人作蒸民送之備舉其平日德業之盛美之其序城齊不過數言而止韓侯受命之國詩人作韓奕送之則略不及其平日德業而夙夜匪懈幹不庭方與夫實墉實壑實畝實籍之類凡所以勉其修舉職業者蓋亹亹不足若有遺論焉此其故何哉蓋城齊常事山甫以元老重望任之無足慮者故略韓侯之國則有地方安危治亂之寄其職任甚重故勉之不得不詳其體則然也仰惟僉憲公分巡河北明察果斷威惠並行蓋有震動如雷霆涵濡如雨露者其德業之盛及履歷之詳赫然於人之耳目不可掩也臨别贈言縱不盡述人誰不知哉竊念公兹之任受天子之命有地方之責職任之重蓋有過于韓侯者則屬僚下吏受公之深者為公深慮逺計情其可已哉或謂撫民之任三省相連流民雜處凶頑不逞之徒時出乎其中寬之則玩而不服嚴之則激而致變治之有甚不易者豫竊以為不然民不患難治患治之未得其道耳龍尚可馴虎尚可擾而况人乎哉龍虎所以可馴擾者無他順其情而已矣撫民之任地方之險易逺近人民之强弱衆寡吾不能知至于民之情則未有不可知者也民情莫不欲生省吾刑罰則民可以生矣民情莫不欲富薄吾稅斂則民可以富矣民情莫不欲安禁吾侵擾則民可以安矣民情莫不欲逸簡吾差徭則民可以逸矣非禮決不可缺而民所難能者勿强非法決不可為而民所易犯者勿禁非罪決不可赦而民有詿誤者勿誅明以告之信以守之公以行之持以無倦如此而民情不得者未之有也民情得矣縱有二三凶頑不逞之徒誰與為黨刑之則服𠞰之則滅矣是何難治之有哉邇悅逺來政成名立然後晉位廟廊大福海內何所不可此皆公所能為亦屬僚下吏所望于公者也謹代言之以獻公諒不謂其䇿之平平而忽之也贈僉憲郗公擢陜西撫民參議序分巡僉憲郗公駐節懷慶患本府人才委靡不振思有以興之擬創建書院選府縣諸生幼而頴敏者擇師儒别而教之庶幾有立㑹朝廷下新令興學育才亦如公擬公喜曰吾志得矣乃令府縣選諸生幼而頴敏者得二十六人乃取濟源學侯教諭溫縣學張司訓專教之公亦時加訓迪頻餽菜米薪炭油燭紙筆之費以作興之諸生咸感奮向學未幾公升陜西撫民參議師生不忍其去而不可留也乃偕來徵言頌德以為臨岐之獻豫語之曰魯侯興學魯人頌之泮水之詩是也夫魯侯國君也興學國政之急者也魯侯行之不為異政魯人尚頌之我朝府州縣各有學専教則有師儒提調則有守令奉敕總督則有憲臣其餘上司雖亦有興學之責然非其職任所急也今公乃能留意如此賢於魯侯逺矣師生頌德贈别蓋亦人情所不可已第不知師生欲何言幸明以告我我將採焉侯學諭曰吾聞銓曹升官各有資次或有不當寧使公論稱屈勿使公論稱幸蓋稱屈者後人必補之稱幸者後人必抑之皆事理之自然也公往以御史言事外補而非其罪沉淪郡佐凡數年而始升僉憲歷任僉憲將三年而始升參議以僉憲而升參議似無不可若通計其資則於公論為屈其銓曹一時未暇思乎屈於前必伸於後名位鼎來可立俟也請以此頌以慰公心張司訓曰吾聞君子之在仕途非位不髙祿不厚之患而職業不修令名不立乃為可患公此轉雖未愜公論然公明達果斷廊廟才也於職業少留意焉政成名立一范一韓一䕫一契無所不可大位不公與將安歸哉請以此頌以昭公休諸生曰魯侯興學之時淮夷方為魯患故詩人作頌曰既作泮宫淮夷攸服始則欲獻馘獻囚以討之中則欲式固爾猷以獲之終則欲修明教化以覺悟之深謀逺慮蓋無所不至也竊惟撫民之治駐節商州南控襄郢東連嵩鄧流民雜處凶狡時作其為地方之患雖未至淮夷之甚然亦有相類者公尚念哉修整武備以懾其心而使之畏焉寬簡條約以安其生而使之受焉申明戒諭以開其愚而使之化焉而又待以不欺行以不倦將見民之於公固有尊之如神明而親之如父母者矣請以是頌以達公猷豫曰感德而愛好德而頌人之情也愛不忘教頌不忘規君子之道也有味哉師生之言乎其為公深謀遠慮備矣謹次第書之為臨岐獻南京刑部郎中劉振道擢山東參議序南京刑部河南司郎中劉君擢山東布政司參議同寅張君袁君來徵言以贈豫雅聞劉君賢而未詳也因叩其家世履歷曰君字振道江西撫州府崇仁縣人尊翁素軒先生典學邵武諸處課子惟勤均克有就長振遷以丁丒進士任禮科給事中幼振文以癸未進士任兵部主事次乃振道以甲戌進士知祁門縣升刑部主事轉南京兵部員外旋轉今官頃得邸報升山東布政司參議君歷官咸有聲績今之任有日願執事主張之也豫竊惟君家世詩禮父兄之所告詔者計無所不至今雖有言將何以益之無已則書生之常談乎舜分天下為十二州州設之牧其戒命之詞曰食哉惟時柔逺能邇敦德允元而難任人蠻夷率服民之所急者食而食之所重者時遠者則寬而撫之近者則擾而習之牧民之術亦略備矣而復曰敦德允元而難任人何居殊不知天子以天下之大兆民之重不能自治故立之牧以分治之然收一人耳州境廣逺其民亦重矣牧雖戴星出入不憚勞苦亦安能使之一一得所哉故復有分任其責者焉在邦國則有侯伯子男在有司則有鄉遂州黨大夫士之屬皆分任牧民之責者也德者元者非盡心民事者乎吾敦之允之則孰有不勸任人也者非戕賊吾民者乎吾難之則孰敢不懲此蓋提綱挈領之道尤州牧之所當知也內治既修逺人自至蠻夷率服蓋有不期然而然者矣今之布政司古州牧也嗚呼君尚念哉山東之境東盡遼海西北西南則與兩畿相接地廣物阜固嘗以富庶聞天下矣比年以來民頗雕弊匪惟逺方不寧而大盜往往竊發於腹心之地是豈無其故耶無乃賦稅太重徭役太繁有以奪其食而妨其時乎無乃法令不振姦宄肆行所以撫而擾之者未盡道乎噫此固守令之責也提綱挈領使守令各勉其職又誰之責邪嗚呼君尚念哉君以詩禮名家父兄朝夕之間何所不講且前此歷官俱有聲績兹行也豈肯玩時愒日隨波逐流以碌碌自處乎抑綱領守令布政官之任也使布政官得行其志則撫按之任也聞君當分守遼陽遼陽之巡按未知為誰其巡撫則吾申臺張先生也先生當今之賢者也吾見其志之相合而山東之民自此有瘳也周侍御僉憲河南序山東周先生以雲南道監察御史擢河南按察司僉事整飭潁上兵備河南士夫在留都者相與議曰按察之職以明法禁姦警肅上下逺邇為任可謂難矣而兵備兼有地方安危之責蓋又難焉潁上之治北控河洛西接蘄雲南盡江淮之畔地廣人衆地廣則姦宄之察有所難周人衆則鬭辨紛爭雖勞心力以聽之而日不暇給況流移雜處風俗徑悍撫綏控御少失其機則禍或由是以作加以南畿河南各有巡撫都御史巡按御史而兵備政令皆與之相關此四人之性行未必皆同方圓枘鑿一有齟齬非惟動相掣肘事不可行而謗議往往由之以起兵備之難如此不知先生何以處之吾黨有不為之慮者乎光祿張先生曰諸友謂兵備之任難稱信然豫竊以為天下之事紛至遝來非明敏之才不濟有才矣而或至於敗無他傲與肆之故也蓋古之有才者謂天下人皆莫己若故多自是自是則不期傲而自傲謂天下事皆不難為故多率易率易則不期肆而自肆傲則忤物故行多齟齬而謗議隨之矣肆則玩事故人情政體慮之或有所未周處之或有所未善而釁隙隨之矣以是而往幸不敗者有矣欲政成令行逺近䝉福蓋未有也先生之任臺諫卓有才名吾未及久相親炙盡得其深然嘗有以占之矣兵備之命始下也吾與一二僚友往拜焉先生冠帶出迎客儀度甚肅稱賀禮畢各即席坐語及兵備前政得失歷歷如指諸掌旁及時事井井乎有條理而不可亂混混乎有源委而不可窮沉思審處未嘗輕發蓋有才而又善用之者也其不傲而肆也較然矣以是而往何往不濟吾見政成令行而逺近之皆受其福也上副朝廷之託下慰吾黨之望於是乎可卜矣僉嘻然曰甚善先生戒行有期乃相與餞别於雞鳴寺之憑虛閣而瑭次第其語以贈於是乎書贈陜西僉憲張履謙之任序南京刑部尚書郎張君履謙擢陜西僉憲南户部舊僚林君游君徵豫言以贈豫惟人之贈言廣忠告也第言有可盡有不可盡或交未深或其人未足與言輒盡言以相告非惟不見信且取怒者有矣是不可也交深矣而不盡言是謂隱情隱情不忠其人足與言矣而不盡言是謂失人失人不智正德辛未履謙以應進士舉留京師與豫居相近也數相往來蓋十有五年于今矣交不可謂不深履謙歷官俱有聲績以户部改刑部而戶部舊僚愛慕無已則其心事可想是不可謂不足與言然則豫之言又安敢不盡哉豫豈能知天下事然嘗聞君子之論矣天下之治亂係民生之休戚民生之休戚係守令之賢否監司者守令之綱也朝廷者監司之本也朝廷以天下之大不能自治而分其責任於監司則監司之責任顧不重且大哉天下之事自戶婚田土賦稅差役錢穀甲兵以至於姦盜詐僞之屬監司無一不當問然司之所統凡幾府府凡幾縣人民凡幾戶是已不可勝數而政事若前所云雜出乎其間者紛至遝來蓋又不可以數計也監司一人而聽斷之欲各得其理以安吾民非惟精神不堪日月亦有所不足是知監司盡心於政事者賢則賢矣謂之得其要則未也府之政事統於守縣統於令得一賢守則一郡事無不理而民無不安矣得一賢令則一縣事無不理民無不安矣其不肖者反是則監司之要可知矣然非謂悉委政事於守令而無所問也率作興事屢省乃成此古法也吾分政事於守令而省其成如事無不理民無不安則守令之賢者也既禮貌之又從而薦舉之賢者有不勉乎事不能理民不獲安則守令之不肖者也既誚讓之又從而黜罰之不肖者有不懲乎其或才有所不逮事有所未諳吾姑教戒之以待其後有不黽勉而改行者乎然守令之賢不肖如白黑者易知也其疑似者則難知也寬似姑息嚴似苛暴敬似諂諛正似傲倨若此類不可勝計己之好惡或因以生人之毁譽或因以起少有不察賢不肖易位矣是則尤不可不加意也外貌之敬忽傳聞之毁譽姑置勿論先詳察其政事之理否則賢不肖可得矣守令之賢者進而不肖者退則事理民安而治無不成矣監司之責任有不盡乎朝廷之望我者有不副乎陜西之守令政事民情皆不可知所知者君子之論如此也敢盡以告於戲尚念哉履謙之賢自有公論朝廷所以待履謙者自有公道皆非贈言之所急也故略贈郝玉卿四川僉事序郝玉卿先生由刑部正郎擢四川按察司僉事瑭往拜賀賔客咸集瑭曰蜀逺朝廷萬里吏治汚隆民生休戚土宇安危惟方面守臣憲臣是賴執事何以治蜀盍一言之使吾黨知之乎玉卿笑不答客曰昔甲乙丙丁論政吾嘗聞之矣甲之言曰太上能以德化民其次莫如猛火烈民望而畏之故鮮死焉水弱民狎而昵之故多死焉政亦猛而已矣乙曰政貴得中太剛則折太柔則廢詩云不競不絿不剛不柔敷政優優百祿是遒中也豈可一於猛哉丙曰政貴通變政寬則民慢慢則糾於猛猛則民殘殘則施之以寬傳曰大火中而寒暑退天道也丁曰賞善罰惡命德討罪施之有宜用之有時吾何容心於其間哉風霜雨露迭見錯出四凶之誅元愷之舉舜之事堯亦何嘗倚於一哉道並行而不相悖天地之所以為大也竊評之甲之所言政之要也乙政之經也丙政之變也丁政之時也是各一道也然不無至否焉孰是孰非孰從孰違執事其擇一於此以示吾黨兆乎玉卿亦笑不答瑭乃為之歌曰山川兮悠悠蜀道兮阻修豺豕縱橫兮民何以休遼哉邈邈兮我心用憂客有和之者曰山川兮蒼蒼蜀道兮阻長君子之政兮孔良不茹其柔兮不吐其剛豺豕伏匿兮鸞鳳翺翔千秋萬嵗兮民誰忍忘葉正郎出守廣南序掌科丘先生間枉顧曰屯部正郎葉君時舉吾鄉名士也中𢎞治乙丒進士初授福建浦城尹三載將考績天官卿以風憲缺員行取值太夫人喪不克赴服闋升知直𨽻六安州期年又遭先大夫喪起復改知山西蒲州正德辛巳升南京繕部員外郎三載考績實授屯部郎中癸未七月升雲南廣南府太守時舉天性平易率直與人推心相信不詭不隨其為政多從簡易在州縣上司纍相旌異聞浦民有繪像者蒲民有留靴者其惠愛在人至今見之猶父母然其在工部職務修舉大司空崔公甚益重之部院悉書上考今兹之擢公論咸以為屈時舉亦以逺方郡守例以待資望之下者不然則羸老不任事者不然則有過而謫者今當道乃以吾往相待可知矣即欲謝病不之任同鄉以時舉年未艾後事未可知咸勸之行而時舉未果也願執事有言以速之幸甚豫惟君之行止自有所據區區之言豈足以轉移其志然有愚見敬為誦之俟君擇焉可也士君子之在仕途履歷何常之有或在廟堂或在郡縣或在日月之側或在嶺海之外其始同其終未必同其始異其終或不異蓋未可以一律齊也君奈何輒以廣南為逺而鬱鬱自沮哉即如君意逺方郡守多以待資望之下及羸老有過者則遠方之民不獲瞻士君子之光儀蓋亦久矣君以甲科之英揚歷中外政聲赫然廟堂縉紳交口稱頌此固夫人之所知也今兹之往廣南之民蓋有如景星鳳凰爭先覩之為快者矣况逺方之民久困於貪殘罷委之政今君之往乃被之以仁風沃之以膏澤使之休養生息於聖明之世是無異出之陷阱之中而臥於袵席之上援之豺虎之窟而納之父母之懷矣其歡呼鼓舞當何如哉歌謡興而德功成蓋可以指日而待也士君子之在仕途雖有逺近之辨至於旬宣之使監臨之長搜羅守令之賢能者以薦於上銓部簡其卓異者置諸大位則不以逺近異也語稱彭蠡之濵以魚飼犬荆山之巖以玉抵鵲豈以魚與玉為可賤哉多有之地人不見貴其勢則然也近地郡守賢能相望亦仕途之荆巖彭蠡也若逺郡則不可多得矣旬宣之使監臨之長欲搜羅賢能以薦於上舍葉君將奚取哉髙爵重任自可坐致由是而觀又安知遠之不為近而屈之不為伸耶昔文翁在西蜀興庠序之教衛颯在桂陽制婚嫁之禮皆流聲中朝馴至大任良史列之循吏至於今稱頌不衰夫庠序之教嫁娶之禮亦常政耳使在中國夫何足稱然則遠地邊方固士君子立功揚名之所也亦在乎為之而已矣君奈何返以逺自沮乎掌科乃作而謝曰得子之論逺方郡守之利害皎如指掌時舉可以歡然就道矣請書之為臨岐贈于是乎書黃掌科出守嚴州序聖天子起自外藩入繼大統備知民事艱苦即位之初勵精圗治廟堂大臣祗承德意謂宣布朝廷惠澤以安養元元職莫重於郡守近年郡守遷轉太速不暇行其政教故民鮮得安請久其任有功效者進其職銜仍理郡事功效大著則不次擢用制可天子復謂守貴得人狼貪虎噬及脂韋不職者豈可使之久在民上乃採廷臣之言令兩京三品以上官各舉堪任郡守者三人俱以名聞即有不稱連坐羣臣奉命惟謹悉心搜訪惟恐不副上意士民之望治者蓋欣欣焉維時浙嚴州府缺守吏部乃以南刑科北川黃先生薦命下縉紳士夫相與論曰北川在諫垣才三四年指陳缺失别白賢否補益於朝廷甚多陟明遷喬以公以卿無所不可奈何復勞以有司之事即資序未深俾久在諫垣其所補益當不止此且出諫官以補郡守昔人謂憂其末而忘其本兹得無近似之乎或曰不然子之論所謂知其一而不知其二者也天下之事耳聞不如目見之真思慮不如經歷之熟布衣之士一旦超處公卿之位於民情事體雖聰明博達者亦未必真知雖真知之其細微曲折之間亦未必能盡得其詳况艱難險阻未嘗則思慮多不深體悉多不至乃遽使之裁處天下之事進退百官之賢不肖欲一一中節而得宜是安可得哉以北川之聰明博達使之周旋於郡縣之間則於民之休戚事之利弊與其行止興革或勢有不能盡如吾意者自當無不真知上下之交不諂不瀆毁譽是非不為流言所惑以至於賢否失真者亦自當真知其曲折增益於拂亂之餘而練達於操危慮深之后吾見政聲之赫然也事治民安既足副九重之意功效大著且將有不次之擢他日居公卿之位輔聖天子於廟堂宰制萬幾進退天下之賢不肖固將有異於他人者矣試之於外然後大用之於內雖屈於一時實伸於永久然則一出入內外之間又安足為輕重欣戚也哉論者乃服已而同寅多賦詩為北川贈山東周先生等屬瑭有言為引瑭不工文謹述所聞縉紳之論以告蓋此其大者耳若嚴之民情事體北川蒞任之後自能知之兹不暇言也王侍御出守汝寧序汝寧河南大郡也統轄十五州縣政令既繁而路當南北要衝旬宣之使往來之賔客絡繹不絶應接蓋無少暇焉故凡守兹土者非有明達果斷之才者鮮克勝任嘉靖五年春吏部大計天下之治視其勝任不勝任者而去留之汝寧之守以才力不及改仕選能勝其任者代之乃薦南京河南道監察御史王君汝學以往君素有才望汝寧士夫官南京者聞命交賀既相率拜君于私第復相率徵豫言以贈豫惟人之贈言備採擇也王君自筮仕為縣以至徵拜為御史歷有聲績其練習久矣天下之事何所不知奚俟人言光祿申臺張先生曰不然近世士大夫居髙位有大才者多不務咨訪王君獨不自滿某等之往拜也即詢民隱及吏治得失孜孜不怠某等既以所聞見告之矣而未盡也故請益於子子何辭焉豫乃仰而嘆曰甚矣君之好問而好察邇言也愧豫無以告耳昔人有言知為子然後能為人父知為臣然後能為人君知事人然後能使人蓋自其所習行者推之無難也君嘗為縣矣所服事而聽令者不有守乎守之政令如何則縣得其安如何則縣被其擾亦既知之矣今兹之往行其所以安乎縣者而去其所以擾乎縣者則下無不獲矣君嘗為御史矣按察百僚揚清激濁固其職也守不在激揚中乎守之治行如何則為賢如何則為否今兹之往行其所以賢者去其所以否者則上無不獲矣上下既獲則政無不成令無不行熙熙然風草之相偃而桴鼓之相應也汝寧之民有不䝉福乎申臺曰諾豫曰我朝黜陟之法不同於古郡守治行超卓者不二三載輒遷吾恐汝寧之民不得久䝉君之福也衆曰奈何曰見賢思齊人有是心安知來者之不如今也今姑樂王君之能福吾民可矣將來之事安得一一而為之慮哉申臺曰然乃次第其語為王君贈云司馬公改守嘉興序張凌漢吳時之范子仁偕來枉顧曰郡伯司馬公守吾郡三易嵗矣士民䝉被恩德方以公為父母冀朝夕見乃以吏部薦改守嘉興行有日矣士民欲挽留之不可也盍有言以贈以彰公休以致吾士民之意乎豫曰唯唯竊念幼讀前史見循良之吏有恩德於士民者或升遷或更調或以他故而去其士民往往挽留不置甚至卧轍攀轅使不得發其不然者反是因以謂衆心之好惡可以驗官政之得失及後見孔子為政於魯魯人乃謗之曰韠而麛裘投之無郵子産為政於鄭鄭人謗之曰孰殺子産吾其與之夫孔子大聖也子産亦公卿之賢者也其政豈有不善哉衆乃欲投之殺之有不止於喜其速去者何也則又疑衆心之好惡有不足憑者後讀魯論見子貢曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之乃嘆曰一鄉之人皆比肩而立者耳所好所惡者尚各以其類况大人君子在上位者其存心也公其行政也平喜有賞怒有刑雖寬於勸善亦嚴於懲惡則於衆人之情固不能以盡合矣甲之所好乙或惡之此之所譽彼或毁之此豈可得而一哉此孔子子産之所以䝉謗也逮其久也德政既洽衆望咸歸則謗言自息矣此孔子子産所以終獲令名也然則觀君子之政蒞於政未久者衆好衆惡豈可不察其故哉公守懷慶雖三易嵗然實未久也士民䝉被恩澤者固戴公如父母矣而觖望者則難保其無也瑭老且病不能逺餞公於郊外三君子其尚留意哉公之行也士民之在道傍者惜公之去而垂涕願留者有幾復察其人為何如人喜公之去而歡呼嘻笑者有幾亦察其人為何如人蓋一以驗公之政一以觀吾黨之善惡也歸幸相示瑭當筆之簡册以俟他日傳循吏者之採擇云張推守升汝寧二守序為政孰難得民心難得民心非難得民心而以其道難自豈弟之風既微而貪暴之政代作蒼鷹乳虎之儔此肩接踵而顯於世鞭撻肆行斬伐無忌凶威既立則剝取百姓之膏脂以充一已之筐篋轉相汲引馴致髙位天下之民如墜塗炭其來也非一日矣故民亦疾視其上如冦如讐其在位也惟恐其不去其去也惟恐其不速無一毫愛敬眷戀之意此豈民之薄哉其應固然也故曰得民心難其反此者則又務為煦育姑息之政以取悅於下有罪不刑而悉從寬貸庶事不理而惟務因循曰吾將以恤民而省費其巧者則又為朝四暮三之術以籠絡其民雖憂民之言不絶於口而實無愛利以及於下紀綱不立奸弊日滋雖歡虞於一時而不可行於永久雖愚民翕然以為賢而君子不取也故曰得民心而以其道難吾郡節推張先生以慈祥豈弟為心而以公平正大為政聽民之訟必盡其情罪之輕重大小則一斷於法而無所縱捨初不用姑息籠絡之術六縣之民皆愛敬先生如其父母豈非得民心而以其道者乎先生以當道薦擢汝寧二守自懷慶之任汝寧道出孟縣官吏師生耆老感先生之德惜其去而不可留也乃繪像以獻而請豫言以道意豫有感於得民心以道之難而幸於先生見之也故書是以告於戲天下之民一也民之所好好之民之所惡惡之此之謂民之父母先生懋哉吾見民心之愛敬將彼此無以異也孟縣劉大尹奬勵序天下之事行為難行之得失其難在已行之從違其難在人在已者可勉也在人者所值有幸不幸吾將奈之何哉夫士君子禀扶輿之清淑為人倫之冠冕孰不欲立功業於當時垂聲光於後世哉然天下事處之亦甚難矣紛紜轇轕欲其剖析震撼擊撞欲其鎮定少失其理則瓦裂莫救處之不失其理矣然或上無知已以為之援則局蹐於俞咈之間顧望於進止之際亦安得從容展布百姓見其體勢之不重也奸詐者巧於媒蘖强梁者敢於抗拒方支吾自救之不暇欲望功業立而名聲彰豈不難哉故嘗謂士之立功垂名者有其志矣或患於無才有其才矣或患於無位有其位矣或患於無援全者百一故功名之成立甚不易也孟縣大尹劉侯豪傑之士也志尚髙逺而其才又足以副之剸繁治劇抑强扶弱皆不勞餘力當道以其能也以禮幣奬勞焉懷慶府儒學薛生堯佐孟人也鳩諸友徵言以賀豫感夫功名之難幸侯之有志有才而又見知於上將可以大有為也故書是以歸之以徵於他日云修武冷大尹奬勵序修武知縣冷侯述職京師課最還任巡按御史汪公分巡僉憲孫公各以禮幣奬勵懷慶府儒學生史學易等修人也來徵言以賀豫惟冷侯君子也君子禍至不懼福至不喜上司一禮幣之旌奬於侯之賢未足為輕重似不必賀繼而思之則亦有可賀者君子立身行道固無所待於外然修之於已亦恆驗之於人以考其至否夫子告顔淵克已復禮必及於天下歸仁告仲弓主敬行恕必及於家邦無怨蓋謂是也况君子之在下位則所係又有重焉蓋君子之得位任職固將以行其道也上有譴怒下不信服欲道之行得乎夫察在位之賢否得失於毁譽未萌之前惟大人君子及有識之士能之庶民固未必能也往往上之所賢則庶民從而賢之上之所否則庶民從而否之賢否之間政治廢興之所係也夫子曰居下位而不獲乎上民不可得而治矣意蓋如此侯之賢吾嘗聞之矣愛民深待士厚臨財廉處事慎如祠名賢以作士風纂修縣志以備邦典立繼往開來化民成俗坊於𤣥廟之前以詔髦俊及夫沿路植栁以䕃行旅之類皆出於簿書期㑹之外然此惟有識之士能察侯用意之所在而知其賢四境之民則未必知也今上司疊以禮幣奬勵其賢則四境之民忖於心而頌於口必曰我侯賢人也不然何上司禮待之如是也民既知侯之賢矣則令無不行禁無不止動無不化侯之道將大行而政將益光矣此所以亦可賀也且物莫不有始嚴霜肅物則墮指折膠之始也東風解凍則流金爍石之始也上司之所旌奬則亦髙位大任之始也官怠於宦成侯之所知也尚念哉進爵位於巖廊流勳名于竹帛固君子事也謹書此以為他日賀云絳縣二尹寧文威之任序豫幼讀昌黎丞㕔壁記謂丞所以二令於一邑之事無不當問又謂丞例以嫌不可否事惟拱默自守竊意丞之與令雖名位不同至于受天子之命有牧民之責則無以異也一邑之事令主之于上丞贊之於下令倡之於前丞和之於後可否相濟如麯蘖鹽梅然則政善民安彼此俱美何嫌何疑而拱默自守乎先民有言詢于芻蕘况僚友乎昌黎之言或有所激蓋未必盡然也及後備員仕途更歷中外見府同判之所以事其守縣丞簿之所以事其令大抵如昌黎之言怪問其故則曰將順以成其美規諷以救其失佐二事長官之道吾儕非不知也顧長官之用心不同或寬仁而明達或狹隘而固滯寬仁而明達者聞人之言不以為忤斟酌可否而從違之故政事益修僚友之情益厚狹隘而固滯者聞人之言則咈然怒不以為侵已之權則以為彰已之短僚友之情由是不和政事雖失甚至於敗彼亦不悔也世之賢者不可多得故吾儕寧為彼而不為此豫聞其言深用太息竊意為長官者惡聞人言固失矣為佐二者未有一言為長官之助而輒避嫌自守則亦未為得也程子有言簿與令不和多由私意若以事父兄之道事之過則歸已善則惟恐不歸於令積此誠意宜無不感動之理今之為佐二者或者於斯道有未盡乎己未盡其道而輒謂令惡聞人言豈理也哉友人寧文威先生選授山西絳縣丞先生之子曰時中者學博而文為諸友所敬慕其同窗張時望王言道輩乃來徵言為先生贈先生和易忠信處僚友之間保其無忤吾恐其徇世俗避嫌之見而拱默自守也故以是告之其令未知為誰其用心未可懸度吾將於文威之行卜之也于是乎言朱二尹致仕序南通州恥齊朱先生仕為武陟縣丞正德丙子四月同僚被論事連先生明年丁丒天下諸司例該入覲上司以先生事白無罪例該復職乃於八月內具先生職名中吏部及期猶以事未結不得入覲吏部以先生不至疑中途有他故遂令致仕懷慶士夫與先生遊者聞命往唁之且惜先生無罪被黜或咎同僚之詿誤或咎吏部之不審先生獨慨然曰凡事有命奈何以咎他人哉昔忠宣為章惇所排得罪罷相家人皆以咎惇江行舟覆衣裝盡濕家人舉火燎衣忠宣顧謂曰此豈亦章惇害我哉蓋凡事有命先賢嘗蹈之矣豈獨僕哉且居官亦有何樂入則治簿書趂期㑹出則奔走於車塵馬足之間至謁上官則拜跪稱謂與僕𨽻等吾不屑於此久矣獨念䝉朝廷作養之恩幸有民社之寄庶幾少竭涓埃以圗萬一之報耳義不當無故引去以自逸樂今既見黜去有辭矣薄田可以具饘粥子弟可以供使令林泉可以適性情雖無俸入之養亦無政事之勞雖無爵位之榮亦無事上之辱彼此得失蓋略相當尚安能戀戀於已破之甑而怨天尤人哉聞者歎服乃以告瑭瑭原貫泰之如臯於先生為同鄉往嘗聞先生始涖政將以五月中日士夫謂正五九月火星用事不利居官故多不以是月蒞任或以告先生笑曰政之得失在我位之得失在命天時豈有不善哉以五月蒞任流賊猖獗同僚或遣家入郡城避之復隂穿地窖擬縣城破將潛匿以免先生獨奮然曰朝廷設官凡以為民賊至縱衆寡不敵當倡民守城今先遣家避賊百姓何所恃乎且城破矣豈匿地窖所可免哉縱免何面目見天下士大夫乎乃不遣家於戲處疑似然後可以見人之識臨利害然後可以見人之守先生之識之守卓矣則於得喪之際無戚戚之感蓋無怪也噫先生之歸樂矣顧念吾儕幸得數接詞色嗣是而后瞻拜無期不能無暌違之感耳别酒既斟行旌在道詩云樂只君子保艾爾後請以是為先生祝毋金玉爾音而有遐心請以是為先生贈柏齊集卷三
