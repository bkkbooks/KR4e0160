body:
  text: 柏齋集卷十一明何瑭撰自序豫髫年得杜律虞注讀之愛其髙古顧以方事舉業力不能兼棄去𢎞治甲寅客有示豫以郡處士王錦尚絅所作詩數首喜其清新可愛乃作二詩貽之因與倡和明年而尚絅物故豫不復作詩又明年而通渭王老先生來守懷慶雅好吟咏或以豫名薦乃作二詩上之然而非所樂也再明年先生以外艱去任壬戍豫徼幸登第復幸與天下名士讀書翰林乃復留意學詩未幾有感遂不竟學後雖濫竽詞職之後時或應人之求有所述作然終不能工也故俱不存稿邇來二十有四年矣追想所與倡和贈寄諸友死生離合多不相見暇日因追憶舊稿僅得若干首録之時復觀省以存友誼至南京以後所作則隨附於後蓋以備他日之遺忘云耳詩云乎哉嘉靖四年四月十有八日志擬古獨漉篇四首獨漉獨漉水深沒轂不畏沒轂但畏車覆獨寢中夜涼飈襲襟不能告人祗傷我心洪水湯湯神禹既導槩云自天誰宅四隩龍惡可馴虎猛可刺豈其無方使我心瘁五言古詩入院言志幽邃隔塵境崢嶸鄰帝居庭槐鬱青翠窗竹蔭扶疏翦緋花傍檻漱玉泉繞除眷惟翰苑清奚翅夏屋渠簡拔幸見收進修敢云徐趨隅咨問頻對床切磋胥搜玄翻五經考古研六書綺麗戒浮薄淳朴返古初聖賢果何人追逐疇止豫惜哉歲華晚日月催居諸邈矣吾道大滄海連歸墟仰瞻際乾蓋俯視蟠坤輿一得遽自滿何異井底魚風髙鶴夢驚天空鵬翮舒行藏有矩範祿位慚素虛去去王屋山翹首承明廬冬日雜興四首重衾不成寐展轉冬夜長神疲一合眼忽已升高堂衣裳問燠寒拜跪陳酒漿夢覺雞亂啼渺然天一方草芥視天下感念焚中腸却憶過庭訓兒當佐虞唐故鄉千里餘夙夕夢見之門巷宛如昨鄰里亦不移親朋喜我至談笑相追隨情長苦夜短夢覺恍惚疑諒無離魂術所見知是非徘徊顧庭宇默默坐如癡歲暮霜霰滋朔風驚户牖延觀天地間無物不衰朽松柏雖堅貞顔色亦非舊玊衡指孟陬眷焉回我首五嶽柱四極衆山難比崇春夏泄化機澗谷披青紅霜雪任刻轢嶻嶪蟠蒼穹天地有正氣令人豁心胸哭季女二首我昔自外歸三女中門迎心知非男兒聊得樂此情季者尤黠慧恩愛鍾平生云胡遘一疾性命倐焉傾旅葬給孤園煙草縱復橫歸來枕書卧歷歷舊音聲起覔無所見淚下沾襟纓女死未及殤其母晝夜啼痛念父子恩亦復為酸嘶叩門來知己慰釋巧言詞有生會歸盡夀夭理亦齊傷生遺親憂過哀豈非迷攬涕謝訓言仰視白日西安得千斛酒終朝醉如泥得友人書二首晝寢驚叩門滿耳聲剝啄開門見鄉人新來自河洛袖中出短書云是故人作開緘見故人反使心腸惡栗夫家屢空致中體如削元善雖無恙煢煢形影各離索感此時同遊念前約沈吟久無言矯首歎寂寞去年致中亡今年栗夫死灑淚向蒼穹吾道真已矣送方士六首先生覃懷來復向覃懷去悵望難久留離魂杳煙樹憶昔讀書舍寄在蓬萊宫長松挂海月短草留春風同窗四五人肝膽如一身雖存經濟志亦與雲蘿親先生時來過談笑共抵掌赤水涉波瀾玄珠譏象罔别來三年餘相思空寄書死者不可見生者猶離居歸時見故人為問平安否紫氣映𡨕鴻夜夜頻回首鶴舟君家有鶴舟泛泛江中流停橈丹鳯山鼓枻紫麟洲欲濟沈溺人撑到鳯池頭世事不可意歸棹難久留我家有虛舟飄飄河內浮東風亦漂蕩邂逅暫夷猶常恐波浪生命與蛟龍謀子去我所羡我留君不憂解纜未忍别題詩記綢繆再會未可必相憶商聲謳贈方矯亭末世重功名古人崇道義趨向一以殊此取則彼棄孰知方寸中本是經綸地卓哉矯亭君盛德愚所庇再拜治心篇賢聖可同志和暑中韻把酒對同心推窗見庭樹大化恆寂寥枯榮自來去七言古詩楚昭王圖闔閭甲戈中宵起雷鼓喧轟震千里桔橰火照楚王宫倉皇逃避浮江水中流風起生白波黿鼉出沒蛟龍多小船重載懼沈溺君王淚下雙滂沱王弟王妃並王子疏者下船誰可使君王手扯介弟衣儲宫相逐慈闈死嗟嗟薄俗不堪陳兄弟何如妻子親忽見畫圖驚往事小詩吟罷倍傷神琴溪宅分韻得紀字國子先生前太史大暑開筵梵宫裏南風生涼差可喜况有氷漿浸寒李飲酣執盞逡巡起一語相期誓終始諸公盡是天下士瀛海散仙安足擬人生百年風過耳願竭丹心報天子名垂萬古無泥滓莫笑狂歌同下里四美二難聊用紀五言絶句錢生墳前八景今録其七巉然千仞峯宛似九苞鳥神遊乘興時騎上青雲表右鳯山翥雲怪石如秋隼凌空勢欲飛英賢神采異倣佛見光輝右鷂石橫秋九峯如列戟拱立墓門前見説簪纓後功名繼祖先右九華列戟溪水如環帶分明束墓腰追思遊衍日曳履過危橋右雙溪環帶秋月映秋波清徹世無比猶似見親心泪灑楓湖水右楓湖浸月英魂招不起應在此徜徉紅緑波相映真成錦繡鄉右芙蕖簇錦蘆花秋似雪掩映釣魚舟先世嬉遊處經過淚暗流右蘆花噴雪七言絶句過却金館却金本是尋常事凛凛清風只至今若使仕途貪者少夷齊名姓亦消沈贈星士杏壇寂寂罕言命滄海茫茫空問津今日見君談甲子守株翻却是髙人玉華山故鄉王屋比瀛州足迹中年未一遊玉華嶺南千萬里幾時飛舄到峯頭送陳琴川此别重逢未有期東西相望漫相思一編管見聊持贈披閲應同對面時雜畫九首稚子江邊携水去野人雲外採樵歸間亭晝永紅塵淨坐看幽禽自在飛洞簫吹徹大江風回首曹劉事業空赤壁仙翁竟何處青山依舊月明中直道難容今古同江邊誰識玉堂公萬言書在人人讀惆悵相看是畫中爭名爭利笑人忙白水青林且退藏想是雄心消未盡却來棋上鬬存亡兩地相思見面難暫將微物寄平安親朋問我年來事間看漁翁把釣竿三鳥不知是何鳥相向飛鳴不肯休勸爾早尋髙樹宿蕭蕭蘆葦不禁秋平川煙草自萋萋南北東西路不迷牛飽心間無外事揚鞭笑指晚山低夜深惟恐蛟龍鬬急早倉皇負網歸莫道江湖能逺害人生隨處要知幾獨坐江樓思渺然晚雲散盡月當天同心相訪須相見不比山隂雪後船懷陸子淵共誰虛室細談玄東望江雲意渺然憶昔少年今老矣不堪吟對菊花天趙子昻鱖圖曾聞魚藻頌皇都見説杭城殿閣蕪却想王孫揮筆處也應回首念西湖梅雪卷二首榾柮煙消紙帳溫梅花雪影共黃昏興來我欲間相訪分付奚童莫掩門梅花開放雪花飛矮屋斜穿一徑微松頂忽聞玄鶴唳主人扶杖夜深歸次鄒謙之除夜韻為惜佳時暫舉杯春光聞道隔年回憑誰細話真消息起向前軒玩蚤梅五言律詩送秦世觀宣府督糧曉日都門道春風送客行轉輪明主託規戒故人情政事忙多錯嫌疑謗易生至誠能動物元不在聲名送張仲修河東巡鹽河東鹽課事軍國用斯存錦綺商人富青驄使者尊溝渠憐赤子霄漢隔金門無限憂時意臨岐不盡論送楊太常歸省卿寺遷喬久家山入夢頻暫辭黃閣老歸慰白頭親道路無多慮將迎有故人聖朝須佐理莫戀錦江春送穆司成之南監南京根本地司業範模官今日須君往他年作鑒看文章回古道風俗障狂瀾惆悵臨岐處天時漸漸寒歸鴈次孟望之韻何處堪惆悵歸鴻嘹唳音關山千里路光景四時心影入春風靜聲傳畫閣深冥冥霄漢上羅網莫相尋酬孟望之次韻憶昔梁園會憐君意氣投雲霄方並轡風浪復同舟黃屋空回首清樽且解憂賈生如曉事應不弔湘流弔林纘妻死節一醮期偕老殉夫遂殺身閨門憐弱質髙節見斯人月照鴛帷冷苔封馬鬛新彛倫關政體誰為奏楓宸挽謝木齋四海文章伯三朝柱石臣林泉謀養浩山嶽慟歸神門下依仁久天涯灑淚新束芻無路奠腸斷浙江濱題楊憲長家手卷二首萬里青雲路先生次第行山川頻按節夷夏盡知名令肅豺狼避恩深草樹榮猶思補丹扆驅馬向神京右雲程萬里黃甲蜚英俊烏臺早致身澄清曾攬轡忠鯁獨埋輪勳業追前輩風聲起後人九原松柏冷相望欲傷神右激濁揚清題侯氏忠義録海內傳忠義侯君世德長鼓盆居靜室揮劔死封疆祠柏凌霜翠亭梅帶雪香台山南望處倣佛見輝光和郭杏東除夜韻二首除夜圍兒女髙堂隔老親本無經世䇿空作去鄉人勳業看吾友蹉跎嘆此身家山并仕路來往自嫌頻嵗序如流水滔滔不肯休青燈相對坐濁酒暫扳留身世將安適才疏拙自謀梅花開雪裏笑爾不知愁元旦次蒲汀韻二首身事憐衰白羇栖感歲年雲霞占曉日花柳媚晴川家逺書難得鴻歸信欲傳髙臺頻極目風景故依然風物開新歲關山念逺遊慈闈三載别宦邸一身留詩酒聊乘興煙花豈解愁目窮飛鳥外魂斷仲宣樓人日歲事卜陰晴朝來霧氣清天開熙皥象風度笑歌聲豐稔傳鄉國繁華記帝城客居無好况愁減為蒼生次韻挽陳虛庵二首虛庵今已矣東望一傷心情愛三秋月剛凝百鍊金猶懸徐孺榻誰和伯牙琴欲寫循良傳翻嫌職掌侵見説毗陵守無如公最賢化行風偃草心靜月當天士頌真君子民歌大有年熙熙並皥皥史筆恐難傳送左都顔先生入京聖主坐明堂霜臺振紀綱老臣膺簡命南國倍輝光已覺豺狼遁遙看鳯鳥翔離筵回首處秋思正茫茫類庵宅洞天何處好清愛水晶宫宗伯開華宴羣仙醉碧筒蔗凝金碗露花動翠簾風豈必浮滄海瀛洲在此中敝宅分題得觀音梅水逺映觀音閣梅花煙水寒暗香盈斷浦疏影落輕瀾漱玉聲相應和羮子半酸瀛洲何異此登眺共憑欄挽西郊宋處士夫婦詩酒陶元亮瀟條住逺坰傷哉新冢白愁對舊山青同穴憐雙璧傳家在一經笑談春滿座人共相儀刑次杏東元宵韻二首帝城元夜盛燈火畫堂深節序同南北人情變古今山河憐晚霽花栁怯春隂笑語喧兒女翻傷老大心燈火逢元夜萍蓬嘆索居感時知我老得句遣兒書酒少愁難破年衰恨有餘團團天上月幾見缺如梳次對雪韻二首夜雪深過尺春城礙出遊且斟澆悶酒休上望鄉樓齒髮真堪念聲名不用流行當謝明主歸去故山頭感時驚雨雪撫已惜精神鏡裡容非舊天涯歲又新愁來便枕簟客至強冠巾聚散思今昔相看意更親七言律詩四月八日午門賜宴次秉衡韻節驚蓂莢問元初浴佛傳來貝葉書龍陛玉音催賜宴鳯樓瓊席坐連裾抗章有志同韓愈獻賦無才似子虛不是聖明重異教欲將竒怪駭吾儒宗藩孝行玉樹分枝帝室親昭然誠孝冠羣倫寸心哀慕窮天地永夜悲號動鬼神髙冢松楸頻灑淚名園桃李謾生春憑誰寫入丹青傳大播遺風起後人王教之端册業慈闈髙行並南山文母徽音尚可攀孝子謄書馳驛騎聖君聞奏動天顔玉階遣使綸音重金殿承恩羽扇間莫道尋常內家事帝王風化正相關送李守正歸棠邑省親宦途邂逅與君同又見歸旌逐斷鴻東觀月明清夢逺北堂春好夀顔紅滄溟汗漫魚龍水平野蕭條草木風忠孝此行真兩盡天涯極目思無窮癸亥雜詩八首出谷鶯啼楊栁絲客邊風景似年時西山凍釋抽新草上苑春歸入故枝心念舊遊頻眺望夢回殘月倍相思催朝無奈雞鳴早又逐羣英過鳯池故園門巷枕黃河散亂牛羊草滿坡兩岸夕陽行客棹一犁春雨老農簑撥醅酒熟尊顔醉擊缶聲喧稚子歌一别天涯幾芳草夢回茅屋月明多黃金臺畔太行隈千里風光一日回白馬渡迷芳草合紫金壇迥曙煙開笙歌到處留人醉車馬誰家上冢來坐想舊遊真似夢野花黃蝶遍蒿萊盤谷燕川二月寒馬頭溪水隔天壇黃茅踏遍幽人徑白石燒成道士丹風暖野禽朝對語月明松鶴夜交歡採真擬結峯頭屋引領西南盡日看十里雲霞鎖洞天靈蹤千古尚依然老君池水深春雨黃帝松隂暗曉煙盤谷斷碑芳草外玉川茅屋野花前别來勝景應如昨歸去繁霜懼滿顛目窮郊野遍芳菲清曉登樓轉夕暉風撼上階花影亂雨滋穿土草芽肥採芝商嶺人何處種菊潯陽事已非同學故人偏自得海鷗沙際共忘機聞道商山老紫芝百年短景不勝悲紅塵滿眼空憐我青史流芳竟屬誰杖化葛陂龍去逺笙聞緱嶺鶴來遲王孫草緑煙汀晚獨倚危欄自詠詩青春回首思悠悠王屋山髙沁水流觀國念存空倚劍思鄉魂斷獨登樓悲嗚夜月籠中鶴泛濫春波海上鷗寂寂桑榆斂殘照麗譙吹角使人愁追挽王户部馬鬛西風吹野蒿襄城南望夢魂勞趨塵不及瞻犀表繼踵空憐識鳯毛玄武挂冠頭正黑青雲倚劍志猶髙是誰寫入巢由傳不説勳名在户曹追挽復齋王憲副清新曾讀復齋詩眉宇居然見紫芝翰苑鳥臺憐往事青蠅白璧恨當時平原草滿鴒飛急孤冢苔荒鶴弔遲我欲招魂歌楚些乾坤浩渺不勝悲望泰陵次序庵韻玄扄一自掩重關惆悵龍髯不再攀絳節定應歸帝所翠華無復到塵寰亂峯殘照玄猿哭衰草寒煙石獸間載筆小臣凝望久玉樓瑤殿倚空山送羅户侯歸成都腰間錦帶佩雙龍萬里東來謁九重劍外風煙憐獨往日邊甥舅記相逢雪消漢水連天闊春盡巴雲入樹濃麟閣於今待勳烈莫將韜略老藩封送野汀祭掃道途豺虎正縱橫底事歸軒冒險行霄漢一身明主託江山萬里老臣情雲迷汴宋懷松檟路入衡漳斂斾旌回首天門紛羽檄可能鄉社戀蓴羮送潘仲魯使安南風塵時節送君行萍水分擕百感生六館交遊曾刮目十年離合最關情山川渺渺蠻中路霧雨昏昏海上城玉册已頒王事畢便催車馬轉歸旌酬李序庵次韻鞍馬紅塵日送迎纍驚時節變隂晴白衣蒼狗有何意流水髙山無限情把酒舊曾臨鄭圃題詩誰復共韓檠故人若問年來事華髮新從鏡裡生贈侯汝立次韻黃堂伴食歲棲遲彤管題詩淚欲垂疏懶自宜陪鹿豕奔騰誰復逐龍螭茅齋夜月談玄榻野店春風賣酒旗便好挂冠從此去帝鄉回首路逶迤贈黃大行還京師煌煌使節下神京又見歸旌傍曉行山斗空懸今日意將迎無復少年情叮嚀稷契煩調護疏懶巢由賴治平鳯閣龍樓天咫尺紫垣翹首暮雲橫同館會都下者十有三人以塵世難逢開口笑菊花須插滿頭歸分韻賦詩豫得花字同賦歸字朋簮重盍慰暌違仕路年來覺漸非紫極關心明主在青雲回首故人稀半生歲月間中過十畝園林夢裏歸孔孟伊周俱泯沒不須相向欲沾衣同年郁希正與豫同謫開州希正遷南京户部偶誦水東日記所載先生送别詩謂其詞意悲感聞者流涕因索豫和漫為賦此詞語髙妙何敢望前人至於情之可悲則固有甚焉者矣觀者略其詞而取其情可也晚風吹雨鬢瀟瀟往事關心酒半銷萍水兩人康叔國風雲千載孝宗朝喬遷君喜家山近蓬轉誰憐宦海遙楊柳啼鵑分守處河橋愁似洛陽橋贈方時舉少參次韻道學千年説二程涪州歸詔促裝行也知西監非崇秩自是清朝忌盛名天姥山髙冬月小浙江潮上曉雲晴歸途紀興囊中稿風便何妨數寄聲弔同寅許補之次半塘韻才名籍籍重交遊豸繡煌煌寵命優身死空留憂世䇿時危難得濟川舟春深人惜甘棠暮月落鵑啼宰樹秋惆悵手書才數日却疑蝴蝶夢莊周次周半塘遊天台韻隨州詩句敵長城况復登臨逸興生瀑布泉流山自好柏臺公暇趣尤清洞間雲鎖人來少橋險風髙鳥度輕笑我塵凡欠仙骨肩輿空望晚峯行送潘氏叔姪還湖廣西風吹雨正重陽征馬蕭蕭客袂涼棣蕚情知離别苦竹林歸念道途長南溟水闊搏鵬翼北極天髙斷鴈行遙想紀行詩滿卷莫將幽意弔沈湘贈伍松月致仕都憲先生拂袖歸都門相餞惜光輝汀花岸草隨時發野鳥沙鷗信意飛海上共傳平巨冦江西猶記破重圍韓侯不隱留侯隱青史千秋説見幾送鄧二府致政歸膠州夢覺黃粱萬事空倚闌翹首羡冥鴻懶從赤紱稱循吏擬向滄浪狎釣翁孤鶴伴吟臨夜月蹇驢馱醉入春風東西路阻音書少林下知誰笑語同題鳯圖虞周世逺太平稀靈鳥翩翩何處飛千載賢王時運筆九重聖主正垂衣雲開丹穴風初靜日上青桐露未晞黃髮老臣懷至治羽毛五色望來歸題淮浦卷長淮之水東南流美人家在淮上頭滄波碧石有深趣朝史暮經無外求東風側耳聽黃鳥夜月捲簾招白鷗畫圖一見擬相訪何處元龍百尺樓再和石溪瑤華稠疊逐人來懷抱隂沈為子開髙卧袁安甘冷落孤吟何遜苦摧頽寒多何奈肌生粟飲少空嗟甕有醅東閣莫嫌無好句眼花不辨雪中梅齋居四首齋館寒燈獨不眠譙樓更鼓晚風傳夢歸戲彩花當户睡起推窗月在天驚鵲南飛翔夜樹征鴻北去沒春煙詩成欲寄同心友恐惹間愁到客邊瑞靄祥光滿户庭髙瞻黼座儼威靈讃傳行禮千官肅工奏登歌衆樂停對越聖容深穆穆降臨神馭逺冥冥江湖翹首層霄上愁絶孤臣兩鬢星公庭吏散集林雅齋室端居免坐衙春滿禁城偏此地風傳歌管是誰家遙瞻紫極懷天表喜見彤雲護日華潦倒揚雄思獻賦却嫌詞藻近浮誇小齋端坐念離居佳句傳來重起豫霄漢故人俱老矣廟堂勳業竟誰歟情同杜甫非耽酒迹異虞卿懶著書回首故山清夢斷三年塵土滿征裾秦淮一覽閣二首好景應憐畫不如小樓非止為觀魚坐邀吟客頻登賞時有仙人共起居春水泛紅花落後晚山增翠雪消餘荔枝盧橘非真有却笑前賢賦子虛畫閣臨流想像題倚欄翹首覺天低名花無數侵簾入好鳥多情傍户啼近水迢迢經雨緑遙山隱隱拂雲齊從來吏隱難兼得城市還驚似澗溪挽薛處士倒用舊韻雲暗天邊處士星客窗寒雨夜𡨕冥輀車忽自京師返相杵懸知里社停别圃煙花懷地主草堂猿鶴怨山靈詩壇舊友應多在灑淚東風到户庭贈二尹李大人致政西歸數載哦松興有餘一朝解組意何如摩空倦鳥投深樹過雨間雲斂太虛酒熟邀朋談往事心間教子讀遺書林泉自有無窮樂肯為浮名嘆索居東津招飲贈詩酬此謝愛鳥啼花發報新年對酒論詩興藹然甲第韓歐元共榜風流李郭更同船此時酒盞寧辭醉他日詩筒莫厭傳離合此生知未免笑談回首社壇邊送唐府丞送母還鄉牙檣錦纜奉慈顔兩岸人誇舞袖斑京兆平刑聞一笑帝城迎飬記三山長江渺渺征帆急落日亭亭去鳥間畿甸焦枯望霖雨石榴花發候君還清風亭賞牡丹次華泉韻上苑芳菲第一叢何年移入禮臺中堪嗟富貴非前日誰信清髙有舊風夜月皎如銀燭照曉煙輕似碧紗籠不須對此頻惆悵萬品榮枯屬化工再次韻花時載酒賞芳叢感慨還生悵望中一點心存常向日數年枝老太禁風今朝相對慚衰白明早重來嘆落紅乘興題詩聊一笑敢嫌詞藻未能工次華泉賞黃牡丹韻寶欄春曉爛生光照眼花開正艷陽唐世御袍還愛赭漢宫粉額盡塗黃更憐上苑風前色兼有東籬月下香老厭妖嬈愛清雅幾回徐步過前塘次仰止送周貞庵韻四月南風錦纜斜送行冠蓋集江涯謾嗟行役還髙詠共説詩壇讓大家檣櫓影搖波底月旌旗光映岸傍花樓船到處鯨鯢避博望虛傳海上槎送張申臺巡撫遼東帝城東北是遼陽旌斾悠悠去路長千里山川歸節制萬年襟帶此封疆迅雷震處開聾俗甘雨零時潤瘠鄉見説醫閭秀無比政間應上最髙岡聖節習儀朝天宫次華泉韻風馬瀟瀟夜氣森江湖廊廟幾關心太平天子春秋富衰老孤臣感念深詞苑濫竽憐往昔奉常叨祿愧而今千秋金鏡無由上萬歲遙同祝夀音次日習儀太常不預再次華泉韻玉宇涼生萬木森珮環趨走念同心風傳鼓角朝儀靜雲擁旌旗帝座深祝夀已聞頻似昔賡歌還羡不如今獨慚下里巴人曲難並黃鍾大吕音東園亭上次華泉聯句韻細細巖風吹桂香微微江雨送新涼莫思白髮愁千種且對青山醉一場舞袖輕搖秋水靜歌聲髙入暮雲長良辰美景真須惜屈指東籬菊又黃和郭杏東九日韻二首吟苦偏愁白髮催故人何事又詩來籬邊黃菊花相對客裏清樽酒自開南國此時聊遁迹北扉當道正需才嗟豫潦倒無他望獨立西風想釣臺重陽細讀黃花句懷抱因君一暫開杜甫當年已作客陶潛今日正銜杯殊方久廢登髙興青眼誰憐濟世才北望親闈腸欲斷塞鴻頻到少書來送貞庵進表分韻得文字星占營室動天文世廟新開自聖君入賀中丞凌驛雪送行僚友惜江雲歌聲緩處詩初就風力柔時酒半醺待漏寒多不成寐鳯樓霜角幾回聞送寅長南屏老先生入覲用樾岡韻官署方歡伴食新離筵無奈便傷神三千里外朝天路四十年來報主身殿上咨詢瞻日月淮南歌頌記陽春工曹造作如星火休説寬仁舊撫巡病歸留别諸友次浚川韻幾年塵土汚華簮歸想南莊樹影深廊廟山林元異趣野雲沙鳥是知心不嫌鄰叟挨肩坐却恐明公枉駕尋沈水煙消荻簾捲緑槐髙處一蟬吟次鳯凰臺韻春來間上鳯臺遊極目長江天際流紫氣蔥蔥籠殿闕蒼煙漠漠羃林丘功名誰畫麒麟閣詞藻空傳鸚鵡洲且對青山傾緑醑莫教明月笑人愁送陳侍郎奏績京師少宰朝天及早春羣公相餞集江津九霄宫殿皇都逺千里鶯花驛路新鳷鵲樓頭傳刻漏鳯凰池上聽絲綸袖中應有山公啓見説君王訪正人齋居次韻南國齋居萬慮輕北辰翹首正關情紫壇香藹通金闕絳節雲開下玉京樂奏笙簫傳禁衛駕回車馬隘都城人心歡悅天心享共賀今年大禮成弔前溪景伯時車馬穿林踏曉晴山河揮涕掩荒塋玄堂漫刻新碑志丹旐猶題舊姓名文字百年空翰苑英靈千古閉佳城鳯臺門外經行路倣佛鳴騶月下聲送樾岡青春旌斾照長途相餞中丞赴上都聖主臨朝求治理逺人傾耳聽嘉謨兩淮煙水連南北三晉雲山似畫圖見説經過豺虎避至今歌頌滿樵蘇送松月江西傳檄奏竒勳海上揚旗淨冦氛憲府論功誰並駕銓曹書最已前聞大同金鼓驚邊月甘肅烽煙肅隴雲自古全才兼將相莫教人説范希文同年殷僉憲遷居伍松月有贈因和二首華居新買傍城隂流水橋南帶茂林車馬稀疏知地僻煙花撩亂覺春深醉扶竹杖看魚躍困倚藤床聽鳥吟最愛三山當户牖晚峯相對翠千尋不受塵埃半點侵誰知城市有山林鳥啼花落簾櫳靜月白風清苑宇深酒熟時招鄰父飲詩成間對細君吟興來䇿杖園中去萬紫千紅自討尋聞蒼谷來騎驢出郭俟龍湫怪事相傳説未休蒼谷擬改怪事為勝事病我不能遵往轍更誰堪望繼前修春風滿面形容隔華髮盈簮歲月遒嘉靖九年元日曉斾旌應記過懷州贈通渭王應祥三十年前舊弟兄一樽相對眼偏明雲山此去依春隴車馬何時復帝京世易蹉跎男子志老難離别故人情關中知已如相問報道新來欲避名五言排律送王大歸通渭五月天方暑端居汗似漿君行胡汲汲使我意茫茫惜别情難巳銜恩恨豈忘先公開棨戟賤子侍門墻禮過惟呼字才微許擅場君時方弱冠顔色美清揚設醴情偏厚論文興未央暌違驚歲月今昔痛存亡雅望虛丹棘新阡弔白楊薤歌空涕淚芻奠阻關梁鶚薦恢庭訓鸞飛入帝鄉萍蓬憐邂逅弓冶見輝光垂翅雲霄逺歸鞭道路長别懷方浩渺時事倍凄涼四海豺狼滿千秋鳯鳥藏偃戈空屈指漂杵幾沾裳濟世須英俊逢時貴激昻到家先展墓調膳日升堂竹簡功須進棠花色並芳二年齊旦暮萬里看騰驤挽二守宋先生耆夀雕零盡傷心一咏詩典刑存後進風槩想當時有美鄉邦彥真為俊秀師賦梅才自逺渡蟻慶猶遺赤縣官初試青雲譽早馳髙陽留惠愛仁夀振綱維鰥寡頻流涕權豪愧俯眉陽城書考下顔駟轉官遲海畔僉廳擢江南二守推銓評方少愜公鬢已如絲守制還鄉里投簮訪故知鄒陽雖繫獄公冶竟無私未盡鵾鵬樂俄興鵩鳥悲歸神餘馬鬛傳世有麟兒憶昔叨京宦曾經仰令儀抵家公不見懷舊淚空垂寂寞生芻奠凄涼有道碑松楸頻注目翔鳥下髙枝柏齋集卷十一
