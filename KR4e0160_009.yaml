body:
  text: 柏齋集卷九明何瑭撰説南京司禮監太監何公字廷貴説嘉靖乙酉季冬朔旦豫以關領制帛至南京司禮監時太監何公實掌監事相見禮度甚間雅公事既畢乃造其室拜焉相待情意甚欵洽今年季冬朔旦復以關領制帛至監公禮意益勤既歸公乃以手翰見教若曰豫名綬考訓詁綬組也禮記綬組天子玄公侯朱大夫純世子綦士緼此佩玉之組也應劭漢官儀曰綬長一丈二尺法十二月廣三寸法天地人此佩印之組也字以表名人道之常幸執事圖之豫竊惟天子之貴無上自公侯以至於士雖名位不同然皆人臣之貴者也古法貴者佩玉而印非庶人所得用則佩印亦貴者也綬之佩玉佩印雖殊而為貴者之飾則一然則公之字宜曰廷貴夫古人佩玉佩印非徒以為身章也蓋君子於玉比德焉觸其外動其中則好德之心油然生矣佩於身蓋不欲須臾離也政達於上下非印不信佩於身示不忘也德以為體政以為用君子所以見貴於天下後世者多矣豈直以名位之貴哉公可以知所用其心矣我太祖髙皇帝法古建官內設監局衙門以掌內政外設文武衙門以掌外政體統相維表裏相應聖謨蓋宏逺矣司禮監日侍天顔掌管御前一切文字蓋所謂輔養君德典司政本者咸有賴焉視各衙門尤為樞要非老成練達者不在兹選公向用有日則所以資德而資政者寧不知所以用其心乎世之論者於內臣外臣往往各有偏主豫竊以為人之所以可貴可賤者在君子小人耳事君忠臨民仁處事公則君子也事君不忠臨民不仁處事不公則小人也內臣未必無君子外臣未必無小人論者亦致辨於此而已矣內外何擇哉古之人若巷伯之疾惡寺人披之事君吕強之清直張承業之忠義皆內臣之可貴者也雖名公卿何以加焉公明達而溫雅有君子之質於資德資政一加意焉奚古人之不可及哉貴於天下貴於後世吾於公乎有望矣公尚念哉都指揮景公字汝忠説都指揮景公紹宗襲職蒞任有年矣庠友鍾大化等相與議曰春秋之法王朝大夫例書字士乃書名景公方面也視古大夫名而不字可乎盍謀所以易其名者乃相約咨于瑭瑭竊惟古人取字莫不有義由字子路以路為人之所由也賜字子貢以上有賜則下當有貢以報之也公名紹宗豈非以紹厥祖宗為義乎子孫之於祖宗所當紹者固不可以一端而盡然而必有大者焉舉其大則小在其中矣公之祖宗佐我皇明平定天下以致膺有爵位延及后人夫豈無所本乎或發謀決䇿以立功或搴旗斬將以破敵公之尊甫又死於國難蓋無非盡忠於所事也然則公之所當紹者豈有大於忠乎宜字曰汝忠夫人臣而以忠君存心則事上必敬撫下必仁處事必公戰陳必勇凡所以增光前烈益迓天寵者蓋無往而不利矣公其念哉潦倒倦談言止此矣公其勉之是為贈張克已修已字説張本善先生之子長曰克已次曰修已皆冠而成人矣克已謹慎周密口無妄言身無妄動循循然有規矩修已則剛果明決物來能格事來能應惡酒之妨務也絶口不飲者凡五年雖德性不同然皆克家之子也親友咸愛重焉乃字克已曰宗元修已曰宗道屬豫説其義豫惟天之德莫大於元其在人則為仁夫子有言克已復禮為仁字克已曰宗元探其本也人莫不欲修已然而觸情徇物往往不能善其終夫子有言修已以敬字修已曰宗道指其歸也嗚呼二子念哉自家庭骨肉之間以達於揆事宰物之際視聽以禮言動以禮則已無不克而天德之元在我矣大而人倫細而物理務使知無不明而處無不當惟親惟義惟序惟别惟信而放蕩於規矩凖繩之外凡可以敗德敗家之事毫髮不為如前聖之惡旨酒焉則道無不行而所以修已者盡矣嗚呼天理之精微在天則為元在人則為仁率仁而行則為道其同出而異名與兄弟之同氣而異形者蓋絶相類也二子念哉則尊甫命名之心親友相字之望庶兩不負矣謝玘字説舍親周彥實請於豫曰友人謝玘未有字稱謂之間甚不便也幸為一説其意豫惟幼而父名之長而友字之古之道也謝君未有字而彥實以為請禮也然古今名字往往有義或以勸或以戒使入於耳存於心者有所感發非徒稱謂之便也竊聞玘玉之美者也玉之美者溫潤而澤縝密以栗垂之如墜叩之其聲清越以長夫溫潤而澤仁也縝密以栗義也垂之如墜禮也叩之其聲清越以長樂也仁義禮樂德之美者也古者君子佩玉蓋將以比德也然則謝君宜曰宗德夫宗德之字呼於親友之口入於謝君之耳其不有感發乎上孝於其親下友於兄弟外睦於姻親鄉黨而仁之德修矣言行必慎取與不茍自內以及乎外無往不然則義之德修矣不以財驕人不以善自伐謙恭兢業久而不怠則禮之德修矣內和其心外和其形應事接物藹然春溫無所乖忤則樂之德修矣德成乎已名昭乎人則玘乃玉之至而謝君為人之玉也顧不美歟否則珉中玉表吾恐良賈之擲去也宗德念哉范汝謙字説庠友王廷相謁豫曰庠生范汝謙子仁侍御之子而生之壻也既冠矣今年提學副使敖公試其文優等進補增廣親友會遇尚斥其名而未有字禮似未安願執事之教之也豫雅與廷相子仁交故不得辭伏羲作易地中有山之卦名之曰謙文王係之以辭曰謙亨君子有終吉夫地中有山何以謂之謙也蓋山物之髙者也地物之卑者也以髙而下於卑此所以為謙也名位卑微德性遲鈍退然自處於衆人之下固其所也是未足為謙也名位髙矣德性敏矣衆人皆望而畏之乃不驕不矜卑以自牧非甚盛德其孰能知之是則所謂謙也此伏羲之所以取象而文王之所以係辭夫御史朝廷之要官也天下之公議在焉言及乘輿天子動容言及廟堂宰相待罪下及百僚之賢否庶政之從違罔不由之故曰朝廷之要官也而生也其子也所憑依厚矣年始弱冠學業郁然為儕輩所服當道所重德性敏矣兹二者驕矜之所自來而衆人之所同妬也終之實難子仁以汝謙名之其教之之意深矣大舜稱禹曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功孔子亦曰如有周公之才之美使驕且吝其餘不足觀也已夫禹與周公皆大聖也百揆冢宰皆要官也而莫不以謙自持况其他乎當時稱聖至於今而不衰所謂有終者蓋如此然則生之字宜曰有終徵乎易也嗚呼生尚念哉禹周公皆我師也誰謂山髙企其齊則在勉之而已矣科名祿位蓋不待論也是為贈庠生蕭鸞字應祥説蕭生名鸞閥閲之子也天姓頴敏父兄恐其安于豢飬之樂而損其逺大之志也乃教以儒業生遂感奮自勵稍聞于人因女妻之生乃從豫學今年提學憲副王先生試士懷慶選子弟之可進者補儒學弟子員生與焉親友偕賀或謂豫曰幼名冠字所以重成人而與之為禮也生冠矣今復䇿名于學非閭巷碌碌者比不可以不字而執事至親也宜有言以贈且因以教之如何豫曰唯唯竊惟鸞靈鳥也其聲至和鳴則天下太平故世以鸞為國家之祥賢人君子遭時得志有言于上則可以致治太平與鸞何異然則鸞蓋鳥中之祥而賢人君子則人中之祥也生之字宜曰應祥念惟生雖出于武辨之族然其曾祖參將嘗以才略中武舉狀元文學之祥蓋已開其先矣而祖父昆仲又世積忠厚古稱和氣致祥又稱作善降祥生之天性頴敏豈可謂之偶然也哉庠序之中英賢攸萃固鸞鳯之林也生念哉勿荒于嬉而勤以精其業勿毁于隨而慎以修其行使他日得志明時真能贊成太平之治則應祥之字庶不負矣父兄教子之心師友責善之義大不外此嗚呼生尚勉哉勤菴説蕭公字應乾嘗取天行健君子以自強不息之義名其所居之室曰勤菴其勵志蓋有在也間屬豫説其義豫惟人生在勤勤則不匱士之道德農之稼穡工之技藝商之貿遷蓋未有不勤而能成者也應乾以勤名菴宜矣抑吾聞功崇惟志業廣惟勤有志而不勤則志雖大而無成雖勤而不知所志則雖有成而不免於陋應乾勤矣其所志則未知也人之所志大略有三曰富貴曰功名曰道德農與工商之所志富貴而已志於功名道德者惟士為然應乾既富貴矣而猶讀書尚禮孜孜不怠其殆志於功名道德者歟志以先之勤以繼之斯其進也莫禦矣或曰卑之無甚髙論豫曰不然聖人之道夫婦之愚可以與知夫婦之不肖可以能行况應乾之聰明俊爽者乎顔淵曰舜何人也豫何人也有為者亦若是顧吾之志與勤如何耳應乾念哉是為説書與潘同館書試事未畢不得趨拜以敘久闊之懷甚怏甚怏薄具少表芹意計二十九日午後試事可畢不知可少待容一會否衰年強顔於此甚無意趣惟以得會一二故人為重而又值此乖阻可嘆可嘆備員外省誼不可通書都下故人有見問者幸一致意恐終不得與執事會故覼縷及此幸諒之不宣與潞安仇氏書六篇春初逺辱誨音至今感佩秋間復蒙遣令器逺來相從顧惟淺陋不能有所啓發方以負託為愧重蒙寵以手翰申以佳貺益用愧感山川阻修末由瞻拜每念盛德髙風北望咨嗟而已粗紗一端少引芹意天時嚴寒惟台候納福是祝不備纍辱誨音佳貺盛情深感承詢及譜圖事録詳玩所著與前人時有不同然作譜如作史典實明備斯可傳矣體製不盡同無害也北方士夫家作譜者甚少深用敬仰恨無由面會盡質所疑耳末惟以道自愛厚幣義不可虛受敬返璧惟心照是荷不宣聞有氣疾治法平心為上導氣次之用藥為下夫心為氣主故怒則氣上悲則氣下憂則氣結樂則氣散當念萬變皆虛縱有不快亦如寒暑晝夜相代乎前皆自然常理不足留滯胸中久則心自平而氣自調矣其次亦以心運氣使疏通不滯再不得已則用炒青皮炒枳殼各二錢川芎一錢佐以白术製厚朴各一錢少加桂五分空心服之須五六貼乃效大抵還以平心導氣為主藥不過為之助耳不宣纍承雅愛深感盛情生以不才朽腐誤蒙起用深愧不堪是以於親友賀贐並不敢受逺辱佳貺深感然一辭一受恐得罪於衆敬用返璧幸心照令器體虛最宜加慎大抵以靜養為主而輔以藥力庶保終吉道逺無由會晤臨書悵然末惟心照不備纍辱誨音足見雅愛朋友道喪久矣能正言相規者絶不易得生溺於見聞之陋事多違禮每覽教戒輒用赧然雖未能佩行然亦不敢忘也和易和節之號皆善擇一心之所安者自命可也胡畫士來備道雅愛彼此交感會晤無期謹此布意末惟以道自愛不宣去冬蒙寄示周守保甲法且請序文豫時適卧病未暇觀也後觀其立法之意甚善但中亦有一二處難行者如分居民為三隊社長領一隊防守本村社副領一隊徑赴失事村分救護社正領一隊伏路把截此甚難行計十里之內必有數村居民分屬社長正副三人有警何以呼集不如每村立一莊頭居民分為二隊有警一隊守一隊出救俱責令莊頭呼集社長正副但稽其用命不用命而賞罰之焉庶可行也社學束修似乎太厚雖尊師之道但人情出辦不易則亦不可久行耳似當減之使足為代耕之養可也若潞俗自來如此厚則從厚可也社倉積穀不必過多恐生他弊或貽後患但積穀可備本社一二年之荒即止中間以陳易新之法從便行之可也豫近年於世事俱厭倦尤不喜作文字蓋衰倦之故也序文草草塞命紬已收訖粗緞一端奉答表意聞貴恙尚未痊可除藥餌外調攝之法亦當少留意讀書進學須體平後方可圖之言不盡情惟心照不備答婁生書古人謂死而不朽者有三曰立德曰立功曰立言歐陽子援之以贈其門人徐無黨則謂立言不如立功立功不如立德其論甚正惜不明著立德之方使學者無所用力猶為未備豫謂聖賢之學本於明德明德之方始於格致自身心性情以達於家國天下莫不各有一定之理一一而格致之使本心瑩然無所不明則德立矣由是而形之踐履則為善行措諸政事則為豐功發於議論則為格言達則伊周窮則孔孟蓋無所往而不可也立功立言蓋皆在其中矣若後世人臣勳業司馬韓柳之文又何足羡慕哉賢契嘆平生學文學道建功立業而皆無所成亦留心於此而已矣功崇惟志業廣惟勤立志而繼之以勤何事不成雖自今方覆一簣可也况已有其基乎雖然為不朽之計而立德立功立言猶自立教之意言耳大聖之心不如是也窮神知化獨立物表彼其視世人之毁譽榮辱不啻暑寒晝夜之相代乎前耳夫豈屑屑於是哉斯言雖未易及然亦不可不知也念之念之移表彰陳同父移本道為表彰先賢以明公論事照得故宋永康陳同父先生才髙志忠文雄節峻當時推重後代景仰舊祀於本府鄉賢祠內公論允愜近按臨考試諸生聞前此有議其喜談兵事不修小節與聖門所學不同者當道惑於其説罷其祠祀竊惟聖門施教尚分四科君子取人豈拘一律子路好談軍旅遊夏齊驅宰我立論短喪閔曾同祀若依淺狹之見均在罷黜之中陳同父言行始終人所共知豫不多及特明此意以釋羣疑仰抄案回府著落當該官吏即造先生神主照舊奉入郡學鄉賢祠內致祭仰抄案官員先具不違依準呈來跋雲中激變論跋或問代府宗室雲中激變之論如何曰所論可觀矣然知其一不知其二也往歲軍士殺巡撫固出於有激然亦驕悍而無知者也朝廷處之過寬失於姑息彼遂以殺上官為常事矣彼既以殺上官為常事則上官一忤其意即皆可殺此所以復有李總兵之變也李總兵之見殺也吾嘗訪其故矣非為其尅減糧賞也非謂其妄殺無辜也不過謂用法過嚴副參以下至於軍士皆不悅耳總兵用法過嚴軍士即敢殺之已為不道况又有隂謀相傾之機伏於其內乎夫殺總兵者固非副參都司指揮也然軍士敢殺總兵不復以副參都司指揮為可畏副參都司指揮亦坐視總兵之見殺而不救此其故則不可不察也副參都司指揮各有握兵之權同居一城之內其救總兵非難也乃坐視不救其情可知矣若非隂縱主謀亦係畏懦失機治以軍法豈容免死軍士殺總兵謂由總兵虐害所激此雖未知虛實尚有可諉朝廷命將征𠞰不過欲得首惡耳大抵止一二百人非欲盡屠大同之人也乃復抗拒不服不肯送出首惡甚至敵殺官軍勾引諸邊此豈亦朝廷虐害所激哉副參都司諸人坐視若罔聞知既不設法擒勦又不禁治阻當此何意耶論者猶謂軍士不反朝廷其情為順副參諸人無預軍士之謀何所見耶及朝廷差官招撫乃始取十數無援之人以充首惡之誅其情豈可掩耶朝廷乃一切以姑息待之置而不問而馬升楊林之首惡有名者且以有功升官矣既不能正首惡之誅又未聞有善後之䇿吾不知禍亂何時而已也天下之患常起於上之人以下之人不足畏恣意凌虐及下之人激而生變則又畏之太甚不敢復治此姦雄之所以觀釁而生心也此天下之勢所以一去而不可回也昔元魏時髙歡行役洛陽見羽林軍士相率焚大臣張彞之第魏朝不敢深治乃慨然曰朝廷紀綱如此家財豈可保乎遂散財結客後卒成霸王之業姦雄代有不可謂今天下盡無其人也論者謂軍士殺總兵為常事乃欲朝廷緩以處之待其自潰且以癰疽為譬此蓋未深思也譬如人於平日恣意聲色不知自謹馴致有癰疽生於胸腹之間不知醫之治此當針石補養之並用乎抑止歸咎其平日不謹畏其痛楚不復攻治而待其自潰乎吾恐其毒氣流注臟腑俱病一旦毒發而不免於死也竊意朝廷之處此變當通究始終盡殱首惡然後選任賢將撫以恩威乃可今既失之於前矣如欲求善後之䇿宜明以朝廷不究既往之意丁寧戒諭使軍士知非常之恩不可屢得各要改過自新安分守法如總兵以下有剝削酷害軍士者許具奏拿問不許擅自殺害違者全家處斬復申明軍法使總兵副參遊擊都司諸人俱要撫恤軍士不許剝削虐害違者或告發或訪出俱各拿問仍各禁治所部軍士不許喧譁謀亂犯者以軍法重治有作亂者即互相䇿應擒𠞰不用命者即以軍法從事總兵副參都司諸人有不相䇿應至於失機者各罪坐所由依軍法處斬不赦有司之民護衛之軍丁各結為保伍擇人管領有變互相䇿應違者亦各治罪如此則大小將官同心協力形格勢禁亂庶可已不然則縱有賢將亦不能行其號令事勢所激亂必復作天下姦雄觀釁而起朝廷雖欲一切以姑息待之恐亦不可得也近又見宗室有因雲中之變奏請禁治貪酷恐釀成天下之變者其言深有所見然未探其本也天下之本在朝廷朝廷之本在君心君心未知治亂安危之機好諛惡正則小人進而君子退矣小人當道則順旨固寵剝下附上無所不至以類引類則據要地者皆其黨矣縱有一二賢者亦不過謹厚自保豈敢正言其非然則雖有禁治貪酷之法誰奉行哉而奏中言不及此豈未及深思乎抑有所畏而未敢言乎朝廷有禁治貪酷之法而臣下廢格不行此誠天下治亂宗社安危之機非小事也竊謂此宜深勸朝廷以治亂安危為重親任忠賢斥逺諛佞然後勑諭該部禁諭文武職官各令守廉奉法不許剝削酷害軍民犯者文職即依題準問刑條例枉法贓滿貫者問以充軍不許止問革職武職依户部題準事例犯私罪杖徒以上者依律各問降革不許止問立功違者法司即將原問官參究問罪輕者降調重者黜退有贓者亦問充軍若法司循情不參朝廷或摘取詰問亦輕者降調重者黜退有贓尤加重治如一年之內全無問到貪酷官員亦要通行查究仍刻榜曉諭天下如在外法官問斷貪酷官員不依禁例許諸人奏聞究問如此則法令可行不為虛文貪酷可減軍民得所而禍亂不作矣語稱臣之於君三諫而不聽則去之子之於親三諫而不聼則號泣而隨之異姓之臣去之而已同姓之臣無可去之義猶子之於父也念哉念哉林下之臣法當括囊自守不談時事而區區憂國之心有未忘者因觀宗室論奏喜其有忠愛之心而惜其未盡事理之變乃草此於後以備採擇觀者幸見恕哉兵論跋豫卧病林下本不當復談世事但豫念敵兵深入搶殺事關地方利害非一家之私可比又念地方既亂亦無一家獨安之理故不得已告於士夫之知事者庶轉達當道見諸行事則亦救時之愚慮也守拙卷跋豫幼讀濓溪拙賦怪其詞太簡問於友人友人笑曰甚哉子之固也不曰拙者默乎天何言哉四時行焉百物生焉吾尚病濂溪未能忘言子乃怪其簡乎豫無以應同寅潘希周先生示以守拙傳文一册蓋諸名公為其伯父傅潤翁而作者也凡古今巧拙之論蓋彬彬備焉豫拙於詞不能有所發明偶記所聞於友人者漫書於後不知於守拙翁之意竟有合否鏡中真讃跋其色溫溫其容穆穆屹然如山曠然如谷孝友成於家庭信誼著于宗族在富貴而不侈不驕處鄉黨而不諂不瀆若是者雖纍言尚不足以形容况丹青豈能寫其心曲噫此雖未足以得君之大全豈不庶幾識君之倣佛也耶嘉靖庚寅姻家蕭君文敏夀六十有三長子拱暘乃謀於弟鳯弟鸞弟鸛若曰語稱父母之年不可不知也一則以喜一則以懼父母之夀髙矣可喜也亦可懼也吾聞為人子者雖跬步而不忘親父老矣吾兄弟各居雖欲朝夕望見父之顔色而不可得况後世子孫乎盍募良工寫父之神吾兄弟各收其一朝夕奉事如見顔色何如諸弟曰甚善神既寫矣復謂諸弟曰父之顔色工之所能寫也父之德行所以庇佑我子孫者則非工之所能寫也盍請名筆述而為讃使我子孫見父之顔色則思父之德行庶永慕於無窮乎諸弟曰諾乃請于豫豫感應乾兄弟之孝既述以讃復係以跋使觀者知所自云䇿問九問問周子論士希賢而曰志伊尹之所志學顔子之所學曰志曰學有以異乎於伊尹曰志於顔子曰學意必有在抑二子果有所長而不能相兼乎幸明以告我問救荒之政古人言之詳矣或發倉粟或募民出粟或鬻官鬻度牒孰可行於今至其賑給之法則或煮粥或給以粟然粥之煮有限而待哺者無窮使窮困之民伺候於旬日之久而始得升斗之粟恐不能有濟將何施而可諸生有善䇿幸以告我我將以告於當道者問盜賊不息則良民不安浙中舊稱無盜近來桴鼓四鳴道途多梗其咎安在古之善治盜者如晉之隨會鄭之太叔漢趙張龔遂虞詡之徒事功之詳具在史册或以寬或以嚴或以鈎距或以德化往往不同孰可以行於今諸生其明以告我以觀有用之學問海潮之難明也尚矣昔人之論或以為由於日或以為應乎月或以為氣之喘息或以為地之升降或以為海蝤之出入孰為至當昔余襄公生長海上故其海潮之論獨為先儒所取蓋以其知之真也諸士子生長於濱海之地安知無襄公其人乎幸明以告我以觀窮理之學問孔子曰我非生而知之者好古敏以求之者也議者多以為謙辭然問禮問樂問官之類備載典籍則好古敏求非盡出於謙者夫以孔子之聖尚不得謂之生知則生知之聖何人可以當之諸生其明以告我問學校興則人才盛富陽生員甚少及選送童生又止二人可謂不振之甚矣夫閩蜀荒陋之地也一遇大君子振作於上其文教至今不衰况浙中人才淵藪而富陽乃若此其咎安在語稱豪傑之士雖無文王猶興在上之所以作興與諸生之所以自為謀者其道何由明以告我我將採而行之尚無讓問宋之道學莫盛於南渡之餘蓋自考亭得伊洛之傳於延平李氏南軒東萊既與之同心協德而象山止齋龍川諸賢亦與之上下其論故斯道大明此固天下後世之所共知也然觀其議論或主德性或主問學或先功業或先禮制往往若不可合者豈道之多端固若是歟抑人之所見有淺深得失之異歟溫號海濱鄒魯諸士子於先儒之緒論蓋必有留心於其間者矣其明辨以對毋泛毋略問先儒有言西漢之人才可與適道東漢之人才可與立三國之人才可與權夫道未易言也兩漢之人才果可與適道而立乎至於權則聖人之大用尤有未易言者孔門髙弟如顔曾之賢尚未足以與此三國季世也乃有可與權者乎不然則先儒之論疏矣諸士子其各據所見以對毋泥成説問孔子嘗言天下有道則見無道則隱春秋之時天下之無道也極矣乃周流四方而不隱何歟已言之而已自違之何以取信於人荷蕢諷其可已蓋亦無道而隱之意也乃復以果哉譏之何歟自我言之則以為是自他人言之則以為非無乃好勝而強辨乎凡此皆諸生朝夕之所講誦者也其各以所見告我雜著讀韓栁文韓文髙栁文巧於模寫然於韓為劣讀審勢賞罰有常而不易則人自有所懲勸矣用不測之刑用不測之賞使民不知所從發則民無所措手足矣商鞅之法可以強秦亦可以滅秦然其法猶有定制而不變使民可守何嘗有使人不知其所從發之意耶嗚呼商鞅極矣老泉乃欲上之耶然此非老泉之立言本意也讀田樞密書其所自賢者文其論孔孟非也其欲見用則有挾而求也洵乎洵乎權詐之流也讀律吕元聲律吕元聲莆兩山李文利氏所著也其法謂黃鍾律三寸九分最短蕤賓律九寸最長宫音最清羽音最濁與古法大相反竊謂此不過一家之言耳究其實則非也夫律之短長音之清濁皆人所命則謂黃鍾為長為短宫音為清為濁似無不可今所以知其非者亦以其法象無準倫類不通知之耳古法黃鍾律長九寸蓋以天地之陽氣冬至之日始自下而升然去地上猶逺故埋黃鍾九寸之律于地中以候之氣至則律管灰飛以此為驗若黃鍾止三寸九分則安能與地中之氣相接若謂候氣之法十二律之管埋於地中者皆齊其下不齊其上則十二律之管氣至當一時飛灰又何以别於黃鍾此其法象無準一也律以候氣和聲聲氣皆屬乎陽老陽數九故黃鍾九寸若謂三寸九分則不知何所取義此法象無準二也樂聲與人聲各有五音而人聲尤為自然喉為宫音舌為商音牙為角音齒為徵音唇為羽音此人聲之自然者也李氏亦謂此為可據矣喉為宫音豈非以其來之深長而濁乎故古法以長律之音為宫以配之唇為羽音豈非以其來之短淺而清乎故古法以短律之音為羽以配之今李氏乃謂宫音最清羽音最濁則與人聲之宫羽相反此倫類不通一也李法謂數少者音清數多者音濁及論五音之數則謂宫音五十商音八十角音九十徵音七十羽音六十宫音五十最少謂數少音清可也商音次清數乃八十羽音最濁數乃六十又安在其少者清而多者濁乎此倫類不通二也若謂宫土音故數五十羽水音故數六十則商金音數何以反八十角木音數何以反九十乎土濁水清理不可易今乃謂土音清而水音濁何居此其倫類不通三也既以宫為清而羽為濁矣及論樂調則又謂蕤賓為宫則夾鍾為羽又安在其宫清而羽濁乎此其倫類不通四也此六者音其大端餘瑣瑣者未暇細論然則其法之非也明矣讀中原音韻中原音韻江西周德清氏所著也其法謂平分二義入派三聲平分二義則以平聲之字音有抑揚分為隂陽如荒黃青晴之類是也詞曲之間當用陽字者不可用隂字當用隂字者不可用陽字若失其法則歌喉有礙然此亦近世之論耳古法不然也古人歌詩有叶音之法蓋借他字之音而歌之也則於字相近而音有抑揚者固可以相借而用之矣况周法謂入派三聲則入聲之字當歌之時亦借為平上去聲而歌之矣拘於平聲而不拘於入聲抑豈得為通例乎然則周氏蓋亦知音而未達者也獨其所述十二曲調猶可考見古樂之倣佛觀者亦不可盡廢之耳嗚呼禮失而求之野此豈得已也哉豫既著管見後得見神樂觀所具中和樂譜乃知合四一上尺工即五音之别名但四清有黃鍾大吕太簇夾鍾而無林鍾與管見不合然四清全無用疑傳久有誤蓋與五音相生之法不合也姑記於此備參考云傳和節居士傳詩衛風淇澳之篇美武公而作者也其辭有曰善戲謔兮不為虐兮朱子釋之曰言其和易而有節也上黨太學生仇時表慕武公之為人乃以和節扁其藏修之室因以自命間屬豫為傳豫竊惟古之聖賢不廢戲謔蓋一張一弛文武之道戲謔出於人情之所不免故不禁也及張子作砭愚以訓學者乃切切以戲言戲動為戒夫張子傳聖賢之道者也所言乃若氷炭殊不可曉及讀魯論見有子論禮之用和為貴復曰知和而和不以禮節之亦不可行乃始得其説蓋聖賢盛德之至動容周旋無不中禮故其戲謔自不為虐後之君子未能謹禮若遽以戲謔為事鮮有不失者矣此橫渠之所以切切而戒之也朱子以和易有節釋淇澳之詩其旨深矣傍考武公自警則有抑戒之篇悔過則有賓筵之雅其所以謹於禮者至矣而淇澳詩人美之亦必先之以切磋琢磨繼之以瑟僴赫咺然後及於戲謔而不為虐焉則其言固有序矣然則欲和易而有節者可不知所用力也哉嘗讀時表家範自冠婚喪祭以至衣服飲食言動之微莫不有禮而時表之來接也循循雅飭可觀可度則其於武公之和易有節者蓋已深體而自得之矣來咨於豫豈非欲以其所自得者與同志之士切磋而共由之哉時表名桓世為上黨詩禮大族兄字時茂者為瀋藩儀賓有志於古聖賢之道嘗遣其子熙從豫遊故豫於時表之請不得以不敏辭云讃靜樂堂讃大厦沈沈雕欄楚楚吞吐隂陽隔離風雨中有天人衮衣章甫左圖右書俯今仰古造化與鄰聖賢為伍靜樂之堂清虛之府周審理像讃古學古心令儀令色奮迹儒林司刑王國克允惟明上嘉下説冠珮儼然庶幾見德柏齋集卷九
