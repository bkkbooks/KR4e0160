body:
  text: 柏齊集卷四明何瑭撰序贈王邦佐分教寧海序同學王邦佐先生器宇端重學博而文纍舉於鄉不第乃以貢入太學因親老謀為祿仕得分教山東寧海州親友許舜時輩來徵言以贈嗚呼豫何以為邦佐告哉為學為教之方修已治人之道聖經賢傳備矣固邦佐之熟知也將何以益之哉豫獨念近世學者多從事於記誦詞章之習以取科第以致通顯意以為學問之道如是而已師以是教弟子以是學在在皆然知有聖賢修已治人之學者蓋甚鮮矣或以聖賢之學為難殊不思聖賢亦人耳士希賢賢希聖分內事也在勉與不勉耳或以士必棄科舉之業始可從事聖賢之學今方謀進取疑有所礙故不敢噫此又不思之甚也聖賢之學明德新民何嘗禁人之進取哉顧進取之志何如耳格致誠正以修其身者必欲治國而平天下使以隱為髙如沮溺丈人之儔則何以治國而平天下乎其不然也審矣邦佐念哉天下之治亂在人才人才之盛衰在學校師儒則學校之主也師儒得其人則學校興人才盛而天下治非其人則學校廢人才衰而天下亂其任蓋亦重矣古之為祿仕者乘田委吏尚不敢曠其職而况師儒乎哉寧海去鄒魯為近孔孟之化猶必有傳者安知其無豪傑之士出於其間乎吾言止於此矣邦佐暨寧海之士庶幾念哉蔣教授改任序鄭府真丘王教授平涼蔣先生以王薨改周府封丘王教授某約縉紳士往餞之來徵言於豫以道别意豫惟士君子在仕途類以儒學官及王府官為落莫不偶豫竊以為不然故嘗謂君子在仕途之可樂者大端有二大則坐廟堂之上與天子可否政事進退百官以綱紀天下次則在藩臬郡縣之間為斯民興利除害使百姓敬之如神明愛之如父母此固可樂也其或道與時相違才與命不偶則鳴鐸於庠序之間與英俊之士講道義辨古今事得失成敗或曳裾於宗藩之府為賢王講說經史以啓發其聰明無奔走叢脞之勞而有從容偃仰之適此亦可樂也至於上焉而不能行其道次焉而不能安其身勞神於窺伺承順之間毁形於車塵馬足之下則雖居髙位食厚祿世俗固以為榮君子之心不樂也先生始以國子生授四川石泉縣學司訓既而擢鄭府真丘王教授今改官仍在王府其亦有所樂於此否乎故因以質之先生諱傑字士英德性淳厚學問有源委故及門之士盍簮之朋於其别也戀戀不忍有如此云致仕文安縣主簿孟公夫婦九十序人生以百嵗為期故古人以百年為上壽八十為中壽六十為下壽然古之聖人或年踰百嵗後世則鮮或克壽雖孔子大聖亦僅七十有三而已或謂氣有淳漓則數有短長太古渾沌始闢風氣方淳故人物之生其時者多壽後世太朴既散風氣日漓故人物之生其時者多夭宋儒蘇氏子瞻嘗言蜀有老人村居深山中與外境絶不通食粟飲水無鹽酪酒肉之養其人多壽至有見五世孫者豈非深山窮谷之中淳朴未散其風氣猶有太古之遺故耶近來風氣益漓壽者尤不易得以豫耳目之所聞見壽登九十者止二三人壽登八十者不過十餘人吾郡士民奚啻數百千萬而壽九十者僅二三人壽八十者僅十數人是不尤難得也耶武德鎮致仕文安縣簿孟公與其配張氏俱壽登九十子三人曰經未仕曰綸任驛丞曰紹任巡檢孫十一人曰祿配鄭府新樂郡主為宗人府儀賔曽孫男女五人皆侍膝下鄉黨宗族姻戚咸以為慶姻家張君英乃來徵言豫雖未及親炙公之顔範然嘗聞公之氣質淳厚言動謹飭家饒於財而以禮自守未嘗驕人仕宦政成即引退優游田里二十餘年於今矣蓋得太古之氣於澆漓之世者也夫近世壽八十者尚不可多得而公乃至九十又夫婦偕壽不尤難耶東坡以人生得見五世孫者為難而公已見四世孫蓋庶幾矣豈非公獨得風氣之淳故能然耶居今之世為古之人公真可敬也哉吾有感於世道之變故書是以為慶張千戶襲職序羣牧所千戶張侯受命襲職歸自京師姻親李拱之來徵言以賀且曰侯之先順天府之大興人髙祖始從戎以靖難功纍升至金吾左衛副千戶改鄭府羣牧所千户傳曽祖祖父以及於侯其世逺矣侯今臨政伊始願執事之進之也於戲人亦有言敗軍之將不可以語勇瑭以迂疏多病退伏閭巷乃嘵嘵然語人以居官臨政之方人誰聽之然嘗誦先正之論矣請述以告可乎人無于水鑒當于民鑒國朝之初功臣封侯者不下數十今存者無幾豈非位髙祿厚子孫驕奢淫佚不自保守故至是耶侯家得五世歷百餘年不替所守豈非纍世忠孝勤謹不自放逸故致然耶噫侯可謂賢矣勿以位髙而驕人勿以祿厚而縱欲事上以忠待士以禮接下以仁處事以法勿荒於酒勿迷於色勿疚於利夙夜永念不怠如此而家世不長名位不光無是理也然居官臨政之詳具載書史聞侯之祖手不釋卷侯嗣守庭訓且姻親交友皆彬彬然文學士也聽覽之暇留意書史考之於册咨之於友則聞見博而心志開為益多矣侯尚念哉抑瑭又聞士欲立功名於世有其志無其才不可也有其才無其時不可也有其時無其幾不可也方今草竊蜂起天下多事士欲立功名以自見此其時也侯如有志則積學廣才以候其幾其亦可也瑭已矣無能為矣賀單戶侯軍政序國朝政治之法文武並用文則取之科目武則取諸世胄取諸科目選擇甚精故得之甚難而其任職也自不敢不慎取諸世胄則安坐承襲故得之甚易而其任職也多不自愛惜朝廷患其無所懲勸也乃立為五年一考選之例廉能公勤為軍士所服者則選任軍政令其居職理事貪酷庸暗為軍士所惡者則退為剩員令其帶俸雜差蓋亦鼓舞振作之良法也嘉靖丙申例該考選衛所官自指揮以至戶侯各有進退而戶侯單大人實與軍政之選母舅劉大等乃偕諸親往賀而徵言於豫豫竊惟古昔聖王之法凡臣下有功於國者其子孫皆教之教之而成材則官之如不足用亦使之不失其祿故仕者世祿而不世官我朝文職無世襲武職則自公侯以至千百户皆世襲其待之厚於前代矣國初武職犯罪降革今此法雖廢然自有考選之例以來廉能公勤者始得軍政理事否則帶俸雜差而已蓋與古世祿而不世官之意實相暗合今單戶侯既以素為軍士所服選任軍政信可賀矣然可不知所慎哉凡事朝廷俱有法令合於法者則行之違乎法者則不為此蓋居職理事之規矩也能慎乎此則軍政有光矣戶侯念哉是為賀陳彥威生子序豫自遁居荒野百事俱廢自分與城市相忘久矣忽謝宗德同周彥實來訪茶罷作而請曰舍親陳先生去冬始生元子敢祈一言以賀豫以荒廢再三辭不獲於戲豫言何所發明乃煩人之勤懇如此哉夫生子之可喜與年長生子之尤可喜夫人知之夫人能言之豫何以為先生頌哉邇來習於稼穡之事請以稼喻可乎富人之稼也其田肥其糞多其耕勤其種時故其苗之生也碩大以蕃少粃而多實貧人之稼也則不然其田瘠其糞少貸牛以耕不免鹵莽貸穀而種不免晚暮故其苗之生也茸短萎黃多秕而少實是豈穀之性有殊哉其所養則然也積善之家其父祖仁恕忠厚既已見佑於天庭闈之間所以訓其子孫者又無非禮義遜讓之事故其子孫之生者多賢明而壽積惡之家其父祖之强狠凶逆既以得罪於天而其子孫耳濡目染於朝夕之近者又無非不道不法之事故其子孫之生者多頑悖而天是豈人之性有殊哉亦由其所養而然也先生自上世以來纍葉忠厚先生昆季五人皆光明俊偉卓然自立為逺近所宗天之所以佑陳氏者既已驗矣先生於昆弟為長尤謙厚不伐天之所以佑之者蓋方來而未已也斯子他日之聳壑昂霄蓋不卜可知矣豫昔遊庠序視先生為先進先生之相接也不以後進忽之循循煦煦愛禮兼至豫心蓋銘刻焉先生生子之喜固豫所樂道也况又有謝君之請乎惜荒廢之久不能發揚盛美之萬一耳姑以此賀曹元善更名序窗友曹元善先生本名仁以漢曹操之族人有名仁者惡其類也更名希仁請於提學憲副邊先生先生許之諸友欲并更其字來謀於瑭瑭竊惟天道莫大於元人道莫大於仁故曰元者善之長也君子體仁足以長人仁之字元善厥㫖深哉然希仁之與仁一也且元善之稱於親友久矣不更可也無已則以可勸可戒者為元善告乎古之賢人君子非惟同宗榮之同鄉榮之天下亦莫不榮之孔顔之名萬世仰慕是豈有所阿私哉憸夫小人非惟天下恥之同鄉恥之雖其同宗亦恥之幽厲之名孝子慈孫有不能改噫其可畏哉夫人為萬善之長初無可惡而元善必欲更之者徒以操故耳曽子至孝不過勝母之門墨子非樂不入朝歌之邑古之人有然者矣元善惡惡之心其嚴矣哉吾夫子有言見賢思齊焉見不賢而內自省也夫操之所以可惡者豈非姦邪猜譎不忠於漢故耶夙夜以思凡事之類於操者悉去之斯可矣夫仁一發而親親再發而仁民而愛物極其效則至於天地變化草木蕃嗚呼大矣元善事親孝處兄弟義交友朋信臨財廉而處事公以直其所以行之於身者蓋無不仁也他日有位則鼓元氣而雷域中騰百川而雨天下亦分內耳元善念哉夫責善朋友之道也故告之不敢不切以詳元善念哉張生入學序嘉靖元年二月欽差提學副使王先生試士懷慶選子弟之俊秀者補儒學弟子員張生繼光預焉處士熊世威其外父也來徵言以賀豫惟我朝之法取士則以科目養士則以學校其取之也中鄉試者則謂之舉人中㑹試而賜第於廷對者則謂之進士公卿百司胥此焉出其取之也重矣其養之也始入學則謂之附學生少進則謂之增廣生再進則謂之廪膳生教以義禮以養其德教以文詞以養其業德成業就然後以科目取之其養之也豫矣譬之木焉楩楠杞梓必豫養於山林場圃之中培壅澆灌積以嵗月既成材矣然後匠石取之以為明堂棟梁之用固自然之序也張生今始入學為生員蓋楩楠杞梓初培養於山林場圃之中者也豈可不思所以自養哉齊莊中正以養其心學問思辨以養其知孝友忠信以養其行禮義廉恥以養其節使在學校之中則為名士由科目而出則為名臣斯無負於朝廷養士之意而大慰乎親友相賀之心矣不然吾恐養小失大不免為士林之纍也生嘗從豫游豫愛其典雅聰慧有可進者故以是告之生尚念哉學問精微之妙生當自求之言固不能盡也於戲生尚勉哉賈生入學序賈生應奎文洪先生之子也天性聰頴而文洪教之甚勤其纂言為文清麗可愛今年提學憲副王先生試士懷慶選子弟之俊秀者補儒學弟子員府學凡補三十三人應奎實為之首許舜民先生其外父也懼其驕而不進徵豫言以贈之豫惟文詞清麗在後進固為可愛然此特始學之事耳吾儒之所當務者蓋不止此也昔魯齊文正公幼時從鄉師讀書嘗問曰讀書何為曰科舉取第耳公曰如斯而己乎師大竒之自顧章句儒非其師遂辭去公後卒以道德文章為世師表奎壻舜民之門拜文正公之祠遺訓風烈蓋聞之久矣其亦嘗思之否乎文詞清麗充其極不過可以科舉取第耳然則所當務者固不止此也國家以學校養士有司以文詞取士意必有在生亦嘗思之否乎古者八嵗入小學十五而入大學所事各異今之府縣學古大學也生藏修遊息於此豈可不思其所當務哉誠思而求之則自不敢不進將來事業必大過人決科取貴蓋在所不待言矣於戲生尚念哉生尚勉哉父師親友之所以望生者固當不外此䝉宗孟西歸序平涼䝉生從其父宦學於山東青州府益都縣歸而過懷慶真丘王教授蔣先生其外舅也因留講學於懷慶將歸窗友牛生來徵言以贈豫惟責善朋友之道也臨别贈言責善之餘也吾何以為生告哉今世士君子之講學者大抵主於發䇿決科夫告人而不以其近且切者非迂則誣然止於其所習聞習見而無所進焉君子亦不為也昔子張學干祿夫子告之曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔祿在其中矣不斥其干祿之非亦不曰此干祿之術也止曰祿在其中而已此固聖賢告人之法也夫學所以謀道也五經四書載道之器也國朝養士於學校使之講明乎五經四書之文然後取以科目布之庶位以贊政治意固有在矣嗚呼生尚念哉本之四書以求其端廣之五經以充其體參之史傳以通其變身如何修家如何齊國與天下如何而治平時而玩焉務使得之於心驗之於事則發而為英華行而為功業決科取士蓋將不待他求而自至矣於戲生尚念哉朋友贈言之意當不過是也仇生北歸序正德末年豫致仕家居潞安仇生奉其尊甫玉松先生之命來從豫遊既而别去嘉靖初年豫䝉恩起廢從仕於外與生不相見者蓋十年於今矣嘉靖已丒豫再致仕家居今年生復自潞來省時玉松先生捐館已六易嵗矣相見首弔之生悲泣不能已次問其諸父安否次問其學業所至則慨然曰生一病三年不能出門戶今病雖愈氣體尚虛不耐勞苦學業廢幾盡豫以生年齒方壯體虛尚可復學業尚可勉進之生唯唯居數日將去豫念平日無益於生而生乃惓惓相愛無已顧無以報之又念豫老矣恐後不復相見乃以平生拙學告之蓋盡心之道也竊嘗謂大學之道在明明德在新民在止於至善格物致知誠意正心修身皆明德也齊家治國平天下皆新民也學者於明德當無所不用其極新民之道則惟可行於家仕而得位然後可行於國與天下生居家有家範居鄉有鄉約修身齊家以化乎鄉人其道蓋已試而有驗矣念生方積學待用他日出仕則當有治平之責語雖稱居家理則治可移於官然國與天下地廣人衆政事益繁治平之道非講之素明臨時擬議推度而行恐無以合宜而中節然則生於今日豈可不加之意哉治平之道有所謂事君事長使衆焉有所謂興仁與讓焉有所謂禁貪戾焉有所謂與民同好惡焉有所謂不專利焉其大綱雖明而條目曲折則有不可以一言盡者生尚念哉以大學之傳為綱而博考於經書子史復參以國家憲令以盡其條目之曲折務使其各有定見此則所謂物格而知至也至是則明德之體始全他日出仕則隨其位之所至而行所當行一出於誠則新民之用亦漸造其極矣功成名立可傳不朽與前日之行家範鄉約者蓋無以異也嗚呼此大學之道也豫平生之拙學在此生歸矣尚念兹哉尚念兹哉仇文烈孝行序潞州義門義官仇君文烈乃兵科給事中敏之六世孫而宿州吏目君時濟之子也天性篤孝六嵗喪母知號慟見者酸愴既長習於家庭禮義之訓事父及繼母曲盡孝敬正德十二年父病癱患不能動履君侍養醫禱曲盡其誠歷三載如一日父卒不起君號慟幾絶既葬寢苫枕塊不御酒肉悉如禮每奠哭哀慟如初喪至服闋不懈由是衆稱其孝嘉靖改元修先帝實録詔天下有司採求忠臣孝子義夫節婦之類以備通纂潞學正王公首録君為孝子以應搜擇里老郜經等亦應詔呈舉有司奏請旌異由是君之孝上下逺近無不聞懷慶之士與君弟庠生文光遊者相率來徵言以贈豫惟臣之於君子之於親忠孝之道咸其自盡焉爾已非有所待於外而後為之也仇君之孝其親其心亦若是已矣夫豈以上之賞罰人之毁譽為作止哉然而有司薦之士友贈之是亦有說乎噫此蓋教化之端風俗之機衆人所忽而君子之所留意也夫不待賞而自為善不待罰而自不為惡上智也賞之而終不為善罰之而卒不免於惡下愚也至於可導而上下者中人也上智不易得下愚亦少中人則滔滔者天下皆是也人有一善上皆賞之衆皆譽之其不相勸而趨於善者鮮矣人有一善上咸不加察焉衆咸不知敬焉其不怠沮而變於惡者亦鮮矣古之聖賢能謹乎此故風俗淳美比屋可封後世忽之此風俗所以不如古也仇君之孝士友之所以汲汲稱揚若不容已者夫豈無謂也哉風俗之美吾於是有望矣張世台侍親之封丘序孟縣大尹張先生遣其子世台從學於豫未幾當道以先生治迹彰著薦其才堪治繁調官封丘世台將侍行同遊之士繪圗賦詩以贈其别復請豫言以叙其首豫竊惟指引者師之功也從容規戒者友之任也諸士以世台逺行不復得遂其羣居講習之樂故賦詩贈别以致繾綣之意友道也豫淺陋不足以師世台然嘗尸其位矣每見世台有所質問不達不已竊喜其志篤意勤可以與進然未有以發也今其逺去固當有以告之而况其友為之請乎於戲夫子有言可與共學未可與適道是學貴於適道學焉而不知適道猶不學也今世之士非不誦習聖賢之書口講其所謂道也至於聞道學之名則相顧而笑豈以是為不美哉其心必以為聖賢之道必先義後利必厚本抑末今方作為文詞以干祿仕而何聖賢之道之云噫是蓋未之思也聖賢之道明德新民夫豈以隱為髙如沮溺丈人之所為哉惟出處進退之間不為詭遇斯已矣文以載道聖賢亦未嘗不為也惟不徒飾其輪轅而無所載斯已矣人莫不飲食也鮮能知味也渴飲饑食聖賢不免與人同所異者知味之正耳若謂必絶文詞必棄祿仕然後可以語聖賢之道是何異于閉口枵腹然後為得飲食之正哉是亦不思甚矣世台念哉從事乎博學審問之間反求於慎思明辨之際凡聖賢之所以修其身齊其家以及乎國與天下者必究其極勿鑿而深勿執而固要以大中既自得矣則發為文詞以應科目施於政事以為功業無所不可不幸齟齬則樂天知命而遁世無悶焉聖賢之道固即此而在矣豈索隱行怪為哉抑人有言雌雞不能伏鵠卵吾淺陋不足以化世台三原馬伯循髙陵吕仲才皆世台鄉先達也其學俱有源委世台入承庭訓出就二先生訪焉其可也諸友繾綣之意亦若此而已矣嗚呼念哉贈石嵓處士仇時閒序士君子所以取貴於世者以其見道明而將義篤也而隱顯不與焉古之隱君子如封人晨門諸賢皆垂名於魯論而王彥方管幼安黃叔度諸賢亦流光於史册至今餘千年矣而言論風㫖猶使人景慕不已世降俗末斯人蓋不可多得矣有與之倣佛者寧可不表章之使顯於世哉正德年間豫廢處林下聞潞州仇氏家法之美而未詳也㑹其宗子瀋藩儀賔時茂遣其子熙從豫游乃得見其所作家範及所舉行鄉約始知時茂及其從兄時濟弟時淳時表時閒皆以孝悌禮讓為鄉人所宗心竊慕焉然無由見也嘉靖壬午豫丁先父憂時表奉其伯兄命不逺數百里來弔奠觀其禮度循如也聽其言論秩如也益信其昆仲之賢未幾别去嘗意他日或至山西當造拜其室以盡觀其昆仲之儀刑值䝉恩起廢奔走仕途不相聞者久矣乃今嘉靖戊子春時閒復奉其仲兄時淳之命來訪其禮度言論猶時表也詢時茂起居則捐館踰小祥矣相與悲悼久之暇日延時閒小餐論及家範鄉約傍及古今人行事得失皆舉經史或儒先著述以對明白剴切不激不隨乃知其識見髙明真有士君子之風又歎其昆仲皆賢又有古人之所難得者益加敬慕時閒嘗問豫以學問之要豫應之以讀聖人之書當知其意行古人之道勿泥其迹時閒以為然其虛心從善蓋方進而未已也其與古之隱君子並流芳聲可期也於其歸也姑以是贈之以徵其後云贈婁生東歸序聖賢之道未知以知為難既知則以行為難有志之士讀書窮理能知聖賢之道者時時有之至於知而能行者百無一二此無他世俗之說橫於中而利害之勢迫於外於是乎徇時之計生而行道之志變矣於戲此道所以不能行也世之人見小人得志君子困厄類皆曰順時者通忤時者窮是不可以不通其變也士之惑於其說者蓋十而八九矣抑不思窮通得失莫不有命自古及今小人得志者固多矣而敗者亦不為少君子之困厄者固多矣而顯者亦未嘗盡無是知窮通得失皆出於命非人力之所獨致也故君子恆行法以俟命不知命者則無以為君子聖賢垂訓之意逺矣或疑斯道之大浩浩難窮欲盡知而全體之有未易者殊不知道有全體有先務智者無不知也而當務之為急修齊治平豈非當務之急者乎學問思辨以致其知既真知矣藴之於心則為德體之於身則為行發之言語則為文章措之天下則為事業大可聖次可賢下亦不忝為士君子矣或問推行之要曰本之以誠施之以恕律已以嚴責人以寬窮通得失則一聽乎命有所不得則反求諸已而不變不沮焉知此則道庶乎其可行矣婁生東歸乃來告别豫念生有志於聖賢之道恐其或惕於世俗之說而不克終也故書是贈之於戲書不盡言言不盡意生尚繹思而推廣之哉賈賢權驛序國朝統一四海政令之施或上遣使而布於下或下遣使而達於上皆給驛以行使者至驛則館人授室饔人致膳圉人具僕馬故使者至則如歸去則無留難之患政令之施捷於風雷之鼓動蓋有由然也逺近州縣莫不有驛而河內萬善驛則在太行之麓路通山西使客往來者頗少驛官缺員府縣恆委他官署之事非其職故多至廢墜正德十五年義官賈賢實承府縣檄往署驛事凡百盡心不以權暑而怠故屋宇修潔飲食豐腆士飽而嬉馬騰於槽使客至者無缺供之咎上下咸愛敬焉姻親張某等乃來徵言以賀或謂驛傳之政非大也驛官之秩非崇也至於他官暫時權署則又可知矣是何足賀噫不然政不在大小秩不在崇卑惟盡心於其職者斯可賢矣孔子為委吏而㑹計當為乘田而牛羊茁壯夫孔子大聖人也㑹計當牛羊茁壯此瑣瑣者何足稱數而史氏必備録之者以見大聖大賢克勤小物無所往而不用其心也賈賢權署驛事能舉其職孰謂其不可賀乎衆僉曰諾於是乎書周總旗應役序儀衛司總旗周君大淵去嵗冬始膺役旗手千戶張侯命分任司事君以衰老辭侯曰任事之勞非衰老所堪固然但事務煩冗非老成練達者不能况衆人疲敝久矣他任事者不免有所漁獵衆益以困汝既老成習事又家道殷實無取於人分任司事非汝莫可其勿辭君不得已受命既而委以巨細之事悉皆允愜上無怒容下無謗語衆咸頌侯為知人又喜君之能任事也姻家孟氣之乃來徵言以賀豫於周君為妹壻故不得辭竊惟事無大小能任者賢事茍勝任則雖閭里之役亦足以流芳於當時仇覽諸人是矣事不勝任則雖公卿之尊不免遺譏於後世孔光諸人是矣然求所以勝其任者豈有他哉本之以誠行之以勤處之以公如是而已誠則人不疑勤則事不敗公則衆咸服充是道也雖公卿之任無不勝者况其小小者乎君念哉言行相顧以致其誠夙夜匪懈以致其勤差科必均以致其公則上悅下服將始終如一日矣昔于公為獄吏凡事不茍嘗令髙大其門曰吾治獄無寃後世子孫必有興者至其後定國果為卿相君勉哉天道無親常與善人安知君之子孫無興者乎謹書之以徵于後贈民安驛驛丞牛本誠之任序友人牛宗器之子本誠由承差授湖廣公安縣民安驛驛丞將之任庠友王子正伊親也乃來徵言以贈嗚呼豫何言哉欲告之以古人居官之道則迂逺而不切於事欲告之以今人居官之道則豫有所不知雖知之亦未能得其肯綮然子正之請不可虛而宗器之厚又有不可默者姑述所聞以告而本誠擇焉其可也驛遞之官大要以奔走承順為職凡朝貴之經過上司之巡厯公使之往來驛官咸有事焉其進退欲恭其應對欲敏其館舍欲潔其飲食欲豐其車馬欲備以整欲一一各得其宜固己難矣况夫館舍之授主之者館人也飲食之供主之者饔人也車馬之戒主之者圉人也而驛官實總理焉治之太寬則下不用命而誤事治之太嚴則下或不堪而生怨或寬或嚴各中其節非洞曉物情深知事體者不能也兹不亦尤難也哉語云不習居官視傍州例本誠之鄉鄰豈無服役於驛遞者乎驛官之行事如何則上官喜如何則上官怒如何則下人悅如何則下人怨本誠計亦知之矣今兹之任凡事視以為法戒焉則上無不喜下無不悅驛官之職不難稱矣本誠家饒於財俯仰之資不賴於官而本誠之來見我也進退言語淳朴無僞蓋忠信人也忠信誠也本之以誠而加以通敏驛官之職綽綽有餘矣然豫不真知今人居官之道所言不知可用與否本誠就習於世事之君子而再訪焉其可也是為贈賀薛生入學序嘉靖壬辰提學副使敖公按臨懷慶選子弟之聰俊穎異者補儒學生薛先生之子堯民與焉曹四先生生之外舅也乃來徵豫言以賀豫惟生以童稚之年登庠序之門德業未成名譽未著將何以賀既而思之則亦有可賀者焉楩楠杞梓之木必預養于山林然後匠石取之以為棟為梁聰明俊傑之士必預養于學校然後朝廷取之以為公為卿取之雖在後養之則在先不有以養之孰從而取之是則養之之始亦可賀也然材之成也難矣善養木者其根欲深其培欲平其灌欲時而又剪其繁冗去其荆棘使土力不分復遲之以嵗月然後棟梁之材可成善養士者必根之以虛明敬一之心培之以聖經賢傳之㫖灌之以明師良友之澤而又戒其雜習除其穢行使用志不分復遲之以嵗月然後公卿之材可成其事之相類有如此者嗚呼生尚念哉作養者朝廷之意也期望勸戒以相養者父兄師友之任也崇德廣業決意而往以自養者則生之責也夫子有言譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也士始入學亦一簣之覆者也生尚念哉吾言止于此矣柏齊集卷四
