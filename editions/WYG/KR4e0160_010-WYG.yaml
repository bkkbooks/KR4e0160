body:
  text: 栢齋集巻十明何瑭撰碑銘追封鄭定王碑銘嘉靖十二年正月十五日宗室鄭王殿下遣審理副周廷蘭來諭瑭曰予祖東垣端惠王乃予曾祖簡王之子伯祖僖王之弟伯考康王之叔父也𢎞治十六年薨逝蒙朝廷賜諡祭塟訖正徳二年康王薨逝無子予先考懿王以倫序當襲蒙朝廷授以冊寶進封鄭王先考即奏乞追封祖為鄭王該部以前無事例􅃦其奏不報正徳十年祖妣李氏薨逝蒙朝廷欽賜祭塟亦止從郡王妃典禮先考懿王享國十三年薨逝乃嘉靖七年予母妃追念先王之志未伸復援唐府事例奏乞追封祖為鄭王欽蒙聖恩准進封鄭王改諡曰定祖妣亦進封鄭王妃各賜以金冊已告廟謝恩外兹欲立碑墓前以彰聖天子之恩母妃之孝以慰我祖考妣及先王在天之靈幸為予撰次始末勒碑示後瑭拜受命竊惟人子之孝莫大於尊親然或拘於分而不得或拘於時而不得故人子能全其尊親之孝者甚難仰惟我聖天子由宗藩入承大統初議追尊考興獻王為皇帝以廷臣爭議不决亦踰年而後定其難也蓋如此我東垣王追封鄭王恩典先懿王奏請而未得今母妃奏請乃始得之是固孝心相繼所致然非聖天子在上推已尊親之心以逮臣下亦安能致得之之易如此哉然則聖天子之恩烏可忘也立碑墓前昭示後世今王之志甚善瑭謹拜手稽首而獻銘曰人子之孝莫大尊親孝心得遂天下㡬人請封鄭王懿王之孝部議弗從沒身是悼王妃繼請乃行追封煌煌金冊賁於泉宫王妃之孝王實導之天子之恩何以報之今王對揚立碑墓前稽首頓首天子萬年墓誌封太淑人何母劉氏墓誌嗚呼此瑭母太淑人祔葬瑭父工部府君之墓也太淑人姓劉氏世為懐慶衛人父諱鈺字子珎讀書通大義家法甚嚴繼配郭氏有賢行寔生淑人淑人資禀既異又漸染家教故女徳女工有過人者年十八歸我先考工部府君事舅姑能孝治家勤儉有法家嘗中衰淑人相先考辛苦自立不求於人惟以教子讀書為事𢎞治壬戍瑭舉進士甲子授翰林院編修蒙封先考編修封母孺人正徳初年太監劉瑾用事瑭與之不合乞致仕歸未㡬瑾敗行取復職復以經筵進講忤㫖謫開州同知轉東昌府同知丙子復乞致仕歸侍膝下辛巳先考棄背是年今上即位以薦者言起瑭為山西提學副使以居憂不赴服闋改浙江提學副使居一年陞南京太常寺少卿轉正卿嘉靖丁亥陞南京工部右侍郎明年遇例加贈先考南京工部右侍郎加封母太淑人是冬改北工部十二月至京改户部踰三月改禮部俱右侍郎而瑭病矣乞歸蒙陞南京右都御史致仕幸得侍淑人膝下首尾十年而太淑人棄背矣嗚呼痛哉太淑人性嚴毅瑭輩有過輒以大義責之瑭輩恒凛凛焉故得免於大惡訓戒之言今不復聞矣痛哉痛哉淑人生景泰丙子九月四日辰時卒嘉靖戊戍二月十五日申時享年八十有三生子男二長曰瑭即不肖娶周氏次曰璋娶張氏女二長適處士秦子隆次適府掾傅選孫男三長曰光祖娶薛氏次曰顯宗娶劉氏繼娶陳氏次曰延祚娶秦氏俱生員孫女七長適生員王世綸次適生員劉廷珮次適國子生蕭鸞次適國子生郝九疇次適國子生傅良徳次聘官舍鍾鑰一尚幼曾孫男二長曰諮聘蕭氏次曰詢聘張氏曾孫女七長聘郭鈐次聘吳大英餘俱幼卜以四月十八日啓工部府君之竁而祔塟焉瑭病廢不能乞銘於名公大人􅋞淚謹述淑人世行大畧以誌於石至痛無文故不銘云墓誌銘教諭張公配孺人王氏合塟墓誌銘正徳八年冬十有一月刑部主事張孟復先生以奉命審刑至開州公事畢揖瑭而進之曰𢎞治癸亥十二月十一日先考教諭公卒塟儀封縣西留陳鋪之東原秉衡實為誌正徳丁卯四月十三日先妣太孺人復棄背以河患未克祔塟兹便道歸將卒事誌以記執事固以昏亂冗併辭先生曰誌吾已具狀煩一櫽括耳乃受命先生既至儀封乃使使齎狀授瑭狀若曰先妣姓王氏曾祖諱景春祖諱亮父諱興俱力農晦徳先妣幼有令聞先考喪前妣李氏擇嗣内事乃歸先妣先妣婦道甚飭且性明斷有丈夫風雖閫外事與聞者一切匡輔先考加敬禮焉成化己丑始生原明時先考春秋髙先妣每齋戒禱曰吾得見此子成立可當門户足矣而教愛周至原明少長先考教以讀書作文先妣恒分紡績之燈與同起止故原明不敢休怠少自樹立幸得領𢎞治乙卯鄉薦時二親在堂二孫獻喜膝下冀沾寸禄少酬罔極不幸相繼棄背今雖叨甲科有職事親不逮矣痛何言哉先妣姓至孝事姑以愛敬聞隨先考居官時每寄物事於母曰吾姑已矣吾何用愛焉平時訓原明者甚至病且革猶曰汝生長明時毋堕先志以忠朝廷吾歸張氏有子也言猶在耳痛哉先妣享年七十有二子一即原明正徳辛未進士女四長適王郁次李鳯次李雍熈次闕承賢俱士人孫二曰立曰可先考世行官夀具秉衡誌先妣以正徳癸酉十二月八日合塟嗚呼懿哉太孺人之行也婦孝妻從母愛而教足嫓徳教諭公矣同藏何憾是宜銘曰孺人相夫敬戒無失為婦為母賢聲四溢栗如豁如維是𤣥室百年同藏以永終吉汝北縣主墓誌銘嘉靖八年七月六日汝北縣主以疾卒于正寢孫九成等卜以嘉靖九年十月十日啓厥祖儀賔馮公之竁而合塟焉先期以其姻黨張上舍所撰狀來請銘按狀主迺涇陽安靖王長女也王性嚴有家法而王妃張氏復有賢行故主之生也天性聰明惠順謹黙甫十歲王命讀書寫字凡皇明内訓孝經列女傳等書皆王日逐所親授至今朱翰宛然主隨授即曉大義稍長事女紅精緻過人王曰汝王家女何勤勞迺爾主曰此女子内分事不可不知豈專於讀書寫字而已王善之王或有所盛怒主婉詞以諌王亦為之霽威年十六受封汝北縣主至十八歲請婚於朝命下選鄭府儀衛司儀衛正馮宣次子恕為儀賓封亞中大夫儀賓父母在堂主時問起居飲食衣服必躬必親然後進曾無驕容儀賓好博奕主勸以琴書儀賓好花草主勸以種植儀賓好朋友主勸以擇友夫婦愛敬如賓曾無反目且不妬不忌宫中侍婢皆敬服愛慕曾無怨言雖處富貴自奉恒儉姻親有匱乏者必周䘏賑貸曾無靳色比舅姑繼沒塋塟務從其厚時祀務尚豐潔内外賢之𢎞治五年遣子繼勛遊郡庠𢎞治九年儀賓偶感疾卒於正寢主服喪三年未嘗有喜色恒勸子曰汝父早逝汝當及時向學以圖顯揚勿怠荒以貽汝父九泉之憂𢎞治十五年子繼勛又卒主移哭夫之哀而又哭子嗚呼痛哉二孫尚幼主朝夕撫育常語子婦胡氏曰忠臣不事二君烈女不更二夫古人此言深有道理胡氏感激悲號誓死無他志姑婦節孝孀居人無間言二孫已成立主遘疾且革召二孫語曰汝祖早逝汝父亦早逝汝不能見矣汝母亦五十餘汝當勤謹孝養汝兄弟亦當和睦吾死亦瞑目矣餘弗他及言訖而逝主生於景泰六年六月六日享年七十有五子男一即繼勛也娶兵馬指揮胡銘次女孫男二長曰九成娶郡人沈鵬女繼娶郡人韓堂女次曰九思娶郡人張約女孫女一適兵馬指揮閻敬子廷琮曽孫男六曰尚仁尚義尚禮尚智尚信尚温曾孫女二俱幼嗚呼主在宫為賢女出宫為賢婦終而為賢母皆卓乎不可尚矣予幼讀詩見王姬之肅雍共姜之守義未嘗不歎其賢及觀史傳所載姬主多驕惰不謹以為古之人後不可復見也未嘗不深加悼惜今觀汝北縣主事舅姑盡其孝相儀賓盡其義宛然王姬之肅雝也朂子婦以貞烈自守撫二孫咸底成立視栢舟之自誓殆有過焉此固可見人性之善無古今之異蓋亦由我皇祖治家有法故宗室薰陶漸染而姬主之賢有如是也嗚呼休哉是宜有銘銘曰先王教化始於閨門王姬侯女禮義是敦降及後來教化淪替放蕩驕矜青史斯穢縣主之賢古風尚存勒兹貞石以詔後昆憲副吳公墓誌銘嘉靖十年十一月二十五日致仕山西按察司副使呉公以夀終於正寢子守誠等卜以十二年春二月二十九日塟公於祖塋之次先期以狀請瑭銘公壙中之石瑭於公為後進公以名徳爵齒為鄉達尊乃折輩行與交閒居相見教愛備至瑭雖疎懶不能日侍杖履然心實歸仰焉今公不可見矣銘又安忍辭邪公諱道寧字世安别號繼公按狀公之先為浙温州之潭頭人國初徙居南京晩市父維成化初任温縣教諭嘗夢於黄河中流蓋樓因曰吾當於河内起家遂占籍河内焉公自幼篤實無妄言與弟道隆同受學惟務窮理不尚詞章枝葉教諭公嘗曰道寧為學如錘鑚毡遲透終不迷也道隆為學如錐鑚毡即透即迷也成化丁酉中河南鄉試禮魁戊戍登進士第授鹽山縣知縣迎教諭公以養政餘定省教諭公毎舉古語以訓曰但存方寸地留與子孫耕故公居官恒以慈愛為本節民財力為先至於徭役一事尤加用意故復業者接踵而至百姓愛過父母三載以政績卓異陞監察御史彈劾激揚風裁凛凛𢎞治初年河内民奏開廣濟渠不果行是時公巡鹽河東適勘鹽引十萬應否充給河南官軍俸糧公曰俸糧吾省利廣濟渠吾府利均為國家利吾兩成之達諸河南撫按後渠成溉民田甚溥巡按真定等四府貪酷望風解綬先是開州有巨冦為一方深害交結權姦莫敢誰何公設法捕獲戮諸市曹人心大快𢎞治十一年陞山西按察司副使奉勑整飭鴈門等三闗兵備創築寧武新城設寧武所及沿邉堡寨俱募軍充實武備一新邊人有賴後以疾辭歸惟以耕讀為事毎訓子曰汝祖三十以後始奮發讀書或夜無油就月色讀尚能明禮經中式刋文汝俱年富燈火不須營幹正宜努力諸子或不能背書即掩巻朗誦一遍曰我年六七十尚能背誦汝後生反不能邪諸子感奮力學守中遂登進士第正徳初廣濟渠通塞不時公因泝流窮源相度地勢直抵五龍口嘆曰使渠由此而行數世之利也今不二十年而塞蓋創始者失地利耳遂達諸當道違廣濟舊渠三四里許另開利人渠曰舊渠如此故失利新渠如此乃得利刁民百計沮撓往返五年而後渠成水利至今賴之濟水國初遶府城東流入河公因開利人河見其南流曰此古蹟也豈可興今利而忘古利哉達諸當道修架橋六座新流從上濟流自下二利並行而不悖林下優游三十餘年身體康强未嘗有疾年八十五六時毎遇别墅花卉春佳秋禾告成扶杖觀翫往返步行數里臨終不及已事苐謂諸子曰汝等不須憂貧但教子孫讀書為上䇿耳公生正統癸亥十一月二十日巳時享年八十有九配金氏累封恭人先公四年卒側室三職氏黄氏戚氏戚先於正徳九年卒子男五守誠引禮舍人守敬生員守中廣平知府守和早卒守經儀賓今更名模女四淑清適生員董志學卒淑淨適指揮劉傑卒淑淵適指揮沈隆卒淑貞適散官蕭拱暘男孫七大夏生員大韶大讓大徵大英大福大節俱幼女孫十善琮適百户宋學善璜適生員張思齊善環適典仗焦繼芳善珮適生員孟永增善瓊聘指揮薛守直長子善琅聘守備顔齡長子善玕善珎善珠俱幼瑭竊聞有大徳者必得禄位名夀而徵之於世或不盡然故君子或疑於天道之難信今觀公居官則名實加于上下居家則惠利及於鄉黨人固已愛而敬之矣而忠信謙抑不以尊貴驕人雖閭里童稚亦以禮待之故無逺近大小皆稱公為大賢君子位至方面年至耄耋禄位名夀盖兼而有之矣而子孫多賢又有出五福之外者天道豈真不可信邪是可以傳不朽矣是宜有銘銘曰大徳獲福自古所傳徵之於世或不盡然嗟嗟吳公盛徳君子名在憲堂惠留閭里有爵有禄亦既顯榮百年康健夀考令終𤣥堂孔堅不震不圮公其永寧貽慶無已宿州吏目仇公墓誌銘瀋藩儀賓仇公將以明年二月朔旦塟其從兄宿州吏目公於先兆之次乃具書狀禮幣走使來懐慶請銘於瑭瑭雅聞公昆弟賢又辱在相知之末故不可辭按狀宿州公諱楫字時濟世為潞州東火人髙祖諱敏國初為兵科給事中曾祖諱述芳業醫祖諱鏞援例授七品散官考諱鶴義官妣張氏繼母閻氏兄弟三人公為長仲曰朴義官皆張出季曰欄醫學典科閻出公天性聰慧八九歲即通筭人皆竒其敏悟既而從學於陵川致仕教諭姬先生彰習舉子業甚有志於科目時兩伯父皆蚤逝儀賓弟居城中諸弟尚幼家事乏人賛理乃以父命援例入為國子生卒業即代父綜理家政内外得其歡心一日從弟監生桓城居偶疾城距東火八十里公聞之雪夜往視至城下夜方半門啟詢其由為當道者傳報也議者曰王城路非衝要夜半門啟實難遇也非君友愛篤至何以致此後仕為宿州吏目臨民蒞事不事鞭朴惟以理勸諭之初事似不克速濟太守黎公每咎其迂曰宿民汝可以徳化耶後不一年百姓感戴如父母凡遇公事民趨赴勤如子姪黎公慨然嘆曰吾不如子黎公君子人也遂相契如至親一日因踏看境内災傷公躬往村落之民皆扶其父老迎拜道傍公即下馬為禮曰老者安之不當如此勞動父老咸曰子孫毎從公府來者皆言衙門開設以來愛民之深者無如父母官願得一見也居民在在皆然未幾上司有大書賛政勤能之奬歴俸未二載外艱訃至公號慟不自勝弔者皆為垂涕即命家人束書歸太守戀戀如失手足宿民皇皇如捨父母徒𨽻來䕶送者人馬㡬百數途中屢命其回竟無一人先返者公至境望門抵家號慟幾絶者數次凡送死之禮無不極其誠信時烏鳥羣集於屋去而復至者月餘議者以為公孝誠所感大事既襄不御酒肉不歸寢室戚戚其容者終制禫祭既畢遂家居不起慨然欲化一家一鄉如三代之風於是上孝老母下友諸弟建祠堂祭及髙祖以下四世神主報本追逺之誠無不曲盡立家範録自冠昏喪祭及事物細㣲訓後齊家之則靡有闕遺營義房一區於家敦請鄉先生以教宗族子弟免其束脩再起義學一所於里以訓鄉黨童稚資其薪水設醫藥以濟窮鄉有疾病者置義塚以塟逃屋無墓地者作禮衣深衣女轎燈籠諸物以助行冠昏者備大舉布巾香案儀節等具以助行喪祭者又請鄉彦數人相與講明家禮使其賛而行之已而一鄉二三户喪塟咸不用浮屠昏嫁皆不惑術士復刋印三原冢宰王公註釋太祖髙皇帝木鐸訓辭數百冊本鄉人給一册勸其講而行之正徳戊辰歲六七月大旱公率鄰村父老數千人齋戒沐浴於山林壇廟露頭跣足減食跪香即日大雨方數百里三日乃止人皆服其悃誠可以感動天地辛未歲流賊入境家人皆避之賊傳言聞仇氏多馬出馬則庶得保全否則必火其室公曰室可火而馬不可以資賊賊遂大火其室而退賊初至搜掠婦女間有死節者四人賊退公不悲其家之災而獨憐四女之死乃述事狀授儀賓弟俾轉達當道後旌表門閭又舉行藍田鄉約每月望一㑹同約之人務在徳業相勸過失相規今月某人行何善事即書於勸善簿某人行過惡即書於懲惡簿畢乃序坐談論理家孝弟之事酒飲㣲醺即止有大惡者出之嘗對鄉衆曰姦盜之事最所深惡有能捕獲者吾賞錢一千盜田野穀豆者賞粟一石蔬菜者賞粟五斗數年之間盜賊歛跡帷簿甚嚴素酗酒者沈醉而不言素健訟者得理而亦忍於是翕然閭里和睦時有征鴈宿於門右古木相應和鳴至旦而去議者曰鴈非棲木之鳥其性正而有序今夕之來棲因公修身睦族所致也公自家居罕入城市雖鄉飲亦不往曰無功於朝廷不敢虚領其賜也開樂休園一所鑿池種蓮坐知止亭上明窻淨几以琴書自娯撰為八景墨客詩人往往題咏有八景詩集藏於家毎戒子弟曰衣食饒足即為富矣何必多積金帛凡借貸錢穀惟輕取利息庶合古人貧富相資之意其濟宗族惠鰥寡周窮恤困之事晩年尤篤至是以疾卒於正寢弔者千餘人莫不灑泣公生於成化四年二月二十六日卒於正徳十五年十一月初九日享年五十有三塟於陽堰原從先兆也公娶李氏陵川縣禮義里旌表六世同居義門濯之女早卒繼郜氏本州東闗村士人訓之女亦早卒再繼孫氏潞州衛千户舍人仁之女生子三曰勲義官李出配義門義官玹之女曰炳聘本州䕃城村知縣李素曾孫夣陽女曰煌聘梁家庄士民劉彦彰女女一曰徳恩尚幼皆孫出孫男一曰塙聘本州西火鎮士民焦琦女孫女二曰弄瓦弄碗皆幼嗚呼吾聞仁人君子在一鄉則化一鄉在一國則化一國在天下則化天下觀仇公之所履行感動可謂仁人君子矣而官止於一幕夀不逮六十俾不克究所施設豈非命耶昔漢陳仲弓為太丘長名重天下至於今稱頌之者不衰當時豈無貴官豈無髙夀而天下後世所仰慕者乃在此而不在彼然則仇公亦可以無憾矣乃為之銘曰孰親其親孰仁其民嗟嗟仇公今之古人胡小厥施胡嗇厥夀彼蒼茫茫孰任其咎徳修於家化行於里百世可傳是云不死仇母閻孺人墓誌銘閻孺人者潞東火仇氏之生母也嘉靖壬辰冬十一月十有六日以夀終于正寢子朴等卜以來年春二月十有一日祔孺人於其考義官之墓先期以姪熈所撰狀具書幣伻來請銘予雅重仇氏家法之美及其昆仲之賢暨觀狀乃知皆成於孺人之教噫孺人可謂賢母矣是豈可不傳按狀孺人姓閻氏潞西火鎮處士素之第五女也性聰慧年七八歲時聞祖閻三翁訓戒即知以禮自守無故不出户閾少長依嫂李學女紅及笄凡鍼黹鍋竈紡織蠶桑無不精曉祖父母父母皆鍾愛焉他姓求婚皆不許成化十三年義官仇君鶴喪偶張氏厥考散官翁乃託執友李君禎求為義官續絃於閻三翁翁慨然許之曰吾非富仇氏也其家孝義義官良士吾孫女得所歸也張氏遺二兒俱幼孺人合巹禮成次日即抱幼兒於私室人以為難未㡬二兒衣履一新舅氏見之喜曰吾二孫得託吾憂舒矣輪當主饋舅戒以勿妄費米麵鹽醋及諭以起家艱苦之意孺人奉命惟謹輪當碾磨及醖釀醤醋醃治蔬菜紡織染練之類舅亦諄諄戒之孺人所作無不精潔悉中舅意舅喜曰吾兒婦能聽吾言必能成吾家者蓋自後亦不復戒矣是時舅總家政伯兄貞篤先生主錢穀義官君兼管門户成化十七年貞篤先生物故遺子森甫十四歲桓方五歲女猶在娠義官君獨任家事内蓄孺人收藏式克賛相絶無私假私藏之議成化二十年兄子森選為内丘王府上艾縣主儀賓營造府第凡工匠飲食之需孺人悉供給不怠及府成義官君謂孺人曰縣主將出閣首飾尚未備你與二嫂有金可各出數件為用孺人即罄收以獻義官君笑曰汝能先於二嫂耶𢎞治九年兄嫂丁卒遺女適瀋陽衛指揮張淮糚奩悉出孺人之手無不從厚女嘗謂叔母待我過於親女孺人待子姓雖慈至於教之甚嚴諸子皆教以義方子欄甫八歲即遣從師讀書時或喜戲即訶之不改即笞之曰失教即為敗子故欄讀書尚禮為時名人十五年春子楫選為宿州吏目孺人戒之曰吾兒須要清慎勤謹以報國恩故楫在宿州盡心職務致上司有賛政勤能之奬十六年七月義官君物故孺人乃忍痛率諸子經營家務具朝夕奠如禮九月楫至自任既塟乃與弟儀賓森及諸弟議立家範以成先志白於祖妣陳及孺人孺人曰爾父嘗言西院大伯收得鄭氏旌義編一本好書成家者當以為法爾等能成父志立為常規期於久行爾父地下亦當欣悦矣後楫舉行藍田吕氏鄉約以厚風俗作義學以教子孫及鄉之秀俊孺人皆奬勵而勸戒之正徳六年端午日或報流賊千餘人已到趙村諸子曰母親同諸婦可在鄰家一避孺人不可即督諸婦由間道以趨州城賊至諸子亦以逺避使人傳言索馬不與遂火其居孺人在州城三月與縣主相接以宗室待之縣主則以姪婦自處世相親愛秋初賊遯王師凱還金鼓動地或勸孺人出觀孺人曰賊火我室吾兒卧瓦礫食燒穀以存性命吾忍觀鼓樂邪初賊退諸子即修葺房舍少完迎祖妣陳及孺人歸舊居九年祖妣陳以夀終孺人哀毁盡禮十五年子楫病卒孺人哭大慟孺人性好節義聞姪森修四貞祠及親族生員閻誠妻程氏夫死自縊及李曉妻未醮夫死歸夫家持服事姑皆加奬勵尤好周䘏遇歲饑輒周賑於里之貧者親疎有差無有不徧姪森及子朴繼欲建東山書院延耆儒以教子弟及鄉之俊秀以廣義學之意孺人復勸成之嘉靖十一年七月七日孺人感風疾卧床子朴欲置田百五十畝以供義學先生束脩之用白於孺人孺人復首肯之蓋其教子尚義之心至老而不倦也至十一月十六日戍時病亟乃卒孺人生天順四年十一月二十六日戍時享夀七十有三子男三長楫任宿州吏目先卒娶李濯女繼郜訓女又繼孫仁女次朴義官娶王陽女繼義官潞俊女又繼董祥女皆前張氏出又次欄醫學典科娶知縣王綸女繼李思聰女女二錦菊適千户申琇封宜人先卒繡菊字郭邦鎮幼殤皆閻孺人出孫男四曰勲義官娶李氏曰煥生員先卒娶李氏曰炳娶李氏曰煌聘劉氏先亡孫女八一季冬字李鈞先亡二徳裕適武思彤三徳恩適生員焦謨四徳邵字李皆五徳重字袁逐六徳備字生員申去垢七徳地八徳慎曾孫男四一塙娶焦氏二堦聘袁氏三培四壵曾孫女五一弄瓦適王充耘二弄碗字賈克明三弄枕四弄車五弄斾予竊惟人家盛衰固由男子主之於外婦人賛之於内易家人卦以父母為嚴君復以男正位乎外女正位乎内為治家之要垂訓逺矣今觀孺人事舅姑以孝事夫子以敬待姒娣以和教子孫以義雍雍於宫肅肅於廟凡妻道婦道母道無有不盡可謂賢矣至身為主母又能賛成家範率諸婦躬行於内以致家道有成諸子稱賢尤為可頌昔文伯之母及孟母范母陶母皆以能治家教子留芳簡冊孺人蓋有與之相上下者是豈可不傳是宜有銘銘曰仇母孺人百年以備撰詞勒石傳於世世處士仇時表墓誌銘嘉靖乙未冬十二月二十一日潞安處士仇時表以疾卒於正寢卜以明年二月十七日祔塟於陽堰祖塋之右其從兄義官公朴命其從子熈撰狀乃具書幣遣使來徵銘於予予發書痛悼念昔正徳辛巳予丁先父憂時表奉其兄儀賓公森命來弔奠相度閑雅予深敬慕焉别去今十五年矣嘗念無由再見而今則已矣痛哉痛哉誌銘之託又安忍以衰老辭也處士諱桓字時表别號和節居士嘗為國子上舍不稱而稱處士從其志也仇氏世為潞安東火人髙祖敏給事中曾祖述芳醫士大父鏞散官父鴻積學不仕既卒都憲虎谷王公私諡為貞篤先生母丁氏於成化十三年十月初十日生處士處士生而淳篤寡言笑方匍匐與羣兒戲不爭年十二補郡庠弟子員郡守馬公掌教劉公深器之十九齡廪食一日與儀賓兄省母惟山兄束金衣繡騁天賜馬處士青襟楚楚光彩逼人見者莫不嘆羨一山翁李姓者曰我僕事貞篤君最久稔見其盛徳廣濟惜天不假年今二嗣榮耀至此足以少酬其志於地下矣言訖泣下聞者嘆息母病同兄籲天求以身代及卒哀毁踰禮又念父終方幼遂設主同母靈追奠三年不御酒肉服闋强學力行期以大顯厥親屢中里選而不入鄉書鬱鬱成疾後膺例輸粟濟邊肄業胄監未畢嘆曰遘疾求仕於義安乎即日告歸隱於山谷間授受生徒誓不仕進叔父義官公鶴卒處士哭曰吾少失怙所賴者有叔在堂時賜訓誨耳今又不幸至此慟哉助兄吏目公楫克襄大事即同議舉行家範鄉約等事少暇則讀古人書湯隂馮氏子以心疾浪遊太行間處士試其文可進遂館穀之居無何馮疾痊肆力於學值大比秋處士領儀賓兄命渡壺口下羊膓躬送於家其年馮以禮經魁中州聞者義之處士又以父母及叔父俱去世獨叔母閻在事之甚孝旦夕溫凊不異所生每得四時鮮物薦祠畢即以奉焉與諸昆弟處甚雍睦人不知其為從兄弟也叔母閻卒從兄義官朴弟典科欄墓居終喪處士率再從子勲等綜理家政凡錢穀出納以時有稱貸者一遵家範以貧富相資為意不孜孜求利而奉喪祭待賓客行慶弔周貧乏以至畢子女之婚嫁供有司之賦役率自有餘百無一失蓋其天性寛厚而篤於守禮故平居雖自奉清約而於物亦無所吝性不喜飲酒而燕客則必盡歡御家無疾言厲色僮僕有過恒矜其愚而宥之課諸子及羣從子弟諄諄以詩禮是訓曰不爾則無以立身乙未九月偶感脾疾自度不起猶强言笑以慰家人一日召諸子於床下屬之曰汝輩讀書勿徒事篇章以供口耳之資須將聖賢言語深求玩味實體諸身以見於行事乃為善學我碌碌庸人虚生於世汝輩勿以為法也又數日乃卒弔客及門者千有餘人皆曰善人沒矣無不揮涕此足以觀其徳之所感矣處士享年五十有九配李氏旌表義門滌之四女也子二俱李氏出長曰火聘西火鎮程蘭之女次曰炅聘鄉賢大司馬䕃城李公八世孫珊之女女一側室郜氏出郜同女俱先卒火淳篤無偽炅頴悟絶羣他日代處士顯親者必此子也且二子侍疾親嘗湯藥居喪能知哀戚有可觀者咸以為處士之化予竊惟古之賢人君子惟以積學修徳為急至於仕隱則隨乎時如龎徳公管幼安王彦方黄叔度諸人隱而不仕彼豈碌碌庸人哉蓋其胸中抱負逺大以道與時違而不屑仕耳故雖隱居獨善其風聲氣節亦足以感化當時流芳後世今觀狀中所載處士之言行風㫖蓋亦有所抱負而不屑於仕者其殆龎徳公諸人之流乎是宜有銘以傳後世銘曰賢人君子仕隱隨時仕而碌碌孰與隱居處士終隱髙情叵測後世徵賢視此幽刻封安人許氏墓誌銘安人姓許氏元魯齋文正公六世孫皇明魯府審理之幼女而四川按察司副使郝玉卿之繼室也審理諱偉字季髙娶霍氏寔生安人安人性聰敏讀書通大義女紅閨範咸極其精父母蓋鍾愛之副使之父諱潤字汝濟任鳯縣知縣娶趙氏生五子三女繼娶陳氏生三子二女副使行三諱綰字玉卿中𢎞治已未進士授刑部主事歴四川按察司副使先娶程氏有賢行玉卿在刑部程氏病故擇可以嗣之者親黨咸謂今安人為宜玉卿乃禮聘娶焉郝氏族大以蕃安人事上接下咸有禮法衆謂其賢足繼程氏正徳闕年玉卿考刑部主事滿贈父如其官贈母及程氏俱安人許氏封安人正徳己巳玉卿擢四川僉事以道嶮匹馬之任安人與妾李氏留家居程安人之歿也遺子二女一長子天次子亦病安人始生子九疇在襁褓安人撫育教訓極其辛苦閨門斬斬人咸稱之甲戍玉卿以考滿擢副使鄉官有與之不睦者㑹其人在言路乃劾之遂致仕已而次子及妾俱故女適舉人程永吉戊寅玉卿亦病故時疇方九歲安人哀毁之餘撫養幼子綜理家政備及辛苦紡績以夜繼日故家業不堕益崇九疇稍長成教以讀書繼父志遂補郡庠弟子駸駸向進為之娶予女為配親黨僉謂安人自此可安享後福矣不意於嘉靖十年十二月感疾遂卒蓋月之初九日是也安人生𢎞治己酉三月二十四享年四十有三而已嗚呼痛哉子九疇卜以明年二月十有七日啓其父副使之壙而祔塟焉先期來請銘嗚呼予又安得不為之銘銘曰人倫之道夫婦為首内外克諧庶㡬不朽嗟嗟安人厥徳孔厚為婦而婦為母而母衆稱大賢云胡不夀夫婦同藏尚福爾後靈石儒學教諭王先生墓誌銘嘉靖癸巳五月五日友人王崇賢先生以夀終於正寢子制等卜以歲八月三日塟先生于先塋之次先期具狀來請銘按狀先生世為河内人云云瑭竊以為士之生世固自有幸不幸以先生之學之行可以逺到而乃官止於師儒年不逮七十可謂不幸然較之齷齪歿世者則有間矣謂之大不幸不可也語稱善積而後顯先生自髙祖以迄今家傳詩禮世尚忠厚善之所積厚矣安知其後不大顯乎季子問臣蔚有才名其在此乎其在此乎謹為之銘以徵其後銘曰於乎先生學博徳厚位不大顯命也孰咎官為師儒不為不偶年㡬七十不為不夀有子而才將大而後於乎先生可以不朽蕭生墓誌銘茂才蕭生以疾卒於正寢父兄將以今年九月九日祔塟於城東先塋之次迺以姻家李拱之先生所為狀請銘於予嗚呼予豈忍銘生之墓耶念惟生從吾游踰年矣刻志向學駸駸上進望其可以逺到迺止於此每思之輒為悽惻今亦安能執筆作為語言以益其悲耶又念生從吾游聞吾一言有契於心輒喜形於色今雖已矣安知㝠漠之中不望吾之有言以開其意耶嗚呼痛哉嗚呼痛哉生名鵾未冠未字其先為雲夢人初祖曰榮仕偽漢陳友諒八衛指揮使後歸附我太祖髙皇帝累以戰功授黄州衛百户陞太原衛左所副千户卒塟黄岡縣榮子曰忠襲官歴陞河南都指揮同知掌印卒塟岳州忠子曰誠襲任懐慶衛指揮僉事卒塟懐城之東誠子曰敬襲職中正統八年武舉狀元授總戎副帥敬次子曰禮人物豐碩有大度隱徳不仕以財雄鄉里嘗遇㐫歲出穀千餘石以賑饑人皆徳之禮生三子孟曰鋭仲曰鑑季曰鋐娶武氏本衛指揮俊之孫此則生之父母也生自幼凝重寡言笑不與羣兒嬉稍長舉動如老成人年甫九歲入小學讀書日記千百言十歲能屬對知作四書破承十三習書經通大義間嘗謁督學憲僉劉公憲副文公告考入學俱蒙優奬令其加勉讀書雖未見錄莫不以逺大期之鄉里胥慶曰蕭氏有子矣年十七始從予游朝夕講肄雖隆冬盛暑不倦予甚愛之正徳戊寅春予往居南尚村别業生亦從築室就學日益刻苦每月止一歸省問安畢即來不留私室夏五月感疾回家調理猶手不釋巻秋七月疾革語其父兄曰我受祖母兩伯眷顧暨父母鞠育之恩未有一日報今命數至此終天之恨豈能瞑目於地下耶言既泪注如雨左右亦相向大哭越數日卒時則正徳十三年戊寅歲八月初四日巳時也距其生𢎞治十四年辛酉歲十一月二十一日亥時得年纔十有八娶葛氏本衛千户堅之女無子止一女名月嬰尚在襁褓生雖生長富貴家然於聲色玩好畧不動念惟一意讀書而已其天性孝友人尤難及上而祖母暨諸父母下而羣從兄弟無不鍾愛生於臧獲輩亦莫不得其心母嘗感風疾生朝夕侍湯藥不離左右生寢衣不解帶與人交汎愛而親仁以此内外無間言衆方期其逺到而止於此嗚呼痛哉古稱為善有後又稱仁者夀生之家世積善人所共推而生又温粹恭謹可謂有仁者之資矣迺至於此何耶陰陽交錯五行迭運故徧駁者衆而粹美者間一值焉以其間值之難故其數多不能長生豈得其粹美而不能長者耶不然何以至於此耶太虚不能不聚而為萬物萬物亦不能不散而為太虚聚散有時神則無間𡨕漠之中玩斯悟斯庶可以釋其終天之恨而瞑目乎嗚呼痛哉墓銘寧國府同知鈍齋宋先生墓銘史傳循良詩稱豈弟古道淪胥有識斯喟懿哉寧國於古克繼守官廉平治民愛利視彼巧宦趨者如市彼以為榮我以為穢爵不配徳於我何愧長者之稱縉紳無二嗟哉宜人克與同志勒銘貞珉以詔來世西郊宋處士夫婦墓銘孔村之原沁河之涘西郊先生歸神於此夫婦同藏爰笑爰語孔吉孔安福爾孫子墓表誥封餘姚郡主墓表聖人立教善善恒急而惡惡恒緩惟其急於善善也故善雖小而必揚惟其緩於惡惡也故惡必著而始罰衛世子共伯蚤死其妻共姜守義父母欲奪而嫁之共姜乃作柏舟之詩以自誓夫婦女之道從一而終則夫亡而不再醮亦常行也夫子刪述六經垂憲萬世乃取柏舟之詩而錄之汲汲然惟恐其無傳於後此其意何哉嗚呼不有所短誰稱其長禮教不修風俗淫蕩雉鳴狐綏之聲盈於逺邇其可嘆者多矣夫子錄柏舟之詩夫豈得已哉稱一人之善所以勵衆人之未善褒表其既往所以示勸戒於將來也聖人立教之意逺矣我聖祖以禮教治天下令民間婦女幼而夫亡守義老而不改節者奏聞旌表法古意也至於皇家婦女則自鄉君以上俱禮無再醮蓋欲宗室人人皆入於禮教之内不止待之如凡民而已也其齊家正内之化蓋有逺過於前代者矣然由是姬主之善行懿徳亦往往不傳於世君子蓋不能不致意焉若餘姚郡主其殆有善行懿徳而未傳於世者乎主宗室鄭簡王第九女夫人于氏之所生也工容言徳皆可稱述年十九選配誥封中奉大夫甄公廷輔相敬如賓雖在燕居未嘗狎暱公遘疾主躬奉湯藥未嘗離左右公卒哭踴屢絶時子濟時甫三歲泣而撫其頂曰吾所以不得從爾先人於地下為汝故也既塟即不御脂粉不飲酒聽樂惟以祀先教子為事閨門内外蓋斬斬如也聞有放蕩不謹者即顰蹙曰奈何辱帝王家也絶不與往來由是主節操之嚴内外無不聞嘉靖癸巳十二月朔日以疾卒於正寢訃聞朝廷賜祭塟如制主既與中奉公同塟矣子濟時復請予表其墓予惟主奉先教子睦親逮下俱可稱述而孀居之節尤為可敬故特表而出之使得與共姜之賢同垂不朽於風俗庶有勸也嗚呼懿哉嗚呼懿哉康修撰對山墓表聖人之道經而不迂權而不譎蓋大中而至正者也後世豪傑之士非無作聖之資也而學力未至故於聖人之道或得其偏而不能無失規行矩步毫髪不差曰此聖人之經也而人情物理有所未明處常事而不能得其要遭變事而不能通其權其失也流而為迂排難解紛變化無方曰此聖人之權也而挾智用術顛倒縱横言焉而不稽其所終行焉而不究其所弊其失也流而為譎譎則不足以服人迂則不足以濟世此古之君子所以大過人而今之君子所以不及也對山康子其殆學聖人之權而未至者乎其才甚髙其氣甚豪其性甚真其言行則不切切於規矩之内其取重於當世以此而見謗於世亦以此使其遇能言聖人之道而與之切磋而又悉心聽信焉講去其非而益粹其是損其過而益其不足則其所立豈止於此哉吾又惜對山之不遇也孔子論人以中行為上次則思狂狷謹厚自保者不數也似徳非徳者則斥以為賊患得患失者則賤為鄙夫其情蓋可見矣對山其殆孔子之所謂狂者乎對山言行之迹墓碑已備兹特論其人品附於墓碑之後使來世知有對山康子斯已矣白齋張先生墓表先生姓張氏諱太素山西萬泉縣綿上鄉下樊村人也父某母某氏先生生而頴悟不凡稍長即從戎練達世故備歴艱苦儕輩敬服年四十餘慨然棄妻子出家為道士禮邵真人弟子程守然為師後游歴名山汎愛有道之士丹經子書靡不涉覽且又食淡四十餘年鹽酪不入口人咸以白齋先生稱之𢎞治六年癸丑冬來遊天壇樂其山水遂結庵隱居至十一年戊午遂發心修造乃普化十方財物於壇頂建玉帝殿三間南向銅脊鐵瓦且為銅像及侍女爐鼎花瓶大鏡俱備又建天將殿左右各三間東西向至正徳改元丙寅始訖功己巳奉鄭懿王令㫖召修本城玉清宫虚皇閣五間功完復回天壇西七十里許西陽山結廬修道乙亥省城周府胙城王孫輔國將軍因有疾禱於天壇有感遣使齎書幣命太素崇修天壇頂之三清等殿明年訖工嘉靖四年乙酉本府孟縣善士耿塤等請先生下山於府城北沁河上修石橋功未完而先生去世矣時嘉靖八年己丑冬十月十八日卯時也夀八十有五先生平生無疾異日端坐而化見者皆驚異焉門人奉遺蜕塟於沁橋之滸㑹塟之日四方之衆雲集塟所門徒薛清濙馮清善輩恐先生之塟處久而或迷沒也乃因吾友任遐齡宋文祥來徵言以表其墓文祥復狀其履歴之始未以授予往年亦嘗與先生相接見其温厚誠朴退然如愚意其為有道之士也叩以道要則固辭不知寂無一言昔太上有云知者不言言者不知先生其真有道之士耶是固有不可以常情測者矣姑摭其履歴之始末俾勒之石四方之人百年之後有慕先生之道而欲拜其墓者其尚有感於斯文也哉祭文祭仇儀賓玉松維嘉靖七年歲次戊子三月壬申朔越三日甲戌南京工部右侍郎懐慶何瑭謹以牲醴庶品之奠敢昭告於宗人府儀賓亞中大夫玉松仇先生之靈曰士或覿面而不相知或越千里而相感者蓋由其心之同不同也先生處潞州瑭處河内相去殆千里矣先生之賢瑭實慕之瑭之不肖亦蒙垂念豈非心之有所同哉嘗意他日有事山西或得晉拜請教今則已矣嗚呼痛哉寄奠一觴少伸哀慕先生生為賢哲歿為神明庶㡬有知鑒兹誠恪尚饗柏齋集巻十
